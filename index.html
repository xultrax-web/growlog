const SEED_TYPES_KEY = 'growlog_seed_types';
const SEED_TYPES_DEFAULTS = ['Landrace, Heirloom & IBL','Regular Hybrid','Feminized','Autoflower','My Seeds','Wish List'];
function getSeedTypes() {
  try { const s = JSON.parse(localStorage.getItem(SEED_TYPES_KEY)); return s && s.length ? s : [...SEED_TYPES_DEFAULTS]; } catch(e) { return [...SEED_TYPES_DEFAULTS]; }
}
let SEED_TYPES = ['All', ...getSeedTypes()];
let vaultExpanded = null;
let vaultGrouped = false;
let vaultSort = { col: 'strain', dir: 1 }; // col: strain|breeder|qty|type, dir: 1=asc -1=desc

function seedQtyColor(qty) {
  const q = parseFloat(qty);
  if (isNaN(q) || qty === '?' || qty === '') return 'var(--text-dim)';
  if (q <= 2)  return 'var(--danger)';
  if (q <= 5)  return 'var(--warn)';
  if (q >= 50) return 'var(--accent)';
  return 'var(--purple)';
}

function seedTimesPopped(s) {
  const name = (s.strain||'').toLowerCase();
  return DB.grows.filter(g => (g.strain||'').toLowerCase().includes(name)).length;
}

function seedRiskFlags(s) {
  const n = (s.notes||'').toLowerCase();
  const flags = [];
  if (/low pm|pm resist|suscept/.test(n))   flags.push(['PM Risk', 'badge-pm']);
  if (/herm/.test(n))                         flags.push(['Herm Risk', 'badge-herm']);
  if (/rare|irreplaceable|last pack/.test(n)) flags.push(['Rare', 'badge-warn']);
  return flags;
}

function vaultDrawer(s, i) {
  const popped = seedTimesPopped(s);
  const risks  = seedRiskFlags(s);
  const name = (s.strain||'').toLowerCase();
  const relatedPlants  = _gc().plants.filter(g => (g.strain||'').toLowerCase().includes(name));
  const relatedHistory = _gc().history.filter(g => !g.fate && (g.strain||'').toLowerCase().includes(name)).slice(0,3);

  return `<div class="vault-drawer" id="vdrawer-${i}">
    <div class="drawer-grid" style="padding:16px 20px 12px 32px">

      <div class="drawer-col">
        <div class="drawer-col-title">Provenance</div>
        <div class="drawer-row"><span class="drawer-label">Breeder</span><span class="drawer-value">${esc(s.breeder||'—')}</span></div>
        <div class="drawer-row"><span class="drawer-label">Type</span><span class="drawer-value">${esc(s.type||'—')}</span></div>
        <div class="drawer-row"><span class="drawer-label">Year</span><span class="drawer-value">${esc(s.year||'—')}</span></div>
        <div class="drawer-row"><span class="drawer-label">Container</span><span class="drawer-value">${s.containerId ? containerName(s.containerId) : (s.bin ? esc(s.bin) : '—')}</span></div>
        <div class="drawer-row"><span class="drawer-label">Quantity</span><span class="drawer-value" style="color:${seedQtyColor(s.qty)}">${esc(s.qty||'?')} seeds</span></div>
        ${risks.length ? `<div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap">${risks.map(([lbl,cls])=>`<span class="badge ${cls}">${lbl}</span>`).join('')}</div>` : ''}
      </div>

      <div class="drawer-col">
        <div class="drawer-col-title">Grow History <span class="meta-dim">${popped} run${popped!==1?'s':''} found</span></div>
        ${relatedPlants.length ? relatedPlants.map(g=>`
          <div style="font-size:11px;color:var(--text-mid);margin-bottom:4px;display:flex;align-items:center;gap:6px">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;display:inline-block"></span>
            ${esc(g.strain)} <span style="color:var(--text-dim)">${stageBadge(g.stage)}</span>
          </div>`).join('') : ''}
        ${relatedHistory.length ? relatedHistory.map(g=>`
          <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;display:flex;align-items:center;gap:6px">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;display:inline-block"></span>
            ${esc(g.strain)} <span style="color:var(--text-dim);font-size:10px">${g.harvestDate?'harvested '+fmtDate(g.harvestDate):'no harvest'}</span>
          </div>`).join('') : ''}
        ${!relatedPlants.length && !relatedHistory.length ? '<div class="txt-dim-sm">Never popped — virgin territory.</div>' : ''}
      </div>

      <div class="drawer-col">
        <div class="drawer-col-title">Notes</div>
        ${s.notes ? `<div style="font-size:11px;color:var(--text-mid);line-height:1.65;white-space:pre-wrap">${esc(s.notes)}</div>` : '<div class="txt-dim-sm">No notes.</div>'}
      </div>

    </div>
    <div style="display:flex;gap:8px;padding:0 20px 14px 32px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();plantFromSeed(${i})">Plant This Seed →</button>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEdit('seeds',${i})">Edit</button>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openView('seeds',${i})">Full Detail</button>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();del('seeds',${i})" style="margin-left:auto">Delete</button>
    </div>
  </div>`;
}

function toggleVaultRow(i) {
  vaultExpanded = vaultExpanded === i ? null : i;
  render();
}

function seeds() {
  // All filtering, sorting, and display handled via _seedFilters + vaultSort
  const _sf = window._seedFilters || { type: 'All', breeder: 'All', container: 'All' };

  const getContainerVal = (s) => {
    if (s.containerId) return containerName(s.containerId);
    if (s.bin) return s.bin;
    const m = (s.notes||'').match(/\bBin[:\s]+([^\s|,]+)/i);
    return m ? m[1] : null;
  };

  // Build filtered + sorted list
  let list = DB.seeds.slice();
  if (search) { const _q = search.toLowerCase(); list = list.filter(s => (s.strain+' '+(s.breeder||'')+' '+(s.notes||'')+' '+(s.type||'')+' '+(s.year||'')).toLowerCase().includes(_q)); }
  if (_sf.type !== 'All') list = list.filter(s => s.type === _sf.type);
  if (_sf.breeder !== 'All') list = list.filter(s => (s.breeder||'') === _sf.breeder);
  if (_sf.container !== 'All') {
    if (_sf.container === '__none__') list = list.filter(s => !getContainerVal(s));
    else list = list.filter(s => getContainerVal(s) === _sf.container);
  }
  list = list.sort((a, b) => {
    if (vaultSort.col === 'qty') { const av = parseFloat(a.qty)||0, bv = parseFloat(b.qty)||0; return (av - bv) * vaultSort.dir; }
    let av, bv;
    if (vaultSort.col === 'breeder')       { av = (a.breeder||'').toLowerCase();      bv = (b.breeder||'').toLowerCase(); }
    else if (vaultSort.col === 'type')     { av = (a.type||'').toLowerCase();          bv = (b.type||'').toLowerCase(); }
    else if (vaultSort.col === 'container'){ av = (getContainerVal(a)||'').toLowerCase(); bv = (getContainerVal(b)||'').toLowerCase(); }
    else                                   { av = (a.strain||'').toLowerCase();        bv = (b.strain||'').toLowerCase(); }
    return av < bv ? -vaultSort.dir : av > bv ? vaultSort.dir : 0;
  });

  const totalQty    = DB.seeds.reduce((s,x) => s + (parseFloat(x.qty)||0), 0);
  const strainCount = DB.seeds.length;
  const neverPopped = DB.seeds.filter(s => seedTimesPopped(s) === 0).length;
  const breederCount = new Set(DB.seeds.map(s => s.breeder).filter(Boolean)).size;

  if (!DB.seeds.length) return `
    <div class="page-header">
      <div class="page-title">Seed Library</div>
      <div class="header-actions"><button class="btn btn-primary" onclick="openAdd('seeds')">+ Add Strain</button></div>
    </div>
    <div class="table-wrap"><div class="empty"><div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" style="stroke:#4ade80;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div><div class="empty-title">Vault is empty</div><div class="empty-hint">Add your first strain to start the collection.</div><button class="btn btn-primary" onclick="openAdd('seeds')">+ Add Strain</button></div></div>`;


  const sortArrow = (col) => vaultSort.col===col ? (vaultSort.dir===1?' ↑':' ↓') : '';

  const colHeader = () => `<div class="seed-col-header">
    <div></div>
    <div class="${vaultSort.col==='container'?'seed-col-sorted':''}" onclick="vaultSort=vaultSort.col==='container'?{col:'container',dir:-vaultSort.dir}:{col:'container',dir:1};render()">Container${sortArrow('container')}<span class="col-resize-handle" onmousedown="startColResize(event,1)" onclick="event.stopPropagation()"></span></div>
    <div class="${vaultSort.col==='strain'?'seed-col-sorted':''}" onclick="vaultSort=vaultSort.col==='strain'?{col:'strain',dir:-vaultSort.dir}:{col:'strain',dir:1};render()">Strain${sortArrow('strain')} <span style="font-size:7px;opacity:0.4;letter-spacing:0" title="Double-click to reset column widths" ondblclick="resetVaultCols()">⟺</span><span class="col-resize-handle" onmousedown="startColResize(event,2)" onclick="event.stopPropagation()"></span></div>
    <div class="${vaultSort.col==='breeder'?'seed-col-sorted':''}" onclick="vaultSort=vaultSort.col==='breeder'?{col:'breeder',dir:-vaultSort.dir}:{col:'breeder',dir:1};render()">Breeder${sortArrow('breeder')}<span class="col-resize-handle" onmousedown="startColResize(event,3)" onclick="event.stopPropagation()"></span></div>
    <div class="${vaultSort.col==='qty'?'seed-col-sorted':''}" onclick="vaultSort=vaultSort.col==='qty'?{col:'qty',dir:-vaultSort.dir}:{col:'qty',dir:1};render()">Qty${sortArrow('qty')}</div>
  </div>`;

  const buildSeedRow = (s) => {
    const i = DB.seeds.indexOf(s);
    const qty = s.qty || '?';
    const isOpen = vaultExpanded === i;
    const isWish = s.type === 'Wish List';
    const accent = SEED_TYPE_ACCENT[s.type] || 'var(--text-dim)';
    const qtyColor = seedQtyColor(qty);
    const qtyNum = parseFloat(qty);
    const qtyLbl = !isNaN(qtyNum) ? (qtyNum >= 100 ? 'deep stock' : qtyNum <= 3 ? 'low stock' : '') : '';
    const containerVal = getContainerVal(s);
    const notes = (s.notes||'').replace(/\n/g,' ').slice(0,60);

    return `<div class="seed-row-h ${isOpen?'seed-row-open':''} ${isWish?'seed-dimmed':''}" id="vrow-${i}" onclick="toggleVaultRow(${i})">
      <div class="seed-accent" style="background:${accent}"></div>
      <div class="seed-tape-cell">
        ${containerVal ? `<span class="seed-tape">${esc(containerVal)}</span>` : `<span style="font-size:10px;color:var(--border2)">—</span>`}
      </div>
      <div class="seed-strain-cell">
        <span class="seed-sig" style="background:${accent};${!isWish?'box-shadow:0 0 4px '+accent:''}"></span>
        <div style="min-width:0">
          <div class="seed-strain-name">${esc(s.strain)}</div>
          ${notes?`<div class="seed-strain-sub">${esc(notes)}</div>`:''}
        </div>
      </div>
      <div class="seed-breeder-cell"><span class="seed-breeder-val">${esc(s.breeder||'—')}</span></div>
      <div class="seed-qty-cell">
        <div class="seed-qty-val" style="color:${qtyColor}">${esc(qty)}</div>
        ${qtyLbl?`<div class="seed-qty-lbl">${qtyLbl}</div>`:''}
      </div>
    </div>
    ${isOpen?`<div class="seed-drawer">${vaultDrawer(s,i)}</div>`:''}`;
  };

  // Type breakdown tiles
  const typeStats = SEED_TYPES.slice(1).map(t => {
    const n = DB.seeds.filter(s => s.type === t).length;
    if (!n) return '';
    const accent = SEED_TYPE_ACCENT[t] || 'var(--text-dim)';
    const active = _sf.type === t;
    const short = t.split(',')[0].split(' ')[0];
    const tEsc = t.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div data-type="${esc(t).replace(/"/g,'&quot;')}" onclick="_setSeedFilter('type',this.dataset.type)"
      style="display:flex;flex-direction:column;justify-content:center;padding:8px 14px;border-right:1px solid var(--border);flex-shrink:0;cursor:pointer;user-select:none;transition:background 0.1s;${active?'background:rgba(74,222,128,0.08);outline:1px solid var(--accent)':''}">
      <div style="font-size:16px;font-weight:700;color:${accent};line-height:1">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${accent};margin-right:5px;vertical-align:middle;position:relative;top:-1px"></span>${n}
      </div>
      <div style="font-size:8px;letter-spacing:.08em;text-transform:uppercase;margin-top:3px;color:${accent};opacity:0.7">${short}${active?' ↑':''}</div>
    </div>`;
  }).join('');

  // Breeder chips
  const allBreeders = [...new Set(DB.seeds.map(s => s.breeder).filter(Boolean))].sort();
  const breederChips = ['All', ...allBreeders].map(b => {
    const on = _sf.breeder === b;
    const bEsc = esc(b).replace(/"/g,'&quot;');
    return `<span class="chip ${on?'active':''}" data-breeder="${bEsc}" onclick="_setSeedFilter('breeder',this.dataset.breeder)">${esc(b)}</span>`;
  }).join('');

  // Container chips — only containers that have at least one seed
  const allContainerVals = [...new Set(DB.seeds.map(s => {
    if (s.containerId) return containerName(s.containerId);
    if (s.bin) return s.bin;
    const m = (s.notes||'').match(/\bBin[:\s]+([^\s|,]+)/i);
    return m ? m[1] : null;
  }).filter(Boolean))].sort();
  const containerChips = ['All', ...allContainerVals, '__none__'].map(c => {
    const on = _sf.container === c;
    const label = c === '__none__' ? 'No container' : c;
    const cEsc = esc(c).replace(/"/g,'&quot;');
    return `<span class="chip ${on?'active':''}" data-container="${cEsc}" onclick="_setSeedFilter('container',this.dataset.container)">${esc(label)}</span>`;
  }).join('');

  const isFiltered = _sf.type!=='All' || _sf.breeder!=='All' || _sf.container!=='All' || search;
  const filterSummary = isFiltered ? `
    <div style="display:flex;align-items:center;gap:8px;padding:5px 14px;background:rgba(74,222,128,0.04);border-bottom:1px solid var(--border);margin-bottom:8px;border-radius:6px;font-size:10px;color:var(--text-dim)">
      Showing <strong style="color:var(--accent)">${list.length} strain${list.length!==1?'s':''}</strong>
      ${_sf.type!=='All'?`· ${esc(_sf.type)}`:''}
      ${_sf.breeder!=='All'?`· ${esc(_sf.breeder)}`:''}
      ${_sf.container!=='All'&&_sf.container!=='__none__'?`· ${esc(_sf.container)}`:''}
      ${_sf.container==='__none__'?'· No container':''}
      ${search?`· "${esc(search)}"` :''}
      <button class="btn btn-ghost btn-sm" style="margin-left:auto;padding:2px 8px;font-size:10px" onclick="_clearSeedFilters()">✕ Clear</button>
    </div>` : '';

  const groupedFinal = SEED_TYPES.slice(1).filter(t => list.some(s => s.type === t)).map(t => {
    const group = list.filter(s => s.type === t);
    const accent = SEED_TYPE_ACCENT[t] || 'var(--text-dim)';
    return `<div class="seed-section">
      <div class="stage-group-header" style="color:${accent}">${t} <span class="stage-group-count">${group.length} strain${group.length!==1?'s':''}</span></div>
      ${colHeader()}
      ${group.map(buildSeedRow).join('')}
    </div>`;
  }).join('');

  const flatFinal = `${colHeader()}${list.map(buildSeedRow).join('')}`;

  const noResults = isFiltered && !list.length ? `<div class="empty" style="padding:32px 20px"><div class="empty-title">No seeds match these filters</div><div class="empty-hint" style="margin-top:6px">Try removing a filter or clearing all.</div></div>` : '';

  return `
  <div class="page-header">
    <div class="page-title">Seed Library</div>
    <div class="page-subtitle">${strainCount} strains · ~${Math.round(totalQty)} seeds</div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="vaultGrouped=!vaultGrouped;render()">${vaultGrouped?'⊟ Ungroup':'⊞ Group by Type'}</button>
      <button class="btn btn-primary" onclick="openAdd('seeds')">+ Add Strain</button>
    </div>
  </div>

  <div style="display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow-x:auto;overflow-y:visible">
    <div style="display:flex;flex-direction:column;justify-content:center;padding:10px 16px;border-right:1px solid var(--border);flex-shrink:0"><div style="font-size:18px;font-weight:700;color:var(--purple);line-height:1">${strainCount}</div><div style="font-size:8px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:3px">Strains</div></div>
    <div style="display:flex;flex-direction:column;justify-content:center;padding:10px 16px;border-right:1px solid var(--border);flex-shrink:0"><div style="font-size:18px;font-weight:700;color:var(--accent);line-height:1">~${Math.round(totalQty)}</div><div style="font-size:8px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:3px">Seeds</div></div>
    <div style="display:flex;flex-direction:column;justify-content:center;padding:10px 16px;border-right:1px solid var(--border);flex-shrink:0"><div style="font-size:18px;font-weight:700;color:var(--text-mid);line-height:1">${breederCount}</div><div style="font-size:8px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:3px">Breeders</div></div>
    <div style="display:flex;flex-direction:column;justify-content:center;padding:10px 16px;border-right:1px solid var(--border);flex-shrink:0"><div style="font-size:18px;font-weight:700;color:var(--text-dim);line-height:1">${neverPopped}</div><div style="font-size:8px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:3px">Unpopped</div></div>
    ${typeStats}
  </div>

  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden">
    <div style="display:flex;align-items:center;border-bottom:1px solid var(--border)">
      <div style="font-size:8px;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase;padding:8px 10px 8px 14px;border-right:1px solid var(--border);min-width:80px;flex-shrink:0">Container</div>
      <div style="display:flex;align-items:center;gap:5px;padding:6px 12px;overflow-x:auto;flex:1">${containerChips}</div>
    </div>
    <div style="display:flex;align-items:center;border-bottom:1px solid var(--border)">
      <div style="font-size:8px;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase;padding:8px 10px 8px 14px;border-right:1px solid var(--border);min-width:80px;flex-shrink:0">Breeder</div>
      <div style="display:flex;align-items:center;gap:5px;padding:6px 12px;overflow-x:auto;flex:1">${breederChips}</div>
    </div>
    <div style="display:flex;align-items:center;padding:7px 14px">
      <span style="color:var(--text-dim);font-size:13px;margin-right:-22px;z-index:1">⌕</span>
      <input type="text" class="form-input" style="padding-left:28px" placeholder="Search strain, notes…" value="${esc(search)}" oninput="search=this.value;render()" />
    </div>
  </div>

  ${filterSummary}
  ${noResults}
  ${!noResults ? (vaultGrouped ? groupedFinal : flatFinal) : ''}`;
}

function breeding() {
  let list = DB.breeding;
  if (search) { const _q = search.toLowerCase(); list = list.filter(b => (b.mother+' '+(b.father||'')+' '+(b.crossName||'')+' '+(b.notes||'')).toLowerCase().includes(_q)); }

  const bFilter = window._breedFilter || 'all';
  const active   = DB.breeding.filter(b => !b.status || b.status === 'active');
  const harvested = DB.breeding.filter(b => b.status === 'harvested');
  const complete  = DB.breeding.filter(b => b.status === 'complete');

  let filtered = bFilter === 'active' ? active : bFilter === 'harvested' ? harvested : bFilter === 'complete' ? complete : list;
  if (search) { const _q = search.toLowerCase(); filtered = filtered.filter(b => (b.mother+' '+(b.father||'')+' '+(b.crossName||'')+' '+(b.notes||'')).toLowerCase().includes(_q)); }

  const statusBadge = b => {
    const s = b.status || 'active';
    if (s === 'active')    return `<span class="badge badge-veg">Active</span>`;
    if (s === 'harvested') return `<span class="badge badge-warn">Seeds Harvested</span>`;
    if (s === 'complete')  return `<span class="badge badge-complete">Complete</span>`;
    return '';
  };

  const renderCard = b => {
    const i = DB.breeding.indexOf(b);
    const daysSincePoll = b.pollinationDate ? daysBetween(b.pollinationDate, today()) : null;
    const seedTarget = 42; // typical seed maturation
    const progPct = daysSincePoll !== null ? Math.min(100, Math.round(daysSincePoll / seedTarget * 100)) : null;
    const progColor = progPct >= 100 ? 'var(--accent)' : progPct >= 70 ? 'var(--warn)' : 'var(--purple)';
    const isActive = !b.status || b.status === 'active';

    return `<div class="breed-card" onclick="openView('breeding',${i})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="breed-cross">
          <span>${esc(b.mother||'?')}</span>
          <span class="times">×</span>
          <span>${esc(b.father||'?')}</span>
          ${b.reversal?`<span style="margin-left:4px" class="badge badge-warn">Reversal</span>`:''}
        </div>
        ${statusBadge(b)}
      </div>
      <div class="breed-meta">
        ${b.crossName?`<span class="badge badge-hybrid">${esc(b.crossName)}</span>`:''}
        ${b.date?`<span class="text-dim" style="font-size:11px">${fmtDate(b.date)}</span>`:''}
        ${b.seedsProduced?`<span class="text-dim" style="font-size:11px">${esc(b.seedsProduced)} seeds</span>`:''}
        ${b.pollinationDate?`<span class="text-dim" style="font-size:11px">Pollinated ${fmtDate(b.pollinationDate)} · ${daysSincePoll}d ago</span>`:''}
      </div>
      ${progPct !== null && isActive ? `
        <div style="margin:10px 0 4px">
          <div class="prog-track">
            <div style="width:${progPct}%;height:100%;background:${progColor};border-radius:2px;transition:width 0.3s"></div>
          </div>
          <div class="prog-label">${progPct >= 100 ? 'Seeds likely mature — check the plant' : 'Day '+daysSincePoll+' of ~'+seedTarget+' · '+Math.max(0,seedTarget-daysSincePoll)+'d estimated'}</div>
        </div>` : ''}
      ${b.notes?`<div class="card-notes">${esc(b.notes)}</div>`:''}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap" onclick="event.stopPropagation()">
        ${isActive ? `<button class="btn btn-primary btn-sm" onclick="breedingHarvest(${i})">Seeds Harvested →</button>` : ''}
        ${b.status === 'harvested' ? `<button class="btn btn-primary btn-sm" onclick="breedingComplete(${i})">Complete →</button>` : ''}
        ${b.crossName && (b.seedsProduced || b.status === 'harvested') ? `<button class="btn btn-ghost btn-sm" onclick="breedingToSeeds(${i})">
          <svg width="12" height="12" viewBox="0 0 24 24" class="icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Add to Seed Library
        </button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="openEdit('breeding',${i})" style="margin-left:auto">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="del('breeding',${i})">Delete</button>
      </div>
    </div>`;
  };

  const chip = (key, label, count) => `<button class="chip${bFilter===key?' active':''}" onclick="window._breedFilter='${key}';render()">${label} <span style="opacity:0.6;font-size:10px">(${count})</span></button>`;

  return `
  <div class="page-header">
    <div class="page-title">Breeding Lab</div>
    <div class="page-subtitle">${active.length} active · ${harvested.length} harvested · ${complete.length} complete</div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openAdd('breeding')">+ Log Cross</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><span class="search-icon">⌕</span><input type="text" placeholder="Search crosses, donors, notes…" value="${esc(search)}" oninput="search=this.value;render()" /></div>
    <div class="filter-chips">
      ${chip('all','All',DB.breeding.length)}
      ${chip('active','Active',active.length)}
      ${chip('harvested','Seeds Harvested',harvested.length)}
      ${chip('complete','Complete',complete.length)}
    </div>
  </div>
  ${filtered.length ? filtered.map(renderCard).join('') :
  `<div class="empty"><div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" style="stroke:#4ade80;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto"><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></div><div class="empty-title">No breeding runs logged</div><div class="empty-hint">Track your crosses, pollen donors, seed production runs, and reversal projects.</div><button class="btn btn-primary" onclick="openAdd('breeding')">+ Log First Cross</button></div>`}`;
}

function breedingHarvest(i) {
  const b = DB.breeding[i];
  if (!b) return;
  showModal(`
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px">Seeds Harvested — ${esc(b.crossName||b.mother+' × '+b.father)}</div>
    <div class="form-field" style="margin-bottom:16px">
      <div class="form-label">How many seeds were produced?</div>
      <input class="form-input" id="harvest-seed-count" type="text" placeholder="e.g. ~40" autofocus />
    </div>
    <div class="form-hint" style="margin-bottom:16px">Leave blank if you haven't counted yet.</div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmBreedingHarvest(${i})">Confirm Harvest</button>
    </div>`);
}

function confirmBreedingHarvest(i) {
  const b = DB.breeding[i];
  if (!b) return;
  const count = document.getElementById('harvest-seed-count')?.value.trim();
  push();
  b.status = 'harvested';
  if (count) b.seedsProduced = count;
  save(); closeModal(); render();
  toast('Run marked as seeds harvested.');
}

function breedingComplete(i) {
  const b = DB.breeding[i];
  if (!b) return;
  const hasSeeds = b.crossName && b.seedsProduced;
  const alreadyInLib = hasSeeds && DB.seeds.find(s => s.strain === b.crossName);
  showModal(`
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px">Complete Run — ${esc(b.crossName||b.mother+' × '+b.father)}</div>
    <div style="color:var(--text-mid);font-size:12px;margin-bottom:20px;line-height:1.7">
      This run will be marked complete.
      ${hasSeeds && !alreadyInLib ? `Seeds will be added to your Seed Library automatically.` : ''}
      ${alreadyInLib ? `<span style="color:var(--text-dim)">"${esc(b.crossName)}" is already in your Seed Library.</span>` : ''}
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmBreedingComplete(${i})">Mark Complete</button>
    </div>`);
}

function confirmBreedingComplete(i) {
  const b = DB.breeding[i];
  if (!b) return;
  push();
  b.status = 'complete';
  save();
  // Auto-add to seed library if not already there
  if (b.crossName && !DB.seeds.find(s => s.strain === b.crossName)) {
    const seed = {
      uid: Math.random().toString(36).slice(2,10),
      strain: b.crossName,
      breeder: 'Home Bred',
      type: 'My Seeds',
      qty: b.seedsProduced || '',
      notes: `From breeding run: ${b.mother||'?'} × ${b.father||'?'}${b.date?' ('+fmtDate(b.date)+')':''}${b.reversal?' — reversal':''}`,
      timesPopped: 0,
      wishList: false
    };
    DB.seeds.push(seed);
    save();
    toast(`Run complete. "${b.crossName}" added to Seed Library.`);
  } else {
    toast('Run marked complete.');
  }
  closeModal(); render();
}


function breedingToSeeds(i) {
  const b = DB.breeding[i];
  if (exists) { toast(`"${b.crossName}" is already in your Seed Library.`, 'warn'); return; }
  push();
  const seed = {
    uid: Math.random().toString(36).slice(2,10),
    strain: b.crossName,
    breeder: 'Home Bred',
    type: 'My Seeds',
    qty: b.seedsProduced || '',
    notes: `From breeding run: ${b.mother||'?'} × ${b.father||'?'}${b.date?' ('+fmtDate(b.date)+')':''}${b.reversal?' — reversal':''}`,
    timesPopped: 0,
    wishList: false
  };
  DB.seeds.push(seed);
  save();
  toast(`"${b.crossName}" added to Seed Library.`);
  render();
}


function stats() {
  const { history: allComplete, plants } = _gc();
  const hist    = allComplete.filter(g => !g.fate);
  const journal = DB.journal;
  const seeds   = DB.seeds;

  const totalRuns   = allComplete.length;
  const harvestRuns = hist.length;
  const cullCount   = allComplete.filter(g => g.fate).length;
  const cullPct     = totalRuns ? Math.round(cullCount / totalRuns * 100) : 0;

  const withFlower  = hist.filter(g => g.flipDate && g.harvestDate);
  const flowerTimes = withFlower.map(g => daysBetween(g.flipDate, g.harvestDate));
  const avgFlower   = flowerTimes.length ? flowerTimes.reduce((a,b)=>a+b,0)/flowerTimes.length : null;
  const minFlower   = flowerTimes.length ? Math.min(...flowerTimes) : null;
  const maxFlower   = flowerTimes.length ? Math.max(...flowerTimes) : null;

  const pmRuns    = hist.filter(h => /\bpm\b|powdery mildew/i.test(h.notes||'')).length;
  const pmPct     = harvestRuns ? Math.round(pmRuns / harvestRuns * 100) : 0;
  const pmJournal = journal.filter(j => /\bpm\b|powdery mildew/i.test((j.notes||'')+' '+(j.issues||[]).join(' '))).length;

  const issueMap = { PM:0, Herm:0, Pest:0, Deficiency:0, 'Root/Overwater':0, 'Light Stress':0 };
  journal.forEach(j => {
    const t = ((j.notes||'')+' '+(j.issues||[]).join(' ')).toLowerCase();
    if (/\bpm\b|powdery mildew/.test(t)) issueMap['PM']++;
    if (/herm/.test(t)) issueMap['Herm']++;
    if (/pest|spider|mite|aphid|thrip|gnat/.test(t)) issueMap['Pest']++;
    if (/deficien|cal.mag|nute burn|nutrient burn/.test(t)) issueMap['Deficiency']++;
    if (/overwater|root rot/.test(t)) issueMap['Root/Overwater']++;
    if (/light stress|light burn/.test(t)) issueMap['Light Stress']++;
  });
  const maxIssue = Math.max(1, ...Object.values(issueMap));

  const strainStats = {};
  withFlower.forEach(g => {
    const name = (g.strain||'').trim();
    const fd = daysBetween(g.flipDate, g.harvestDate);
    if (!strainStats[name]) strainStats[name] = { runs:0, totalDays:0, pmCount:0 };
    strainStats[name].runs++;
    strainStats[name].totalDays += fd;
    if (/\bpm\b|powdery mildew/i.test(g.notes||'')) strainStats[name].pmCount++;
  });
  const strainList = Object.entries(strainStats)
    .map(([name, s]) => ({ name, runs:s.runs, avg:Math.round(s.totalDays/s.runs), pmPct:Math.round(s.pmCount/s.runs*100) }))
    .sort((a,b) => b.runs - a.runs);

  const vpdEntries = journal.filter(j => j.vpd && j.plantId);
  let vpdGood = 0, vpdBad = 0;
  vpdEntries.forEach(j => {
    const grow = DB.grows.find(g => g.uid === j.plantId);
    const stage = grow ? grow.stage : 'flower';
    const flipDate = grow ? grow.flipDate : null;
    const v = parseFloat(j.vpd);
    const { lo, hi } = vpdRange(stage, flipDate);
    (v >= lo && v <= hi) ? vpdGood++ : vpdBad++;
  });
  const vpdTotal = vpdGood + vpdBad;
  const vpdPct   = vpdTotal ? Math.round(vpdGood / vpdTotal * 100) : null;

  const journalByMonth = {};
  journal.forEach(j => {
    if (!j.date) return;
    const mo = j.date.slice(0,7);
    journalByMonth[mo] = (journalByMonth[mo]||0) + 1;
  });
  const months = Object.keys(journalByMonth).sort().slice(-6);
  const maxMonthEntries = Math.max(1, ...months.map(m=>journalByMonth[m]));

  const lowStockSeeds = seeds.filter(s => { const q=parseFloat(s.qty); return !isNaN(q)&&q<=3; });
  const neverPopped   = seeds.filter(s => seedTimesPopped(s)===0).length;
  const typeBreakdown = {};
  seeds.forEach(s => { typeBreakdown[s.type||'Unknown']=(typeBreakdown[s.type||'Unknown']||0)+1; });

  const inFlower  = plants.filter(g => g.stage === 'flower');
  const inVeg     = plants.filter(g => g.stage === 'veg' || g.stage === 'seedling');
  const avgVpdNow = (() => {
    const recent = journal.filter(j=>j.vpd).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
    if (!recent.length) return null;
    return (recent.reduce((s,j)=>s+parseFloat(j.vpd),0)/recent.length).toFixed(2);
  })();

  const insights = [];
  if (pmPct >= 50) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M19 18a2 2 0 0 0 2-2 8 8 0 0 0-16 0 2 2 0 0 0 2 2h12z"/><path d="M12 18v4"/><path d="M9 22h6"/></svg>`, text:'<strong>PM is a recurring problem.</strong> It showed up in '+pmPct+'% of your harvested runs. Consider dialing humidity down in late flower and keeping air moving.' });
  else if (pmPct > 0) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M19 18a2 2 0 0 0 2-2 8 8 0 0 0-16 0 2 2 0 0 0 2 2h12z"/><path d="M12 18v4"/><path d="M9 22h6"/></svg>`, text:'PM appeared in '+pmPct+'% of your harvested runs ('+pmRuns+' of '+harvestRuns+'). Still worth watching late flower humidity.' });
  if (avgFlower && avgFlower > 68) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`, text:'<strong>Your runs tend to go long.</strong> Average finish is '+avgFlower.toFixed(1)+' days — longer than the typical 63-day target.' });
  if (avgFlower && avgFlower < 56) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`, text:'<strong>Fast finisher.</strong> Your average flower time is '+avgFlower.toFixed(1)+' days.' });
  if (vpdPct !== null && vpdPct < 70) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>`, text:'<strong>VPD is frequently out of range</strong> — only '+vpdPct+'% of logged readings were in the target zone.' });
  if (vpdPct !== null && vpdPct >= 90) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><polyline points="20 6 9 17 4 12"/></svg>`, text:'<strong>VPD is dialed.</strong> '+vpdPct+'% of your logged readings are in the target zone.' });
  if (neverPopped > 20) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M8 2h8"/><path d="M9 2v2.789a4 4 0 0 1-.672 2.219l-.656.984A4 4 0 0 0 7 10.212V20a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-9.789a4 4 0 0 0-.672-2.219l-.656-.984A4 4 0 0 1 15 4.788V2"/><path d="M7 15a6.472 6.472 0 0 1 5 0 6.47 6.47 0 0 0 5 0"/></svg>`, text:'<strong>'+neverPopped+' strains have never been popped.</strong> Worth rotating before they age out.' });
  if (lowStockSeeds.length) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`, text:'<strong>'+lowStockSeeds.length+' strain'+(lowStockSeeds.length>1?'s are':' is')+' critically low</strong> (3 seeds or fewer): '+lowStockSeeds.slice(0,3).map(s=>s.strain).join(', ')+(lowStockSeeds.length>3?' and more':'')+'.' });
  if (journal.length < 10 && plants.length > 0) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`, text:'<strong>Start journaling more.</strong> Only '+journal.length+' entries across '+plants.length+' plant'+(plants.length>1?'s':'')+'.' });
  if (strainList.length && strainList[0].pmPct === 0 && strainList[0].runs >= 2) insights.push({ icon:`<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>`, text:'<strong>'+strainList[0].name+'</strong> has run clean across '+strainList[0].runs+' run'+(strainList[0].runs>1?'s':'')+'.' });
  if (cullPct >= 30 && totalRuns >= 5) insights.push({ icon:'♂', text:'<strong>'+cullCount+' of '+totalRuns+' records</strong> ('+cullPct+'%) are culled or lost plants.' });

  function donut(slices, size) {
    size = size||80;
    const total = slices.reduce((s,x)=>s+x.val,0);
    if (!total) return '';
    const cx=size/2, cy=size/2, r=size*0.36, sw=size*0.18;
    let angle = -Math.PI/2;
    const paths = slices.map(function(sl) {
      const pct = sl.val/total;
      const a1=angle, a2=angle+pct*Math.PI*2;
      const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
      const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
      const large=pct>0.5?1:0;
      angle=a2;
      return '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+',0,'+large+',1,'+x2+','+y2+' Z" fill="'+sl.color+'" opacity="0.85"/>';
    });
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="var(--surface2)"/>'+paths.join('')+'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r-sw)+'" fill="var(--surface)"/></svg>';
  }

  const donutSlices = Object.entries(typeBreakdown).map(([t,n])=>({ label:t, val:n, color:SEED_TYPE_ACCENT[t]||'var(--text-dim)' }));

  let html = '';

  if (insights.length) {
    html += '<div style="margin-bottom:20px"><div style="font-size:9px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px">Insights</div>';
    html += insights.map(ins=>'<div class="insight-card"><div class="insight-icon">'+ins.icon+'</div><div class="insight-text">'+ins.text+'</div></div>').join('');
    html += '</div>';
  }

  html += '<div class="stats-grid-3">';
  html += '<div class="stat-panel"><div class="stat-panel-title">Avg Flower Time</div>';
  html += avgFlower ? '<div class="stat-hero">'+avgFlower.toFixed(1)+'<span class="stat-hero-unit">days</span></div><div class="stat-hero-sub">across '+withFlower.length+' harvested run'+(withFlower.length!==1?'s':'')+'</div><div class="stat-sub"><span style="color:var(--accent)">↓ '+minFlower+'d fastest</span> &nbsp;·&nbsp; <span style="color:var(--warn)">↑ '+maxFlower+'d longest</span></div>' : '<div class="no-data-msg">No completed runs yet</div>';
  html += '</div>';

  html += '<div class="stat-panel"><div class="stat-panel-title">PM Rate <span>'+pmRuns+' of '+harvestRuns+' runs</span></div>';
  html += harvestRuns ? '<div class="stat-hero" style="color:'+(pmPct>=50?'var(--danger)':pmPct>0?'var(--warn)':'var(--accent)')+'">'+pmPct+'<span class="stat-hero-unit">%</span></div><div class="stat-hero-sub">of harvested grows affected</div>' : '<div class="no-data-msg">No completed runs yet</div>';
  html += '</div>';

  html += '<div class="stat-panel"><div class="stat-panel-title">VPD Compliance <span>'+vpdTotal+' readings</span></div>';
  html += vpdPct !== null ? '<div class="stat-hero" style="color:'+(vpdPct>=85?'var(--accent)':vpdPct>=65?'var(--warn)':'var(--danger)')+'">'+vpdPct+'<span class="stat-hero-unit">%</span></div><div class="stat-hero-sub">readings in target range</div>'+(avgVpdNow?'<div class="stat-sub">Recent avg: <span style="color:var(--accent)">'+avgVpdNow+' kPa</span></div>':''): '<div class="no-data-msg">No VPD entries logged yet</div>';
  html += '</div></div>';

  html += '<div class="stats-grid">';
  html += '<div class="stat-panel"><div class="stat-panel-title">Issue Frequency <span>from journal entries</span></div>';
  if (journal.length) {
    html += '<div style="margin-top:4px">';
    const colors={PM:'var(--text-dim)',Herm:'var(--orange)',Pest:'var(--danger)',Deficiency:'var(--warn)','Root/Overwater':'var(--blue)','Light Stress':'var(--purple)'};
    html += Object.entries(issueMap).map(([lbl,cnt])=>'<div class="mini-bar-row"><div class="mini-bar-label">'+lbl+'</div><div class="mini-bar-track"><div class="mini-bar-fill" style="width:'+Math.round(cnt/maxIssue*100)+'%;background:'+(colors[lbl]||'var(--accent)')+'"></div></div><div class="mini-bar-val">'+cnt+'×</div></div>').join('');
    html += '</div>';
  } else { html += '<div class="no-data-msg">No journal entries yet</div>'; }
  html += '</div>';

  html += '<div class="stat-panel"><div class="stat-panel-title">Per-Strain Breakdown <span>'+strainList.length+' strains</span></div>';
  if (strainList.length) {
    html += '<div style="margin-top:4px">'+strainList.slice(0,8).map(s=>'<div class="mini-bar-row"><div class="mini-bar-label">'+esc(s.name)+'</div><div class="mini-bar-track"><div class="mini-bar-fill" style="width:'+Math.min(100,Math.round(s.avg/84*100))+'%;background:var(--purple)"></div></div><div class="mini-bar-val" style="color:var(--text-mid)">'+s.avg+'d</div></div>').join('')+'</div>';
    if (strainList.length > 8) html += '<div style="font-size:10px;color:var(--text-dim);margin-top:8px">+'+(strainList.length-8)+' more strains</div>';
  } else { html += '<div class="no-data-msg">No completed runs with data yet</div>'; }
  html += '</div></div>';

  html += '<div class="stats-grid">';
  html += '<div class="stat-panel"><div class="stat-panel-title">Journal Activity <span>last 6 months</span></div>';
  if (months.length) {
    html += '<div class="timeline-spark" style="margin-top:8px">'+months.map(m=>'<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div class="spark-bar" style="height:'+Math.max(4,Math.round(journalByMonth[m]/maxMonthEntries*44))+'px;background:var(--accent);opacity:0.7;width:100%"></div><div class="spark-label">'+m.slice(5)+'</div></div>').join('')+'</div>';
    html += '<div style="font-size:11px;color:var(--text-dim);margin-top:10px">'+journal.length+' total entries · avg '+(plants.length?Math.round(journal.length/Math.max(1,plants.length)):0)+' per plant</div>';
  } else { html += '<div class="no-data-msg">No journal entries yet</div>'; }
  html += '</div>';

  html += '<div class="stat-panel"><div class="stat-panel-title">Seed Library Health <span>'+seeds.length+' strains</span></div>';
  if (seeds.length) {
    html += '<div class="donut-wrap" style="margin-top:8px">'+donut(donutSlices,90)+'<div class="donut-legend">'+donutSlices.map(sl=>'<div class="donut-legend-item"><div class="donut-legend-dot" style="background:'+sl.color+'"></div><span>'+sl.label+' <span style="color:var(--text-dim)">('+sl.val+')</span></span></div>').join('')+'</div></div>';
    html += '<div style="margin-top:14px;display:flex;gap:20px;flex-wrap:wrap"><div><div class="stat-label" style="font-size:9px">Never Popped</div><div style="font-family:var(--serif);font-size:22px;font-style:italic;color:var(--text-mid)">'+neverPopped+'</div></div><div><div class="stat-label" style="font-size:9px">Low Stock</div><div style="font-family:var(--serif);font-size:22px;font-style:italic;color:'+(lowStockSeeds.length?'var(--warn)':'var(--text-mid)')+'">'+lowStockSeeds.length+'</div></div><div><div class="stat-label" style="font-size:9px">Total Seeds</div><div style="font-family:var(--serif);font-size:22px;font-style:italic;color:var(--accent)">~'+Math.round(seeds.reduce((s,x)=>s+(parseFloat(x.qty)||0),0))+'</div></div></div>';
  } else { html += '<div class="no-data-msg">No seeds in library yet</div>'; }
  html += '</div></div>';

  html += '<div class="stats-grid">';
  html += '<div class="stat-panel"><div class="stat-panel-title">Grow Record <span>'+totalRuns+' total entries</span></div>';
  html += '<div style="display:flex;gap:20px;margin:8px 0 12px;flex-wrap:wrap"><div><div class="stat-label">Harvested</div><div style="font-family:var(--serif);font-size:32px;font-style:italic;color:var(--accent)">'+hist.length+'</div></div><div><div class="stat-label">Culled / Lost</div><div style="font-family:var(--serif);font-size:32px;font-style:italic;color:'+(cullCount?'var(--danger)':'var(--text-mid)')+'">'+cullCount+'</div></div><div><div class="stat-label">PM Runs</div><div style="font-family:var(--serif);font-size:32px;font-style:italic;color:'+(pmRuns?'var(--warn)':'var(--text-mid)')+'">'+pmRuns+'</div></div><div><div class="stat-label">Breeding Runs</div><div style="font-family:var(--serif);font-size:32px;font-style:italic;color:var(--purple)">'+DB.breeding.length+'</div></div></div>';
  if (withFlower.length >= 3) {
    html += '<div style="margin-top:4px"><div style="font-size:9px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Fastest finishes</div>';
    html += [...withFlower].sort((a,b)=>daysBetween(a.flipDate,a.harvestDate)-daysBetween(b.flipDate,b.harvestDate)).slice(0,3).map(g=>{ const fd=daysBetween(g.flipDate,g.harvestDate); return '<div class="mini-bar-row"><div class="mini-bar-label">'+esc(g.strain)+'</div><div class="mini-bar-track"><div class="mini-bar-fill" style="width:'+Math.round(fd/84*100)+'%;background:var(--teal)"></div></div><div class="mini-bar-val">'+fd+'d</div></div>'; }).join('');
    html += '</div>';
  }
  html += '</div></div>';

  return html;
}

  pm_confirm: {
    result: true, title: 'Powdery Mildew (PM)',
    category: 'Fungal', severity: 'high',
    confirm: 'White circular powdery patches on leaf surfaces. Can be rubbed off (unlike downy mildew which is underneath). Smell may be musty. Spreads in circular patterns from infection sites.',
    what: 'Botrytis/PM thrives at 50–80°F with high humidity and poor airflow. Spores are everywhere — conditions trigger it. Genetic susceptibility varies hugely. Once established, it\'s a management game, not a cure.',
    treat: [
      { step:1, text:'<strong>Immediately isolate the plant</strong> if possible. Don\'t shake or disturb leaves — spores spread.' },
      { step:2, text:'<strong>Reduce humidity NOW.</strong> Get RH below 50% in flower, below 45% in late flower. PM cannot establish below 45% RH.' },
      { step:3, text:'<strong>Remove visibly infected leaves</strong> — bag immediately, don\'t compost. Don\'t cut more than 20% of the plant at once.' },
      { step:4, text:'<strong>Treatment options:</strong> 1) Potassium bicarbonate (Green Cure) — most effective, disrupts spore cell membrane. 2) Dilute hydrogen peroxide (3% H₂O₂ : water, 1:9 ratio) — spray at lights-off. 3) Dilute neem oil (early veg only — not in flower, taints buds). 4) Milk spray (30% milk:70% water) — genuinely works, creates alkaline environment.' },
      { step:5, text:'<strong>Spray every 3 days</strong> minimum until clear, then weekly as prevention. Alternate products to avoid resistance.' },
      { step:6, text:'<strong>Bud wash at harvest</strong> — H₂O₂ wash is essential if PM reached buds at any point.' },
    ],
    prevent: 'Airflow is king. Every leaf should move slightly. Keep RH under 50% in flower. UV-C light systems prevent PM. Silica supplements strengthen cell walls. Consider PM-resistant genetics (critical if you have recurring issues).',
    notes: 'PM spores overwinter on surfaces. Clean your tent/room between runs with dilute bleach or H₂O₂. Your environment is the problem — genetics are secondary.' },

  bud_rot: {
    result: true, title: 'Botrytis (Bud Rot)',

    confirm: 'Gray or white fuzzy mold growing inside or on bud structure. Individual pistils may turn brown and die in a circular pattern. When you pull the bud apart, the inside may be gray, mushy, or dry and dusty. It smells off.',
    what: 'Botrytis cinerea. The most devastating late-flower disease. Spreads by spores and thrives in high humidity, dense buds, poor airflow, and temps 60–77°F. Once visible, significant internal spread has already occurred.',
    treat: [
      { step:1, text:'<strong>Remove infected material immediately and completely.</strong> Cut 2–3 inches below visible infection. Bag it. Don\'t shake it.' },

      { step:3, text:'<strong>Drop humidity hard.</strong> Below 45% RH. Run dehumidifier constantly. Increase airflow through canopy.' },
      { step:4, text:'<strong>If widespread:</strong> Harvest early. A 70% done bud you can use beats 100% done bud you have to throw away.' },

  spider_mites: {
    result: true, title: 'Spider Mites',
    category: 'Pest', severity: 'high',
    confirm: 'Stippling (tiny yellow/white dots) on leaf tops from feeding punctures. Check undersides with a loupe — tiny oval mites, may see eggs. Fine silk webbing in heavy infestations. Rapid reproduction in hot/dry conditions.',
    what: 'Two-spotted spider mite (Tetranychus urticae) is most common. They thrive above 80°F and in low humidity. Can go from nothing to full infestation in 5–7 days in ideal conditions. Resistance develops quickly to pesticides.',
    treat: [
      { step:1, text:'<strong>Identify severity.</strong> Early (dots, few mites) vs late (visible webbing everywhere) require different responses.' },
      { step:2, text:'<strong>Immediate: lower temp below 75°F and raise humidity to 60%+</strong> — hostile to mites. Won\'t fix it but slows them.' },
      { step:3, text:'<strong>Spray undersides of all leaves</strong> with your treatment — that\'s where mites live. Top leaf spraying barely helps.' },
      { step:4, text:'<strong>Treatment rotation (resistance prevention):</strong> Week 1 — Spinosad (Monterey Garden). Week 2 — Isopropyl alcohol (50% dilution in water). Week 3 — Neem oil (veg only). Repeat. Never use same product twice in a row.' },
      { step:5, text:'<strong>In flower:</strong> Avoid neem and anything with residual systemic action. Spinosad and dilute H₂O₂ (1:9) are safest late in flower.' },
      { step:6, text:'<strong>Predatory mites</strong> (Phytoseiulus persimilis, Amblyseius californicus) — the gold standard. Release 3–7 days in a row. No resistance possible. Works best before heavy infestation.' },
    ],
    prevent: 'Inspect plants weekly with a loupe. Sticky traps at canopy level. Keep temps under 80°F. Introduce predatory mites preventatively. Never bring outdoor plants inside without full inspection.' },

  fungus_gnats: {
    result: true, title: 'Fungus Gnats',
    category: 'Pest', severity: 'med',
    confirm: 'Adult gnats are small (2–3mm), dark, with long legs — they flutter lazily. Larvae are the real problem: white, thread-like, in the top 2" of medium. Plants look overwatered — gnats damage roots.',
    what: 'Adults are annoying but mostly harmless. Larvae feed on root hairs and organic matter in the top of your medium. This causes nutrient deficiency symptoms and overwatering-like drooping. Wet soil is the cause.',
    treat: [
      { step:1, text:'<strong>Let medium dry out more between waterings.</strong> Larvae need moisture — drying the top 2" kills eggs and starves larvae.' },
      { step:2, text:'<strong>Yellow sticky traps</strong> at soil level — catches adults and breaks the reproductive cycle. Replace weekly.' },
      { step:3, text:'<strong>Bacillus thuringiensis israelensis (BTi) — Gnatrol or Mosquito Bits</strong> — drench soil with each watering. BTi is a bacteria that kills larvae specifically. Safe, organic, highly effective.' },
      { step:4, text:'<strong>Top-dress with diatomaceous earth (DE)</strong> — 1/4" layer on soil surface. Physically kills larvae crawling through.' },
      { step:5, text:'<strong>Beneficial nematodes</strong> (Steinernema feltiae) — soil drench, hunt and kill larvae. Works well in combination with BTi.' },
    ],
    prevent: 'Don\'t overwater. Never leave standing water. Avoid using compost-heavy mixes that stay wet. Ensure good soil drainage. Yellow sticky traps as early warning system.' },

  aphids_mealybugs: {
    result: true, title: 'Aphids / Mealybugs',
    category: 'Pest', severity: 'med',
    confirm: 'Aphids: small (1–3mm) soft-bodied insects, green/black/white, clustered on new growth and stems. Mealybugs: white fluffy cottony masses, usually at stem joints and leaf undersides. Both produce honeydew (sticky residue) that encourages sooty mold.',

      { step:2, text:'<strong>Insecticidal soap</strong> (potassium salts of fatty acids) — 2–3 applications, 3 days apart. Coat all surfaces. Safe in veg and early flower.' },
      { step:3, text:'<strong>Neem oil</strong> — effective in veg, avoid in flower (affects taste). Add a few drops of dish soap as emulsifier.' },
      { step:4, text:'<strong>Spinosad</strong> — effective on aphids, less so mealybugs. Good rotation partner.' },
      { step:5, text:'<strong>Predatory insects:</strong> Ladybugs and lacewings for aphids. Cryptolaemus beetle for mealybugs. Best for prevention or light infestations.' },
    ],
    prevent: 'Inspect new plants before introducing. Screen intake vents. Companion planting (basil, marigolds) can deter. Regular inspections with loupe.' },

  russet_mites: {
    result: true, title: 'Russet / Broad Mites',
    category: 'Pest', severity: 'high',
    confirm: 'No visible insects without 60x+ magnification. Symptoms: new growth curls upward (taco-ing), leaves look shiny or greasy, growth is stunted and twisted, tips may die. Plant looks sick with no obvious cause. Often misdiagnosed as nutrient issues or pH problems.',
    what: 'Aculops cannibicola (russet mite) and Polyphagotarsonemus latus (broad mite) are microscopic. By the time damage is visible, infestation is heavy. They live inside growing tips — very hard to reach with contact sprays.',
    treat: [
      { step:1, text:'<strong>Confirm with a 60x loupe or microscope</strong> — look at the underside of new growth and inside curled leaf edges. Russet mites are barely visible white/yellow specs. Broad mites are similar.' },
      { step:2, text:'<strong>Spinosad (Monterey Garden Insect Spray)</strong> — most effective spray treatment. Must contact mites directly. Spray into growing tips and new growth where they hide.' },

      { step:5, text:'<strong>Amblyseius cucumeris</strong> predatory mites — effective at hunting russet and broad mites. Release preventatively or at first sign.' },

  overwater_droop: {

    confirm: 'Leaves droop but feel thick and firm (not limp). Soil is wet or damp. Pot is heavy. Leaves may be dark green. Stems may look bloated. Classic "the claw" in nitrogen-rich overwatered plants.',

  nitrogen_claw: {
    result: true, title: 'Nitrogen Toxicity (The Claw)',
    category: 'Deficiency', severity: 'med',
    confirm: 'Leaf tips curl sharply downward like a claw. Leaves are very dark green (almost blue-green). Usually affects lower-to-mid leaves first. Plant may look over-healthy at first glance.',
    what: 'Too much nitrogen — specifically too much ammoniacal nitrogen which the plant absorbs excessively. Common when using nitrogen-heavy veg nutrients into flower, or overusing organic matter that releases a lot of N.',

function sxGo(nodeId, label) {
  if (label) sxPath.push({ node: sxNode, label });
  sxNode = nodeId;
  render();
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

function sxBack() {
  if (!sxPath.length) return;
  const prev = sxPath.pop();
  sxNode = prev.node;
  render();
}

function sxReset() {
  sxPath = [];
  sxNode = 'root';
  render();
}



function symptomChecker() {
  const node = SX[sxNode];
  if (!node) return '<div class="sx-card"><div class="sx-question">Unknown node. <button class="btn btn-ghost btn-sm" onclick="sxReset()">Start Over</button></div></div>';

  const disclaimer = `<div style="font-size:10px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:14px;line-height:1.6">
     <strong style="color:var(--text-mid)">Educational tool only.</strong> Diagnoses are based on common patterns and should be treated as a starting point, not a definitive answer. Multiple issues can present similarly. When in doubt, consult experienced growers or extension resources.
  </div>`;

  // Breadcrumb
  const crumb = sxPath.length ? `<div class="sx-breadcrumb">
    <span style="cursor:pointer;color:var(--accent)" onclick="sxReset()">Start</span>
    ${sxPath.map((p,i) => `<span class="sx-breadcrumb-sep">›</span><span>${esc(p.label)}</span>`).join('')}
    <span class="sx-breadcrumb-sep">›</span><span style="color:var(--text)">${node.result ? node.title : '…'}</span>
  </div>` : '';

  // Result node
  if (node.result) {
    const sevClass = { low:'sx-sev-low', med:'sx-sev-med', high:'sx-sev-high' }[node.severity] || 'sx-sev-med';
    const sevLabel = { low:'Low Urgency', med:'Moderate — Act Soon', high:'High — Act Now' }[node.severity] || '';
    const catColors = { Fungal:'var(--orange)', Deficiency:'var(--warn)', Pest:'var(--danger)', Environment:'var(--blue)', Normal:'var(--accent)', Hermaphroditism:'var(--pink)' };
    return `${disclaimer}${crumb}
    <div class="sx-card sx-result">
      <div class="sx-result-label" style="color:${catColors[node.category]||'var(--accent)'}">${node.category}</div>
      <div class="sx-result-title">${node.title}</div>
      <div class="${sevClass} sx-severity">${sevLabel}</div>
      <div class="sx-section">
        <div class="sx-section-title">Confirm It</div>
        <div class="sx-section-body">${node.confirm}</div>
      </div>
      <div class="sx-section">
        <div class="sx-section-title">What's Happening</div>
        <div class="sx-section-body">${node.what}</div>
      </div>
      <div class="sx-section">
        <div class="sx-section-title">Treatment Protocol</div>
        <div class="sx-protocol">${node.treat.map(t=>`
          <div class="sx-step">
            <div class="sx-step-num">${t.step}</div>
            <div class="sx-step-text">${t.text}</div>
          </div>`).join('')}
        </div>
      </div>
      ${node.prevent ? `<div class="sx-section">
        <div class="sx-section-title">Prevention</div>
        <div class="sx-section-body">${node.prevent}</div>
      </div>` : ''}
      ${node.notes ? `<div class="sx-section">
        <div class="sx-section-title">Notes</div>
        <div class="sx-section-body" style="color:var(--text-dim);font-style:italic">${node.notes}</div>
      </div>` : ''}
      <div class="sx-nav">
        ${sxPath.length ? `<button class="btn btn-ghost btn-sm" onclick="sxBack()">← Back</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="sxReset()">Start Over</button>
        <button class="btn btn-primary btn-sm" onclick="openAdd('journal')">+ Log This Issue</button>
      </div>
    </div>`;
  }

  // Question node
  return `${crumb}
  <div class="sx-card">
    <div class="sx-question">${node.q}</div>
    ${node.hint ? `<div class="sx-hint">${node.hint}</div>` : ''}
    <div class="sx-choices">
      ${node.choices.map(c => `
        <button class="sx-choice" onclick="sxGo('${c.next}','${esc(c.label)}')">
          <span class="sx-choice-icon">${c.icon}</span>
          <div class="sx-choice-text"><strong>${c.label}</strong>${c.desc ? c.desc : ''}</div>
        </button>`).join('')}
    </div>
    <div class="sx-nav">
      ${sxPath.length ? `<button class="btn btn-ghost btn-sm" onclick="sxBack()">← Back</button>` : ''}
    </div>
  </div>`;
}

function reference() {
  const clonex = (refGallons * 3.78541 * 5).toFixed(1);
  const hydroguard = (refGallons * 2).toFixed(0);

  const tabs = `<div class="ref-tabs">
    <div class="ref-tab ${refTab==='reference'?'active':''}" onclick="nav('reference')">Reference</div>
    <div class="ref-tab ${refTab==='symptoms'?'active':''}" onclick="nav('symptoms')"><svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></svg> Symptom Checker</div>
  </div>`;

  if (refTab === 'symptoms') return `
  <div class="page-header"><div class="page-title">Reference</div><div class="page-subtitle">Symptom diagnosis & treatment protocols</div></div>
  ${tabs}
  ${symptomChecker()}`;

  return `
  <div class="page-header"><div class="page-title">Reference</div><div class="page-subtitle">Grow parameters, recipes & protocols</div></div>
  ${tabs}
  <div class="ref-grid">
    <div>
      <div class="ref-section">
        <div class="ref-title">VPD Targets</div>
        <table class="ref-table">
          <thead><tr><th>Stage</th><th>VPD (kPa)</th><th>Temp (°F)</th><th>RH %</th></tr></thead>
          <tbody>
            <tr><td class="stage-cell">Seedling / Clone</td><td>0.4 – 0.8</td><td>75–80</td><td>65–75</td></tr>
            <tr><td class="stage-cell">Early Veg</td><td>0.8 – 1.0</td><td>72–78</td><td>55–65</td></tr>
            <tr><td class="stage-cell">Late Veg</td><td>1.0 – 1.2</td><td>70–78</td><td>50–60</td></tr>
            <tr><td class="stage-cell">Early Flower (wk 1–3)</td><td>1.0 – 1.5</td><td>68–76</td><td>45–55</td></tr>
            <tr><td class="stage-cell">Mid / Late Flower</td><td>1.2 – 1.8</td><td>65–74</td><td>38–50</td></tr>
          </tbody>
        </table>
        <div class="form-hint" style="margin-top:8px">VPD targets based on leaf-surface VPD research and widely validated commercial cultivation data. Ranges reflect consensus across multiple sources including Hardin et al. (2012) and Pulse Labs cultivation guides. Your environment and genetics may warrant adjustment — treat these as starting points, not absolutes.</div>
      </div>
      <div class="ref-section">
        <div class="ref-title">PPFD Targets</div>
        <table class="ref-table">
          <thead><tr><th>Stage</th><th>PPFD (μmol/m²/s)</th><th>DLI (12hr flower / 18hr veg)</th></tr></thead>
          <tbody>
            <tr><td class="stage-cell">Seedling Week 1</td><td>50 – 150</td><td>~3–10 (18hr)</td></tr>
            <tr><td class="stage-cell">Seedling Week 2+</td><td>150 – 300</td><td>~10–19 (18hr)</td></tr>
            <tr><td class="stage-cell">Veg</td><td>300 – 600</td><td>~20–39</td></tr>
            <tr><td class="stage-cell">Early Flower</td><td>600 – 800</td><td>~26–35</td></tr>
            <tr><td class="stage-cell">Peak Flower</td><td>800 – 1100</td><td>~35–48</td></tr>
          </tbody>
        </table>
        <div class="form-hint" style="margin-top:8px">DLI = PPFD × photoperiod (hrs) × 3600 ÷ 1,000,000. More light requires more CO₂, water and nutrients to utilise — don't push PPFD without dialling environment first.</div>
      </div>
    </div>
    <div>
      <div class="ref-section">
        <div class="ref-title">Aerocloner Mix Calculator</div>
        <div class="calc-row">
          <span class="calc-label">Gallons of water</span>

          <thead><tr><th>Phase</th><th>Duration</th><th>Conditions</th></tr></thead>
          <tbody>
            <tr><td class="stage-cell">Initial Dry</td><td>10 – 14 days</td><td>60–65°F / 55–60% RH. Slow dry preserves terpenes — avoid rushing with heat or low humidity.</td></tr>
            <tr><td class="stage-cell">Cure — Week 1</td><td>7 days</td><td>Jar. Burp 2× daily, 15 min. Check for sweat or ammonia smell.</td></tr>
            <tr><td class="stage-cell">Cure — Week 2–4</td><td>3 weeks</td><td>Burp daily, then every other day. Boveda 62% (smoke soon) or 58% (long storage).</td></tr>
