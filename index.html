      </div>
      <div class="vitals-secondary">
        <span class="vitals-lbl-sm" style="color:var(--text-dim)">${Math.max(0, 21-(age||0))}d to veg</span>
      </div>
    </div>`;
  }

  return `<div class="vitals-cluster"><span class="txt-dim-sm">—</span></div>`;
}

function boardDrawer(g, i, _jIdx) {
  const st = g.stage;
  const fd = flowerDays(g);
  const allEntries = _jIdx ? (_jIdx[g.uid]||[]) : DB.journal.filter(j => j.plantId === g.uid).sort((a,b) => b.date.localeCompare(a.date));
  const lastEntry = allEntries[0];
  const tab = drawerTab[i] || 'info';
  const showForm = !!drawerLogForm[i];

  const daysLeft = g.harvestDate ? Math.max(0, daysUntil(g.harvestDate)) : null;
  const finishColor = daysLeft !== null && daysLeft <= 14 ? 'var(--danger)' : daysLeft !== null && daysLeft <= 21 ? 'var(--warn)' : '';

  // ── TAB BAR ──
  const tabs = ['info','log','actions'].map(t => {
    const labels = { info:'Info', log:`Log (${allEntries.length})`, actions:'Actions' };
    return `<div class="dtab${tab===t?' dtab-active':''}" onclick="switchDrawerTab(event,${i},'${t}')">${labels[t]}</div>`;
  }).join('');

  // ── INFO TAB ──
  const infoTab = () => {
    const row = (lbl, val, color='') => val
      ? `<div class="drawer-row"><span class="drawer-label">${lbl}</span><span class="drawer-value"${color?' style="color:'+color+'"':''}>${val}</span></div>`
      : '';
    const envFields = lastEntry ? [
      lastEntry.temp     && row('Temp',      lastEntry.temp + '°F'),
      lastEntry.humidity && row('RH',        lastEntry.humidity + '%'),
      lastEntry.vpd      && row('VPD',       lastEntry.vpd + ' kPa', boardVpdColor(lastEntry.vpd, st)),
      lastEntry.ppfd     && row('PPFD',      lastEntry.ppfd + ' µmol'),
      lastEntry.ph       && row('pH',        lastEntry.ph),
      lastEntry.ec       && row('EC',        lastEntry.ec + ' mS'),
      lastEntry.lightHeight && row('Light Ht.', lastEntry.lightHeight + '"'),
    ].filter(Boolean) : [];

    return `<div class="drawer-grid">
      <div class="drawer-col">
        <div class="drawer-col-title">Plant Info</div>
        ${row('Origin', g.source === 'clone' ? 'Clone' : 'From Seed')}
        ${row('Sex', g.sex)}
        ${row('Mother', g.mother)}
        ${row('Medium', g.medium)}
        ${row('Container', g.container)}
        ${row('Started', g.seedlingDate||g.germStart||g.cloneIn ? fmtDate(g.seedlingDate||g.germStart||g.cloneIn) : '')}
        ${g.flipDate ? row('Flipped', fmtDate(g.flipDate) + ' · ' + (fd||0) + 'd ago') : ''}
        ${g.harvestDate ? row('Est. Finish', fmtDate(g.harvestDate) + (daysLeft!==null?' · '+daysLeft+'d':''), finishColor) : ''}
        ${g.breeder ? row('Breeder', g.breeder) : ''}
      </div>
      <div class="drawer-col" style="grid-column:span 2">
        <div class="drawer-col-title">Last Environment${lastEntry?' <span class="meta-dim">from '+fmtDate(lastEntry.date)+'</span>':''}</div>
        ${envFields.length
          ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px">${envFields.join('')}</div>`
          : '<div class="txt-dim-sm">No readings logged yet. Add a log entry with environmental data.</div>'}
        ${lastEntry && lastEntry.notes ? `<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
          <div class="drawer-col-title" style="margin-bottom:4px">Last Note</div>
          <div style="font-size:11px;color:var(--text-mid);line-height:1.6">${esc(lastEntry.notes)}</div>
        </div>` : ''}
      </div>
    </div>`;
  };

  // ── LOG TAB ──
  const ISSUE_OPTS = ['PM','Herm','Pest','Deficiency','Light Stress','Overwatering','Root Issue','Tip Burn'];
  const logTab = () => {
    const preview = allEntries.slice(0, 8);
    const entries = preview.map(j => {
      const hasMetrics = j.vpd||j.temp||j.humidity||j.ppfd||j.ph||j.ec||j.lightHeight;
      const jIdx = DB.journal.indexOf(j);
      return `<div class="journal-entry" style="cursor:pointer" onclick="event.stopPropagation();openView('journal',${jIdx})" title="Click to edit">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div class="journal-date">${fmtDate(j.date)}</div>
          <div style="display:flex;gap:4px">${j.issues&&j.issues.length?j.issues.map(iss=>`<span class="badge badge-${iss.toLowerCase().replace(/\s+/g,'-')}">${esc(iss)}</span>`).join(''):''}</div>
        </div>
        <div class="journal-text">${esc(j.notes)}</div>
        ${hasMetrics?`<div class="journal-metrics">
          ${j.vpd?`<div class="journal-metric"><span class="journal-metric-label">VPD</span><span class="journal-metric-value">${j.vpd} kPa</span></div>`:''}
          ${j.temp?`<div class="journal-metric"><span class="journal-metric-label">Temp</span><span class="journal-metric-value">${j.temp}°F</span></div>`:''}
          ${j.humidity?`<div class="journal-metric"><span class="journal-metric-label">RH</span><span class="journal-metric-value">${j.humidity}%</span></div>`:''}
          ${j.ppfd?`<div class="journal-metric"><span class="journal-metric-label">PPFD</span><span class="journal-metric-value">${j.ppfd} µmol</span></div>`:''}
          ${j.ph?`<div class="journal-metric"><span class="journal-metric-label">pH</span><span class="journal-metric-value">${j.ph}</span></div>`:''}
          ${j.ec?`<div class="journal-metric"><span class="journal-metric-label">EC</span><span class="journal-metric-value">${j.ec} mS</span></div>`:''}
          ${j.lightHeight?`<div class="journal-metric"><span class="journal-metric-label">Light Ht.</span><span class="journal-metric-value">${j.lightHeight}"</span></div>`:''}
        </div>`:''}
      </div>`;
    }).join('');

    const inlineForm = showForm ? `
      <div class="inline-log-form" onclick="event.stopPropagation()">
        <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
          <div class="ilf-field" style="flex:0 0 140px">
            <div class="ilf-label">Date</div>
            <input class="form-input" type="date" id="ilog-date-${i}" value="${today()}" />
          </div>
          <div class="ilf-field" style="flex:1;min-width:200px">
            <div class="ilf-label">Notes / observations <span style="color:var(--danger)">*</span></div>
            <textarea class="form-input" id="ilog-notes-${i}" rows="3" placeholder="What are you seeing? What did you do?" style="resize:vertical"></textarea>
          </div>
        </div>
        <div class="ilf-section-label">Environment (optional)</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <div class="ilf-field"><div class="ilf-label">VPD kPa</div><input class="form-input ilf-input" type="number" step="0.01" min="0" placeholder="1.2" id="ilog-vpd-${i}" /></div>
          <div class="ilf-field"><div class="ilf-label">Temp °F</div><input class="form-input ilf-input" type="number" min="0" placeholder="74" id="ilog-temp-${i}" /></div>
          <div class="ilf-field"><div class="ilf-label">RH %</div><input class="form-input ilf-input" type="number" min="0" max="100" placeholder="48" id="ilog-humidity-${i}" /></div>
          <div class="ilf-field"><div class="ilf-label">PPFD</div><input class="form-input ilf-input" type="number" min="0" placeholder="920" id="ilog-ppfd-${i}" /></div>
          <div class="ilf-field"><div class="ilf-label">pH</div><input class="form-input ilf-input" type="number" step="0.1" min="0" max="14" placeholder="6.2" id="ilog-ph-${i}" /></div>
          <div class="ilf-field"><div class="ilf-label">EC</div><input class="form-input ilf-input" type="number" step="0.1" min="0" placeholder="1.8" id="ilog-ec-${i}" /></div>
          <div class="ilf-field"><div class="ilf-label">Light Ht."</div><input class="form-input ilf-input" type="number" min="0" placeholder="18" id="ilog-lh-${i}" /></div>
        </div>
        <div class="ilf-section-label">Issues (optional)</div>
        <div id="ilog-issues-${i}" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
          ${ISSUE_OPTS.map(iss=>`<label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-mid);cursor:pointer">
            <input type="checkbox" value="${iss}" class="cb-accent"> ${iss}
          </label>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="saveInlineLog(event,${i})">Save Entry</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleInlineLogForm(event,${i})">Cancel</button>
        </div>
      </div>` : '';

    return `<div style="padding:14px 20px 16px 36px">
      ${!showForm ? `<div style="margin-bottom:12px">
        <button class="btn btn-warn btn-sm" onclick="toggleInlineLogForm(event,${i})">+ Log Entry</button>
      </div>` : ''}
      ${inlineForm}
      ${allEntries.length
        ? entries + (allEntries.length > 8 ? `<div style="font-size:11px;color:var(--text-dim);padding:4px 0">… and ${allEntries.length - 8} older entries</div>` : '')
        : (!showForm ? '<div class="txt-dim-sm">No log entries yet for this plant.</div>' : '')}
    </div>`;
  };

  // ── ACTIONS TAB ──
  const actionsTab = () => {
    const transitionBtn = () => {
      if (st === 'flower')         return `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();advanceStage(${i})">Log Harvest → Drying</button>`;
      if (st === 'drying')         return `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();advanceStage(${i})">Move to Jars → Curing</button>`;
      if (st === 'veg')            return `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();advanceStage(${i})">Flip to Flower →</button>`;
      if (st === 'seedling')       return '';  // auto-transitions to veg after 14 days
      if (st === 'breeding_hold')  return `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();cullBreedingMale(${i})">Retire Breeder →</button>`;
      return '';
    };
    const isFlagged = FATES_ACTIVE_FLAG.has(g.fate||'');
    const cullBtn = (st !== 'breeding_hold')
      ? `<button class="btn btn-warn btn-sm" onclick="event.stopPropagation();cullPlant(${i})">${isFlagged ? 'Cull / Remove '+fateBadge(g.fate) : 'Cull / Remove'}</button>`
      : '';
    return `<div style="padding:14px 20px 16px 36px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start">
      ${transitionBtn()}
      ${cullBtn}
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEdit('plants',${i})">Edit</button>
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openView('plants',${i})">Full Detail →</button>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();del('plants',${i})" style="margin-left:auto">Delete</button>
    </div>`;
  };

  return `<div class="board-drawer" id="drawer-${i}">
    <div class="dtab-bar">${tabs}</div>
    ${tab === 'info'    ? infoTab()    : ''}
    ${tab === 'log'     ? logTab()     : ''}
    ${tab === 'actions' ? actionsTab() : ''}
  </div>`;
}

function plants() {
  let list = _gc().plants.slice();
  if (search) { const _q = search.toLowerCase(); list = list.filter(g => (g.strain+' '+(g.id||'')+' '+(g.notes||'')+' '+(g.breeder||'')).toLowerCase().includes(_q)); }
  if (filter !== 'All') list = list.filter(g => g.stage === filter.toLowerCase());

  const stages = ['All', 'Seedling', 'Veg', 'Flower', 'Drying'];

  const upcoming = list.filter(g => g.harvestDate && daysUntil(g.harvestDate) >= 0 && daysUntil(g.harvestDate) <= 21)
    .sort((a,b) => daysUntil(a.harvestDate) - daysUntil(b.harvestDate));
  const flagged = list.filter(g => plantIssueList(g).length > 0);
  const stale = list.filter(g => {
    const last = DB.journal.filter(j=>j.plantId===g.uid).sort((a,b)=>b.date.localeCompare(a.date))[0];
    return !last || daysBetween(last.date, today()) >= 5;
  });

  const alertBar = (upcoming.length || flagged.length) ? `
    <div class="board-alerts">
      ${upcoming.map(g=>`<span class="board-alert board-alert-harvest">🌾 ${esc(g.id||g.strain)} — ${daysUntil(g.harvestDate)===0?'harvest today':'~'+daysUntil(g.harvestDate)+'d'}</span>`).join('')}
      ${flagged.map(g=>`<span class="board-alert board-alert-issue">⚑ ${esc(g.id||g.strain)} — ${plantIssueList(g).join(', ')}</span>`).join('')}
      ${stale.length?`<span class="board-alert board-alert-stale">${stale.length} plant${stale.length>1?'s':''} not logged in 5+ days</span>`:''}
    </div>` : '';

  if (!list.length) return `
    <div class="page-header">
      <div class="page-title">Plants</div>
      <div class="header-actions"><button class="btn btn-primary" onclick="openAdd('plants')">+ Add Plant</button></div>
    </div>
    <div class="table-wrap"><div class="empty"><div class="empty-icon">🪴</div><div class="empty-title">No plants yet</div><div class="empty-hint">Add your first plant to get started.</div><button class="btn btn-primary" onclick="openAdd('plants')">+ Add Plant</button></div></div>`;

  return `
  <div class="page-header">
    <div class="page-title">Plants</div>
    <div class="page-subtitle">${list.length} of ${DB.grows.filter(g=>STAGES_PLANTS.includes(g.stage)).length} active</div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openAdd('plants')">+ Add Plant</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><span class="search-icon">⌕</span><input type="text" placeholder="Search strain, ID, notes…" value="${esc(search)}" oninput="search=this.value;render()" /></div>
    <div class="filter-chips">${stages.map(s=>`<span class="chip ${filter===s?'active':''}" onclick="filter='${s}';render()">${s}</span>`).join('')}</div>
  </div>
  ${alertBar}
  <div class="big-board" id="big-board">
    <div class="board-head">
      <div class="bh-signal"></div>
      <div class="bh-name">Strain / ID</div>
      <div class="bh-stage">Stage</div>
      <div class="bh-vitals">Days</div>
      <div class="bh-progress">Progress</div>
      <div class="bh-last">Last Log</div>
      <div class="bh-vpd">VPD</div>
      <div class="bh-issues">Issues</div>
      <div class="bh-notes">Notes</div>
      <div class="bh-chev"></div>
    </div>
    ${(()=>{
      // Build journal index once for entire board render — O(journal) not O(plants×journal)
      const _jIdx = {};
      DB.journal.forEach(j => { if(j.plantId){ if(!_jIdx[j.plantId])_jIdx[j.plantId]=[]; _jIdx[j.plantId].push(j); } });
      Object.values(_jIdx).forEach(arr => arr.sort((a,b)=>b.date.localeCompare(a.date)));
      return list.map(g => {
      const i = DB.grows.indexOf(g);
      const sig = plantSignal(g, _jIdx);
      const issues = plantIssueList(g, _jIdx);
      const lastEntry = (_jIdx[g.uid]||[])[0];
      const lastVpd = lastEntry ? parseFloat(lastEntry.vpd) : null;
      const notesPreview = (g.notes || (lastEntry && lastEntry.notes) || '').replace(/\n/g,' ');
      const isOpen = boardExpanded === i;
      const labelAnnotation = [
        g.notes && /s1|reversal|reversed/i.test(g.notes) ? 'S1 reversal' : '',
        g.notes && /pollinated/i.test(g.notes) ? 'pollinated' : '',
        g.source === 'clone' ? 'clone' : ''
      ].filter(Boolean)[0] || '';

      return `
      <div class="board-row ${isOpen?'board-row-open':''}" id="brow-${i}" onclick="toggleBoardRow(${i})">
        <div class="bh-signal"><span class="sig-dot sig-${sig}"></span></div>
        <div class="bh-name">
          <div class="brow-name">${esc(g.strain)}</div>
          ${g.id||labelAnnotation?`<div class="brow-sub">${esc(g.id||'')}${g.id&&labelAnnotation?' · ':''}<span style="color:var(--text-dim)">${esc(labelAnnotation)}</span></div>`:''}
        </div>
        <div class="bh-stage">${stageBadge(g.stage)}${FATES_ACTIVE_FLAG.has(g.fate||'')?'<br>'+fateBadge(g.fate):''}</div>
        <div class="bh-vitals">${boardVitals(g)}</div>
        <div class="bh-progress">${boardProgressBar(g)}</div>
        <div class="bh-last" class="txt-dim-sm">${lastEntry?fmtDate(lastEntry.date):'never'}</div>
        <div class="bh-vpd" style="font-size:12px;color:${boardVpdColor(lastVpd, g.stage)}">${lastVpd?lastVpd.toFixed(2):'—'}</div>
        <div class="bh-issues" class="tag-wrap">${issues.length?issues.map(boardIssueTag).join(''):'<span class="txt-dim-xs">—</span>'}</div>
        <div class="bh-notes" style="font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">${esc(notesPreview.slice(0,120))}</div>
        <div class="bh-chev"><span class="board-chev ${isOpen?'board-chev-open':''}">›</span></div>
      </div>
      ${boardDrawer(g, i, _jIdx)}`;
      }).join('');})()}
  </div>`;
}


function toggleBoardRow(i) {
  boardExpanded = boardExpanded === i ? null : i;
  if (boardExpanded !== null && !drawerTab[i]) drawerTab[i] = 'info';
  document.querySelectorAll('.board-row').forEach(r => r.classList.remove('board-row-open'));
  document.querySelectorAll('.board-chev').forEach(c => c.classList.remove('board-chev-open'));
  document.querySelectorAll('.board-drawer').forEach(d => { d.style.display = 'none'; d.style.maxHeight = '0'; });

  if (boardExpanded !== null) {
    const row = document.getElementById('brow-' + i);
    const drawer = document.getElementById('drawer-' + i);
    const chev = row ? row.querySelector('.board-chev') : null;
    if (row) row.classList.add('board-row-open');
    if (chev) chev.classList.add('board-chev-open');
    if (drawer) { drawer.style.display = 'block'; drawer.style.maxHeight = '1200px'; }
  }
}

function switchDrawerTab(e, i, tab) {
  e.stopPropagation();
  drawerTab[i] = tab;
  if (tab !== 'log') drawerLogForm[i] = false;
  render();
  // Re-show drawer after re-render
  const drawer = document.getElementById('drawer-' + i);
  if (drawer) { drawer.style.display = 'block'; drawer.style.maxHeight = '1200px'; }
}

function toggleInlineLogForm(e, i) {
  e.stopPropagation();
  drawerLogForm[i] = !drawerLogForm[i];
  render();
  const drawer = document.getElementById('drawer-' + i);
  if (drawer) { drawer.style.display = 'block'; drawer.style.maxHeight = '1200px'; }
}

function saveInlineLog(e, i) {
  e.stopPropagation();
  const g = DB.grows[i];
  if (!g) return;
  const gf = id => { const v = fv(id); return v ? parseFloat(v) : null; };
  const checks = document.querySelectorAll(`#ilog-issues-${i} input:checked`);
  const issues = [...checks].map(c => c.value);
  const notes = fv(`ilog-notes-${i}`);
  if (!notes) return;
  const obj = {
    date: fv(`ilog-date-${i}`) || today(),
    plantId: g.uid,
    notes,
    vpd: gf(`ilog-vpd-${i}`),
    temp: gf(`ilog-temp-${i}`),
    humidity: gf(`ilog-humidity-${i}`),
    ppfd: gf(`ilog-ppfd-${i}`),
    ph: gf(`ilog-ph-${i}`),
    ec: gf(`ilog-ec-${i}`),
    lightHeight: gf(`ilog-lh-${i}`),
    issues
  };
  DB.journal.push(obj);
  save();
  drawerLogForm[i] = false;
  render();
  const drawer = document.getElementById('drawer-' + i);
  if (drawer) { drawer.style.display = 'block'; drawer.style.maxHeight = '1200px'; }
  toast('Entry logged.');
}

function history() {
  const allComplete = _gc().history.slice();
  const harvests   = allComplete.filter(g => !g.fate);
  const culled     = allComplete.filter(g => g.fate);

  // Filter chip state
  const hf = window._histFilter || 'all';
  let list = hf === 'harvests' ? harvests : hf === 'culled' ? culled : allComplete;
  list = list.slice().sort((a,b) => (b.completedDate||b.cullDate||b.harvestDate||'').localeCompare(a.completedDate||a.cullDate||a.harvestDate||''));
  if (search) { const _q = search.toLowerCase(); list = list.filter(g => (g.strain+' '+(g.id||'')+' '+(g.notes||'')+' '+(g.cullNotes||'')+' '+(g.smokeReport||'')).toLowerCase().includes(_q)); }

  const chip = (key, label, count) => `<button class="filter-chip${hf===key?' active':''}" onclick="window._histFilter='${key}';render()">${label}${count!=null?' <span class="chip-count">('+count+')</span>':''}</button>`;

  return `
  <div class="page-header">
    <div class="page-title">History</div>
    <div class="page-subtitle">${harvests.length} harvested · ${culled.length} culled/died</div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openAdd('history')">+ Add Record</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="filter-chips">
      ${chip('all','All', allComplete.length)}
      ${chip('harvests','Harvested', harvests.length)}
      ${chip('culled','Culled / Died', culled.length)}
    </div>
    <div class="search-wrap"><span class="search-icon">⌕</span><input type="text" placeholder="Search strain, notes…" value="${esc(search)}" oninput="search=this.value;render()" /></div>
  </div>
  <div class="table-wrap">
    ${list.length ? `<div class="timeline">${list.map(g => {
      const fate = g.fate || null;
      const isPM   = /\bpm\b/i.test((g.notes||'')+(g.cullNotes||''));
      const isHerm = /herm/i.test((g.notes||'')+(g.cullNotes||''));
      const dotClass = fate === 'culled_male'        ? 'yellow'
                     : fate === 'culled_male_keeper' ? 'yellow'
                     : fate === 'culled_mutant'      ? 'yellow'
                     : fate === 'culled_runt'        ? 'yellow'
                     : fate === 'died'               ? 'red'
                     : fate === 'culled_other'       ? 'red'
                     : g.harvestDate                 ? 'green' : 'red';
      const idx = DB.grows.indexOf(g);
      const fd = g.flipDate && g.harvestDate ? daysBetween(g.flipDate, g.harvestDate) : null;
      const shrink = g.wetWeight && g.dryWeight ? ((g.dryWeight/g.wetWeight)*100).toFixed(1)+'%' : null;
      return `<div class="timeline-item" onclick="openView('history',${idx})">
        <div class="tl-dot-col"><div class="tl-dot ${dotClass}"></div><div class="tl-line"></div></div>
        <div class="tl-content">
          <div class="tl-name">${esc(g.strain)} <span class="tl-id">${g.id?'· '+esc(g.id):''}</span>
            ${g.rating && !fate ? `<span style="font-size:11px;margin-left:6px">${g.rating.split(' ')[0]}</span>` : ''}
          </div>
          <div class="tl-meta">
            ${fate ? (g.cullDate ? '✗ '+fmtDate(g.cullDate) : '✗ Culled')

  </div>`;
}

// ── CURE TRACKER ──
function curePhase(g) {
  if (!g.jarDate) return 'curing-early';
  const days = daysBetween(g.jarDate, today());
  if (days < 7)  return 'cure-early';
  if (days < 35) return 'cure-mid';
  return 'cure-long';
}

function curePhaseName(g) {
  const p = curePhase(g);
  return { 'cure-early':'Cure Week 1', 'cure-mid':'Cure Week 2–5', 'cure-long':'Long Cure' }[p] || 'Curing';
}

function curePhaseColor(g) {
  const p = curePhase(g);
  return { 'cure-early':'var(--warn)', 'cure-mid':'var(--accent)', 'cure-long':'var(--text-dim)' }[p] || 'var(--text-dim)';
}

function openJarLog(growIdx) {
  const g = DB.grows[growIdx];
  if (!g) return;
  showModal(`
    <div class="modal-header"><div class="modal-title">Jar Log — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:12px">Log a burp check — moisture, smell, any issues.</div>
      <div class="form-grid">
        <div class="form-field"><div class="form-label">Date</div><input class="form-input" id="jl-date" type="date" value="${today()}" /></div>
        <div class="form-field"><div class="form-label">RH % in jar</div><input class="form-input" id="jl-rh" type="number" step="0.1" min="0" max="100" placeholder="62" /></div>
        <div class="form-field"><div class="form-label">Burp duration (min)</div><input class="form-input" id="jl-burp" type="number" min="0" placeholder="15" /></div>
        <div class="form-field full"><div class="form-label">Notes</div><textarea class="form-textarea" style="min-height:60px" id="jl-notes" placeholder="Smell, texture, any issues…"></textarea></div>
      </div>
    </div>
    ${g.jarLogs&&g.jarLogs.length ? `<div style="margin-bottom:16px">
      <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px">Previous Entries</div>
      ${g.jarLogs.slice().reverse().slice(0,5).map(jl=>`
        <div class="journal-entry" style="margin-bottom:8px">
          <div class="journal-date">${fmtDate(jl.date)}${jl.rh?' · '+jl.rh+'% RH':''}${jl.burp?' · burp '+jl.burp+'min':''}</div>
          <div class="journal-text">${esc(jl.notes||'—')}</div>
        </div>`).join('')}
    </div>` : ''}
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveJarLog(${growIdx})">Save Entry</button>

function saveJarLog(growIdx) {
  const g = DB.grows[growIdx];
  if (!g) return;
  const entry = { date: fv('jl-date')||today(), rh: parseFloat(fv('jl-rh'))||'', burp: parseInt(fv('jl-burp'))||'', notes: fv('jl-notes') };
  if (!g.jarLogs) g.jarLogs = [];
  g.jarLogs.push(entry);
  save();
  closeModal();
  render();
  toast('Jar entry logged.');
}

// Timeline: |-- Cure Wk1 7d --|-- Cure Wk2-5 35d --|-- Long Cure →
function cureProgressBar(g) {
  const days = g.jarDate ? daysBetween(g.jarDate, today()) : 0;
  const milestones = [
    { label: 'Wk 1',  days: 7,   color: 'var(--warn)' },
    { label: 'Wk 5',  days: 35,  color: 'var(--accent)' },
    { label: 'Wk 13', days: 91,  color: 'var(--text-dim)' },
  ];
  const total = 91;
  const pct = Math.min(100, Math.round(days / total * 100));
  const color = curePhaseColor(g);
  const markers = milestones.map(m => {
    const x = Math.round(m.days / total * 100);
    const passed = days >= m.days;
    return `<div style="position:absolute;left:${x}%;top:-4px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="width:1px;height:8px;background:${passed?color:'var(--border2)'}"></div>
      <div style="font-size:9px;color:${passed?color:'var(--text-dim)'};white-space:nowrap">${m.label}</div>
    </div>`;
  }).join('');
  return `<div style="padding-bottom:18px">
    <div style="position:relative;height:4px;background:var(--border);border-radius:2px;margin-bottom:4px">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;transition:width 0.3s"></div>
      ${markers}
    </div>
    <div style="font-size:10px;color:var(--text-dim);margin-top:18px">Day ${days} · ${pct}% of 13-week benchmark</div>
  </div>`;
}

function cures() {

  if (!list.length) return `

      <div class="page-title">Cure Tracker</div>

    const lastJar = g.jarLogs && g.jarLogs.length ? g.jarLogs[g.jarLogs.length-1] : null;
    const daysSinceJar = lastJar ? daysBetween(lastJar.date, today()) : null;
    const jarAlert = daysSinceJar === null || daysSinceJar >= 2;

        ${g.dryWeight ? `<div class="cure-stat"><div class="cure-stat-label">Dry</div><div class="cure-stat-value">${g.dryWeight}g</div></div>` : ''}
        ${g.trimWeight ? `<div class="cure-stat"><div class="cure-stat-label">Trim</div><div class="cure-stat-value">${g.trimWeight}g</div></div>` : ''}

function seedQtyColor(qty) {
  const q = parseFloat(qty);
  if (isNaN(q) || qty === '?' || qty === '') return 'var(--text-dim)';
  if (q <= 2)  return 'var(--danger)';
  if (q <= 5)  return 'var(--warn)';
  if (q >= 50) return 'var(--accent)';
  return 'var(--purple)';
}

function seedQtyGlyph(qty) {
  const q = parseFloat(qty);
  if (isNaN(q) || qty === '?' || qty === '') return '';
  if (q <= 2)  return ' <span style="font-size:9px;color:var(--danger);letter-spacing:0.04em">LOW</span>';
  if (q <= 5)  return ' <span style="font-size:9px;color:var(--warn);letter-spacing:0.04em">FEW</span>';
  if (q >= 50) return ' <span style="font-size:9px;color:var(--accent);letter-spacing:0.04em">DEEP</span>';
  return '';
}

function seedTimesPopped(s) {
  const name = (s.strain||'').toLowerCase();
  return DB.grows.filter(g => (g.strain||'').toLowerCase().includes(name)).length;
}

function seedRiskFlags(s) {
  const n = (s.notes||'').toLowerCase();
  const flags = [];
  if (/low pm|pm resist|suscept/.test(n))   flags.push(['PM Risk', 'badge-pm']);
  if (/herm/.test(n))                         flags.push(['Herm Risk', 'badge-herm']);
  if (/rare|irreplaceable|last pack/.test(n)) flags.push(['Rare', 'badge-warn']);
  return flags;
}

function toggleVaultRow(i) {
  vaultExpanded = vaultExpanded === i ? null : i;
  document.querySelectorAll('.vault-row').forEach(r => r.classList.remove('vault-row-open'));
  document.querySelectorAll('.vault-chev').forEach(c => c.classList.remove('board-chev-open'));
  document.querySelectorAll('.vault-drawer').forEach(d => d.style.display = 'none');
  if (vaultExpanded !== null) {
    const row = document.getElementById('vrow-' + i);
    const drawer = document.getElementById('vdrawer-' + i);
    if (row) { row.classList.add('vault-row-open'); const ch = row.querySelector('.vault-chev'); if (ch) ch.classList.add('board-chev-open'); }
    if (drawer) drawer.style.display = 'block';
  }
}

function stats() {
  const { history: allComplete, plants } = _gc();
  const hist    = allComplete.filter(g => !g.fate);   // harvested only — exclude culled/died
  const journal = DB.journal;
  const seeds   = DB.seeds;

  const totalRuns   = allComplete.length;  // all records including culled/died
  const harvestRuns = hist.length;         // successful harvests only
  const cullCount   = allComplete.filter(g => g.fate).length;
  const cullPct     = totalRuns ? Math.round(cullCount / totalRuns * 100) : 0;

  // flower days: only from actual harvests
  const withFlower = hist.filter(g => g.flipDate && g.harvestDate);
  const flowerTimes = withFlower.map(g => daysBetween(g.flipDate, g.harvestDate));
  const avgFlower = flowerTimes.length ? flowerTimes.reduce((a,b)=>a+b,0)/flowerTimes.length : null;
  const minFlower = flowerTimes.length ? Math.min(...flowerTimes) : null;
  const maxFlower = flowerTimes.length ? Math.max(...flowerTimes) : null;

  const pmRuns  = hist.filter(h => /\bpm\b|powdery mildew/i.test(h.notes||'')).length;
  const pmPct   = harvestRuns ? Math.round(pmRuns / harvestRuns * 100) : 0;
  const pmJournal = journal.filter(j => /\bpm\b|powdery mildew/i.test((j.notes||'')+' '+(j.issues||[]).join(' '))).length;

  const issueMap = { PM: 0, Herm: 0, Pest: 0, Deficiency: 0, 'Root/Overwater': 0, 'Light Stress': 0 };
  journal.forEach(j => {
    const t = ((j.notes||'')+' '+(j.issues||[]).join(' ')).toLowerCase();
    if (/\bpm\b|powdery mildew/.test(t)) issueMap['PM']++;
    if (/herm/.test(t)) issueMap['Herm']++;
    if (/pest|spider|mite|aphid|thrip|gnat/.test(t)) issueMap['Pest']++;
    if (/deficien|cal.mag|nute burn|nutrient burn/.test(t)) issueMap['Deficiency']++;
    if (/overwater|root rot/.test(t)) issueMap['Root/Overwater']++;
    if (/light stress|light burn/.test(t)) issueMap['Light Stress']++;
  });
  const maxIssue = Math.max(1, ...Object.values(issueMap));

  const strainStats = {};
  withFlower.forEach(g => {
    const name = (g.strain||'').trim();
    const fd = daysBetween(g.flipDate, g.harvestDate);
    if (!strainStats[name]) strainStats[name] = { runs: 0, totalDays: 0, pmCount: 0 };
    strainStats[name].runs++;
    strainStats[name].totalDays += fd;
    if (/\bpm\b|powdery mildew/i.test(g.notes||'')) strainStats[name].pmCount++;
  });
  const strainList = Object.entries(strainStats)
    .map(([name, s]) => ({ name, runs: s.runs, avg: Math.round(s.totalDays / s.runs), pmPct: Math.round(s.pmCount / s.runs * 100) }))
    .sort((a,b) => b.runs - a.runs);

  const vpdEntries = journal.filter(j => j.vpd && j.plantId);
  let vpdGood = 0, vpdBad = 0;
  vpdEntries.forEach(j => {
    const grow = DB.grows.find(g => g.uid === j.plantId);
    const stage = grow ? grow.stage : 'flower';
    const v = parseFloat(j.vpd);
    const { lo, hi } = vpdRange(stage);
    (v >= lo && v <= hi) ? vpdGood++ : vpdBad++;
  });
  const vpdTotal = vpdGood + vpdBad;
  const vpdPct   = vpdTotal ? Math.round(vpdGood / vpdTotal * 100) : null;

  const journalByMonth = {};
  journal.forEach(j => {
    if (!j.date) return;
    const mo = j.date.slice(0,7);
    journalByMonth[mo] = (journalByMonth[mo]||0) + 1;
  });
  const months = Object.keys(journalByMonth).sort().slice(-6);
  const maxMonthEntries = Math.max(1, ...months.map(m=>journalByMonth[m]));

  const lowStockSeeds = seeds.filter(s=>{ const q=parseFloat(s.qty); return !isNaN(q)&&q<=3; });
  const neverPopped   = seeds.filter(s=>seedTimesPopped(s)===0).length;
  const typeBreakdown = {};
  seeds.forEach(s=>{ typeBreakdown[s.type||'Unknown']=(typeBreakdown[s.type||'Unknown']||0)+1; });

  const inFlower  = plants.filter(g => g.stage === 'flower');
  const inVeg     = plants.filter(g => g.stage === 'veg' || g.stage === 'seedling');
  const avgVpdNow = (() => {
    const recent = journal.filter(j=>j.vpd).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
    if (!recent.length) return null;
    return (recent.reduce((s,j)=>s+parseFloat(j.vpd),0)/recent.length).toFixed(2);
  })();

  const insights = [];
  if (pmPct >= 50) insights.push({ icon:'🍄', text:`<strong>PM is a recurring problem.</strong> It showed up in ${pmPct}% of your harvested runs. Consider dialing humidity down in late flower and keeping air moving.` });
  else if (pmPct > 0) insights.push({ icon:'🍄', text:`PM appeared in ${pmPct}% of your harvested runs (${pmRuns} of ${harvestRuns}). Still worth watching late flower humidity.` });
  if (avgFlower && avgFlower > 68) insights.push({ icon:'📅', text:`<strong>Your runs tend to go long.</strong> Average finish is ${avgFlower.toFixed(1)} days — longer than the typical 63-day target. Either your strains need it or the environment is slowing things down.` });
  if (avgFlower && avgFlower < 56) insights.push({ icon:'⚡', text:`<strong>Fast finisher.</strong> Your average flower time is ${avgFlower.toFixed(1)} days — you're running quick strains or an efficient environment.` });
  if (vpdPct !== null && vpdPct < 70) insights.push({ icon:'💧', text:`<strong>VPD is frequently out of range</strong> — only ${vpdPct}% of logged readings were in the target zone. Dialing this in is one of the highest-leverage things you can do.` });
  if (vpdPct !== null && vpdPct >= 90) insights.push({ icon:'✅', text:`<strong>VPD is dialed.</strong> ${vpdPct}% of your logged readings are in the target zone — your environment is consistent.` });
  if (neverPopped > 20) insights.push({ icon:'🫙', text:`<strong>${neverPopped} strains in your vault have never been popped.</strong> You've got a deep library — worth rotating some of those genetics before they age out.` });
  if (lowStockSeeds.length) insights.push({ icon:'⚠️', text:`<strong>${lowStockSeeds.length} strain${lowStockSeeds.length>1?'s are':' is'} critically low</strong> (3 seeds or fewer): ${lowStockSeeds.slice(0,3).map(s=>s.strain).join(', ')}${lowStockSeeds.length>3?' and more':''}.` });
  if (journal.length < 10 && plants.length > 0) insights.push({ icon:'📓', text:`<strong>Start journaling more.</strong> Only ${journal.length} entries logged across ${plants.length} plant${plants.length>1?'s':''}. The more you log, the more patterns emerge.` });
  if (strainList.length && strainList[0].pmPct === 0 && strainList[0].runs >= 2) insights.push({ icon:'🏆', text:`<strong>${strainList[0].name}</strong> has run clean — no PM across ${strainList[0].runs} run${strainList[0].runs>1?'s':''}. A keeper.` });
  if (cullPct >= 30 && totalRuns >= 5) insights.push({ icon:'♂', text:`<strong>${cullCount} of ${totalRuns} records</strong> (${cullPct}%) are culled or lost plants. If you're running unselected seeds, this is normal — males and losses are part of the process.` });

  function donut(slices, size=80) {
    const total = slices.reduce((s,x)=>s+x.val,0);
    if (!total) return '';
    const cx=size/2, cy=size/2, r=size*0.36, sw=size*0.18;
    let angle = -Math.PI/2;
    const paths = slices.map(sl => {
      const pct = sl.val/total;
      const a1=angle, a2=angle+pct*Math.PI*2;
      const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
      const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
      const large=pct>0.5?1:0;
      angle=a2;
      return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} Z" fill="${sl.color}" opacity="0.85"/>`;
    });
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--surface2)"/>
      ${paths.join('')}
      <circle cx="${cx}" cy="${cy}" r="${r-sw}" fill="var(--surface)"/>
    </svg>`;
  }

  const typeColors = { 'Heirloom/IBL':'var(--warn)','Regular Hybrid':'var(--accent)','Feminized':'var(--pink)','Autoflower':'var(--orange)','My Seeds':'var(--teal)','Wish List':'var(--blue)' };
  const donutSlices = Object.entries(typeBreakdown).map(([t,n])=>({ label:t, val:n, color:typeColors[t]||'var(--text-dim)' }));

  const noHistory = !withFlower.length;

  return `
  <div class="page-header">
    <div class="page-title">Stats</div>
    <div class="page-subtitle">Your grow, by the numbers</div>
  </div>

  ${insights.length ? `
  <div style="margin-bottom:20px">
    <div style="font-size:9px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px">Insights</div>
    ${insights.map(ins=>`<div class="insight-card"><div class="insight-icon">${ins.icon}</div><div class="insight-text">${ins.text}</div></div>`).join('')}
  </div>` : ''}

  <div class="stats-grid-3">
    <div class="stat-panel">
      <div class="stat-panel-title">Avg Flower Time</div>
      ${avgFlower ? `
        <div class="stat-hero">${avgFlower.toFixed(1)}<span class="stat-hero-unit">days</span></div>
        <div class="stat-hero-sub">across ${withFlower.length} harvested run${withFlower.length!==1?'s':''}</div>
        <div class="stat-sub">
          <span style="color:var(--accent)">↓ ${minFlower}d fastest</span> &nbsp;·&nbsp; <span style="color:var(--warn)">↑ ${maxFlower}d longest</span>
        </div>` :
        `<div class="no-data-msg">No completed runs yet</div>`}
    </div>

    <div class="stat-panel">
      <div class="stat-panel-title">PM Rate <span>${pmRuns} of ${harvestRuns} harvested runs</span></div>

    prevent: 'Keep canopy temp under 82°F. Monitor distance to tallest colas regularly as plants stretch in flower.' },

  foxtail: {

    treat: [

    ],
    prevent: 'Keep temps under 82°F in late flower. Avoid overly intense light at the tops.' },

  // ── FLOWER ──
  flower: {
    q: "What flower problem are you seeing?",

      { icon:'🍂', label:'Buds not fattening / stalling', desc:'Buds look small or stopped developing', next:'bud_stall' },
    ]
  },

  nanners: {
    result: true, title: 'Nanners (Stress Hermaphroditism)',
    category: 'Hermaphroditism', severity: 'high',
    confirm: 'Small yellow banana-shaped stamens emerging from within bud structure. Can self-pollinate within hours. Often appear late flower (week 6+) on otherwise female plants.',
    what: 'Stress-induced hermaphroditism. Triggers: light leaks during dark period, heat stress, pH swings, nutrient problems, or genetic predisposition. Nanners are fertile and will pollinate your entire garden.',
    treat: [

      { step:3, text:'<strong>If nanners are widespread</strong> and late flower — decide: harvest early or manage daily and let finish. Risk of seeded harvest increases rapidly.' },
      { step:4, text:'<strong>Other plants in the room:</strong> Check all plants for seeds beginning to form (swollen calyxes with no pistils). Act fast.' },
    ],
    prevent: 'Fix any light leaks before flower. Keep environment stable. Avoid using seeds/clones from known hermy genetics. Don\'t stress plants in flower.' },

  herm_balls: {
    result: true, title: 'Male Flowers / Hermaphroditism',
    category: 'Hermaphroditism', severity: 'high',
    confirm: 'Grape-cluster or single ball-shaped structures on what was a female plant. Distinct from calyxes — no pistils coming out, smooth round shape. May appear at node sites or in buds.',
    what: 'Either the plant was always male/hermaphrodite (genetics) or stress caused feminized genetics to express male flowers. Either way, these will produce viable pollen.',
    treat: [
      { step:1, text:'<strong>Remove plant from flowering room immediately if male.</strong> Pollen travels far.' },
      { step:2, text:'<strong>If hermaphrodite:</strong> Remove all visible pollen sacs carefully. Bag the plant\'s removed material.' },
      { step:3, text:'<strong>Check all other plants</strong> for any pollination signs (swelling calyxes where pistils retract).' },
      { step:4, text:'<strong>Unless this is a planned breeding run</strong> — this plant is compromised for sinsemilla production.' },
    ],
    prevent: 'Source feminized seeds from reputable breeders. Avoid stressing plants with light leaks or environmental swings. Don\'t clone from known hermy plants.' },

  bud_stall: {
    result: true, title: 'Bud Development Stall',
    category: 'Environment', severity: 'med',
    confirm: 'Buds not fattening despite being on schedule. Plants look healthy otherwise. May coincide with nutrient changes or environmental shifts.',
    what: 'Usually one of: (1) not enough light intensity, (2) temps too high (above 85°F shuts down calyx development), (3) VPD too low (high humidity slows transpiration and nutrient uptake to buds), (4) P/K deficiency in mid-flower.',
    treat: [
      { step:1, text:'<strong>Verify light intensity</strong> — measure PPFD at canopy. Flower needs 600–1000+ μmol depending on strain.' },
      { step:2, text:'<strong>Check VPD</strong> — mid-flower target is 1.2–1.5 kPa. High humidity (above 60% RH) stalls bud development.' },
      { step:3, text:'<strong>Ensure P/K is adequate</strong> — mid-flower is the peak demand window for phosphorus and potassium.' },
      { step:4, text:'<strong>Patience</strong> — some strains bulk late. Trichome development is the real indicator, not bud size.' },
    ],
    prevent: 'Environmental consistency is most important in flower. Dialed VPD and temps are more impactful than any nutrient adjustment.' },
};

function sxGo(nodeId, label) {
  if (label) sxPath.push({ node: sxNode, label });
  sxNode = nodeId;
  render();
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

function sxBack() {
  if (!sxPath.length) return;
  const prev = sxPath.pop();
  sxNode = prev.node;
  render();
}

function sxReset() {
  sxPath = [];
  sxNode = 'root';
  render();
}



function symptomChecker() {
  const node = SX[sxNode];
  if (!node) return '<div class="sx-card"><div class="sx-question">Unknown node. <button class="btn btn-ghost btn-sm" onclick="sxReset()">Start Over</button></div></div>';

  // Breadcrumb
  const crumb = sxPath.length ? `<div class="sx-breadcrumb">
    <span style="cursor:pointer;color:var(--accent)" onclick="sxReset()">Start</span>
    ${sxPath.map((p,i) => `<span class="sx-breadcrumb-sep">›</span><span>${esc(p.label)}</span>`).join('')}
    <span class="sx-breadcrumb-sep">›</span><span style="color:var(--text)">${node.result ? node.title : '…'}</span>
  </div>` : '';

  // Result node
  if (node.result) {
    const sevClass = { low:'sx-sev-low', med:'sx-sev-med', high:'sx-sev-high' }[node.severity] || 'sx-sev-med';
    const sevLabel = { low:'Low Urgency', med:'Moderate — Act Soon', high:'High — Act Now' }[node.severity] || '';
    const catColors = { Fungal:'var(--orange)', Deficiency:'var(--warn)', Pest:'var(--danger)', Environment:'var(--blue)', Normal:'var(--accent)', Hermaphroditism:'var(--pink)' };
    return `${crumb}
    <div class="sx-card sx-result">
      <div class="sx-result-label" style="color:${catColors[node.category]||'var(--accent)'}">${node.category}</div>
      <div class="sx-result-title">${node.title}</div>
      <div class="${sevClass} sx-severity">${sevLabel}</div>
      <div class="sx-section">
        <div class="sx-section-title">Confirm It</div>
        <div class="sx-section-body">${node.confirm}</div>
      </div>
      <div class="sx-section">
        <div class="sx-section-title">What's Happening</div>
        <div class="sx-section-body">${node.what}</div>
      </div>
      <div class="sx-section">
        <div class="sx-section-title">Treatment Protocol</div>
        <div class="sx-protocol">${node.treat.map(t=>`
          <div class="sx-step">
            <div class="sx-step-num">${t.step}</div>
            <div class="sx-step-text">${t.text}</div>
          </div>`).join('')}
        </div>
      </div>
      ${node.prevent ? `<div class="sx-section">
        <div class="sx-section-title">Prevention</div>
        <div class="sx-section-body">${node.prevent}</div>
      </div>` : ''}
      ${node.notes ? `<div class="sx-section">
        <div class="sx-section-title">Notes</div>
        <div class="sx-section-body" style="color:var(--text-dim);font-style:italic">${node.notes}</div>
      </div>` : ''}
      <div class="sx-nav">
        ${sxPath.length ? `<button class="btn btn-ghost btn-sm" onclick="sxBack()">← Back</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="sxReset()">Start Over</button>
        <button class="btn btn-primary btn-sm" onclick="openAdd('journal')">+ Log This Issue</button>
      </div>
    </div>`;
  }

  // Question node
  return `${crumb}
  <div class="sx-card">
    <div class="sx-question">${node.q}</div>
    ${node.hint ? `<div class="sx-hint">${node.hint}</div>` : ''}
    <div class="sx-choices">
      ${node.choices.map(c => `
        <button class="sx-choice" onclick="sxGo('${c.next}','${esc(c.label)}')">
          <span class="sx-choice-icon">${c.icon}</span>
          <div class="sx-choice-text"><strong>${c.label}</strong>${c.desc ? c.desc : ''}</div>
        </button>`).join('')}
    </div>
    <div class="sx-nav">
      ${sxPath.length ? `<button class="btn btn-ghost btn-sm" onclick="sxBack()">← Back</button>` : ''}
    </div>
  </div>`;
}

function reference() {
  const clonex = (refGallons * 3.78541 * 5).toFixed(1);
  const hydroguard = (refGallons * 2).toFixed(0);
  const h2o2 = (refGallons * 50).toFixed(0);

  const tabs = `<div class="ref-tabs">
    <div class="ref-tab ${refTab==='reference'?'active':''}" onclick="nav('reference')">Reference</div>
    <div class="ref-tab ${refTab==='symptoms'?'active':''}" onclick="nav('symptoms')">🩺 Symptom Checker</div>
  </div>`;

  if (refTab === 'symptoms') return `
  <div class="page-header"><div class="page-title">Reference</div><div class="page-subtitle">Symptom diagnosis & treatment protocols</div></div>
  ${tabs}
  ${symptomChecker()}`;

  return `
  <div class="page-header"><div class="page-title">Reference</div><div class="page-subtitle">Grow parameters, recipes & protocols</div></div>
  ${tabs}
  <div class="ref-grid">
    <div>
      <div class="ref-section">
        <div class="ref-title">VPD Targets</div>
        <table class="ref-table">
          <thead><tr><th>Stage</th><th>VPD (kPa)</th><th>Temp (°F)</th><th>RH %</th></tr></thead>
          <tbody>
            <tr><td class="stage-cell">Seedling / Clone</td><td>0.4 – 0.8</td><td>75–80</td><td>65–75</td></tr>
            <tr><td class="stage-cell">Early Veg</td><td>0.8 – 1.0</td><td>72–78</td><td>55–65</td></tr>
            <tr><td class="stage-cell">Late Veg</td><td>1.0 – 1.2</td><td>70–78</td><td>50–60</td></tr>
            <tr><td class="stage-cell">Early Flower</td><td>1.2 – 1.5</td><td>68–76</td><td>45–55</td></tr>
            <tr><td class="stage-cell">Late Flower</td><td>1.5 – 1.8</td><td>65–72</td><td>38–45</td></tr>
          </tbody>
        </table>
      </div>
      <div class="ref-section">
        <div class="ref-title">PPFD Targets</div>
        <table class="ref-table">
          <thead><tr><th>Stage</th><th>PPFD (μmol/m²/s)</th><th>DLI (12hr flower / 18hr veg)</th></tr></thead>
          <tbody>
            <tr><td class="stage-cell">Seedling Week 1</td><td>50 – 150</td><td>~4–7</td></tr>
            <tr><td class="stage-cell">Seedling Week 2+</td><td>150 – 300</td><td>~10–15</td></tr>
            <tr><td class="stage-cell">Veg</td><td>300 – 600</td><td>~20–39</td></tr>
            <tr><td class="stage-cell">Early Flower</td><td>600 – 800</td><td>~26–35</td></tr>
            <tr><td class="stage-cell">Peak Flower</td><td>800 – 1100</td><td>~35–48</td></tr>
          </tbody>
        </table>
        <div class="form-hint" style="margin-top:8px">DLI = PPFD × photoperiod (hrs) × 3600 ÷ 1,000,000. More light requires more CO₂, water and nutrients to utilise — don't push PPFD without dialling environment first.</div>
      </div>
    </div>
    <div>
      <div class="ref-section">
        <div class="ref-title">Aerocloner Mix Calculator</div>
        <div class="calc-row">
          <span class="calc-label">Gallons of water</span>
          <input type="number" class="form-input" style="width:80px" value="${refGallons}" min="0.5" step="0.5" oninput="refGallons=parseFloat(this.value)||2;render()" />
        </div>
        <div class="calc-row"><span class="calc-label">Clonex solution</span><span class="calc-val">${clonex} ml</span></div>
        <div class="calc-row"><span class="calc-label">Hydroguard (optional)</span><span class="calc-val">${hydroguard} ml</span></div>
        <div class="form-hint" style="margin-top:8px">Based on 5ml Clonex per liter · 2ml Hydroguard per gallon</div>
      </div>
      <div class="ref-section">
        <div class="ref-title">Bud Wash Mix</div>
        <p class="ref-note">50 ml of 3% H₂O₂ per 1 gallon of tap water.<br>Or: 1 cup per 5 gallons.<br><br>For <strong>${refGallons} gallons</strong>: <span class="text-accent">${h2o2} ml H₂O₂</span></p>
        <div class="form-hint" style="margin-top:8px">Soak 30–60 sec. Rinse with clean water. Hang immediately.</div>
      </div>
      <div class="ref-section">
        <div class="ref-title">Drying & Cure Protocol</div>
        <table class="ref-table">
          <thead><tr><th>Phase</th><th>Duration</th><th>Conditions</th></tr></thead>
          <tbody>
            <tr><td class="stage-cell">Initial Dry</td><td>10 – 14 days</td><td>60–65°F / 55–60% RH. Slow dry preserves terpenes — avoid rushing with heat or low humidity.</td></tr>
            <tr><td class="stage-cell">Cure — Week 1</td><td>7 days</td><td>Jar. Burp 2× daily, 15 min. Check for sweat or ammonia smell.</td></tr>
            <tr><td class="stage-cell">Cure — Week 2–4</td><td>2–3 weeks</td><td>Burp daily, then every other day. Boveda 62% (smoke soon) or 58% (long storage).</td></tr>
            <tr><td class="stage-cell">Long Cure</td><td>3+ months</td><td>Dark, cool (60°F), sealed. 58% Boveda. Minimal burping. Check monthly.</td></tr>
          </tbody>
        </table>
        <div class="form-hint" style="margin-top:8px">Stems should snap, not bend, before jarring. If they still bend, keep drying. Ammonia smell in jars = too wet — leave lids off for 24hrs.</div>
      </div>
    </div>
  </div>`;
}

  if (section === 'plants') {
    const fd = flowerDays(item);

      <div class="modal-header"><div class="modal-title">Journal Entry</div><button class="modal-close" onclick="closeModal()">✕</button></div>

      <div class="detail-grid">
        ${item.vpd?`<div class="detail-field"><div class="detail-label">VPD</div><div class="detail-value">${item.vpd} kPa</div></div>`:''}
        ${item.temp?`<div class="detail-field"><div class="detail-label">Temperature</div><div class="detail-value">${item.temp}°F</div></div>`:''}
        ${item.humidity?`<div class="detail-field"><div class="detail-label">Humidity</div><div class="detail-value">${item.humidity}%</div></div>`:''}

  showModal(html);
}

let _editSection = null;
let _editIdx = null;

function openAdd(section) {
  _editSection = section;
  _editIdx = null;
  showModal(buildForm(section, null));
}

function openEdit(section, i) {
  _editSection = section;
  _editIdx = i;
  // plants, history, cures all live in DB.grows now
  const arr = (section === 'plants' || section === 'history' || section === 'cures')
    ? DB.grows : DB[section];
  showModal(buildForm(section, arr[i]));
}

function v(item, key, def='') { return item ? esc(item[key]||def) : def; }
function vb(item, key) { return item && item[key]; }

function plantSelectOptions(selected='') {
  const all = DB.grows.filter(g => g.uid);
  return `<option value="">— General / None —</option>` +
    all.map(g=>`<option value="${esc(g.uid)}" ${g.uid===selected?'selected':''}>${esc(g.strain)}${g.id?' ('+esc(g.id)+')':''}</option>`).join('');
}

      <div class="form-field"><div class="form-label">Year Acquired</div><input class="form-input" id="f-year" type="text" placeholder="2024" value="${v(item,'year')}" /></div>
      <div class="form-field"><div class="form-label">Container</div>
        <select class="form-select" id="f-containerId">
          <option value="">— Unassigned —</option>
          ${DB.containers.map(c=>`<option value="${esc(c.id)}" ${v(item,'containerId')===c.id?'selected':''}>${esc(c.id)} · ${esc(c.name)} (${esc(c.type||'?')})</option>`).join('')}
        </select>
        ${DB.containers.length===0?`<div class="form-hint">No containers defined yet. <span style="cursor:pointer;color:var(--accent);text-decoration:underline" onclick="closeModal();openAdd('containers')">Add a container →</span></div>`:''}
      </div>
      <div class="form-field full"><div class="form-label">Notes (lineage, traits, source…)</div><textarea class="form-textarea" id="f-notes" placeholder="Lineage, phenotype notes, source, PM resistance, terpene profile…">${v(item,'notes')}</textarea></div>
    </div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveForm('seeds')">Save Strain</button></div>`;

  if (section === 'breeding') return `
    <div class="modal-header"><div class="modal-title">${title} Breeding Run</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-field full"><div class="form-label">Cross Name (optional)</div><input class="form-input" id="f-crossName" placeholder="e.g. Acapulco Gold S1, El Dorado f2…" value="${v(item,'crossName')}" /></div>
      <div class="form-field"><div class="form-label">Seed Mother<span class="req">*</span></div><input class="form-input" id="f-mother" placeholder="e.g. AG1-2" value="${v(item,'mother')}" /></div>
      <div class="form-field"><div class="form-label">Pollen Donor<span class="req">*</span></div><input class="form-input" id="f-father" placeholder="e.g. AG1-1 (reversed)" value="${v(item,'father')}" /></div>
      <div class="form-field"><div class="form-label">Date Pollinated</div><input class="form-input" id="f-date" type="date" value="${v(item,'date')}" /></div>
      <div class="form-field"><div class="form-label">Pollination Day (flower)</div><input class="form-input" id="f-pollinationDay" type="number" placeholder="e.g. 28" value="${v(item,'pollinationDay')}" /></div>
      <div class="form-field"><div class="form-label">Seeds Produced</div><input class="form-input" id="f-seedsProduced" type="text" placeholder="e.g. ~50" value="${v(item,'seedsProduced')}" /></div>
      <div class="form-field"><div class="form-label">Generation</div><input class="form-input" id="f-generation" placeholder="e.g. F1, S1, BX1" value="${v(item,'generation')}" /></div>
      <div class="form-field"><div class="form-label">Pollen Source / Method</div><input class="form-input" id="f-pollenSource" placeholder="e.g. STS reversal, collected fresh" value="${v(item,'pollenSource')}" /></div>
      <div class="form-field"><div class="form-label">Reversal Project?</div>
        <select class="form-select" id="f-reversal"><option value="">No</option><option value="true" ${vb(item,'reversal')?'selected':''}>Yes (STS / Colloidal Silver)</option></select>
      </div>
      <div class="form-field"><div class="form-label">F2 / IBL Run?</div>
        <select class="form-select" id="f-f2"><option value="">No</option><option value="true" ${vb(item,'f2')?'selected':''}>Yes</option></select>
      </div>
      <div class="form-field full"><div class="form-label">Notes</div><textarea class="form-textarea" id="f-notes" placeholder="STS schedule, pollination notes, seed appearance, storage…">${v(item,'notes')}</textarea></div>
    </div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveForm('breeding')">Save Run</button></div>`;
}

function fv(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function ff(id) { const v = fv(id); return v ? parseFloat(v) : null; }

function saveForm(section) {
  let obj = {};

  if (section === 'plants') {
    const strainVal = fv('f-strain') || fv('f-plant');
    if (!strainVal) { toast('Strain name is required.','error'); return; }
    let harvestDate = fv('f-harvestDate');
    if (!harvestDate && fv('f-flipDate')) {
      const tgt = parseInt(fv('f-targetFlower')) || 63;
      const flip = new Date(fv('f-flipDate'));
      flip.setDate(flip.getDate() + tgt);
      harvestDate = flip.toISOString().slice(0,10);
    }
    // Infer stage from what's filled in
    let stage = 'seedling';
    if (fv('f-flipDate')) stage = 'flower';
    else if (fv('f-germStart') || fv('f-cloneIn')) stage = 'seedling';
    if (_editIdx !== null) stage = DB.grows[_editIdx].stage; // preserve on edit

    const existing = _editIdx !== null ? DB.grows[_editIdx] : {};
    obj = {
      ...existing,
      uid: existing.uid || nextUid(),
      strain: strainVal,
      id: fv('f-id'),
      sex: fv('f-sex'),
      breeder: fv('f-breeder'),
      source: fv('f-cloneIn') ? 'clone' : 'seed',
      medium: fv('f-medium'),
      container: fv('f-container'),
      germStart: fv('f-germStart'),
      cloneIn: fv('f-cloneIn'),
      seedlingDate: fv('f-germStart') || fv('f-cloneIn') || (existing.seedlingDate||null),
      mother: fv('f-mother'),
      flipDate: fv('f-flipDate'),
      harvestDate,
      targetFlower: parseInt(fv('f-targetFlower'))||63,
      notes: fv('f-notes'),
      stage
    };

  } else if (section === 'journal') {
    if (!fv('f-date')) { toast('Date is required.','error'); return; }
    if (!fv('f-notes')) { toast('Notes are required.','error'); return; }
    const checks = document.querySelectorAll('#issue-checks input:checked');
    const issues = [...checks].map(c => c.value);
    obj = { date:fv('f-date'), plantId:fv('f-plantId'), notes:fv('f-notes'), vpd:ff('f-vpd'), temp:ff('f-temp'), humidity:ff('f-humidity'), ppfd:ff('f-ppfd'), ph:ff('f-ph'), ec:ff('f-ec'), lightHeight:ff('f-lightHeight'), issues };

  } else if (section === 'history') {
    if (!fv('f-strain') && !fv('f-plant')) { toast('Strain name is required.','error'); return; }
    const existing = _editIdx !== null ? DB.grows[_editIdx] : {};
    obj = {
      ...existing,
      uid: existing.uid || nextUid(),
      strain: fv('f-strain') || fv('f-plant'),
      id: fv('f-id'),
      sex: fv('f-sex'),
      flipDate: fv('f-flipDate'),
      harvestDate: fv('f-harvestDate'),
      wetWeight: ff('f-wetWeight'),
      dryWeight: ff('f-dryWeight'),
      trimWeight: ff('f-trimWeight'),
      smokeReport: fv('f-smokeReport'),
      rating: fv('f-rating'),
      notes: fv('f-notes'),
      stage: 'complete',
      completedDate: existing.completedDate || fv('f-harvestDate') || today()
    };

  } else if (section === 'cures') {
    if (!fv('f-strain')) { toast('Strain name is required.','error'); return; }
    const existing = _editIdx !== null ? DB.grows[_editIdx] : {};
    obj = {
      ...existing,
      uid: existing.uid || nextUid(),
      strain: fv('f-strain'),
      harvestDate: fv('f-harvestDate'),
      jarDate: fv('f-jarDate') || existing.jarDate,
      wetWeight: ff('f-wetWeight'),
      dryWeight: ff('f-dryWeight'),
      trimWeight: ff('f-trimWeight'),
      jarCount: parseInt(fv('f-jarCount'))||null,
      jarLogs: existing.jarLogs || [],
      smokeReport: fv('f-smokeReport'),
      rating: fv('f-rating'),
      notes: fv('f-notes'),
      stage: existing.stage || 'curing'
    };

  } else if (section === 'containers') {
    if (!fv('f-name')) { toast('Container name is required.','error'); return; }
    const id = (_editIdx !== null) ? DB.containers[_editIdx].id : nextContainerId();
    obj = { id, name:fv('f-name'), type:fv('f-ctype'), location:fv('f-clocation'), notes:fv('f-notes') };

  } else if (section === 'seeds') {
    if (!fv('f-strain')) { toast('Strain name is required.','error'); return; }
    obj = { strain:fv('f-strain'), type:fv('f-type'), qty:fv('f-qty'), breeder:fv('f-breeder'), year:fv('f-year'), containerId:fv('f-containerId'), notes:fv('f-notes') };

  } else if (section === 'breeding') {
    if (!fv('f-mother')||!fv('f-father')) { toast('Mother and father are required.','error'); return; }
    obj = { crossName:fv('f-crossName'), mother:fv('f-mother'), father:fv('f-father'), date:fv('f-date'), pollinationDay:fv('f-pollinationDay'), seedsProduced:fv('f-seedsProduced'), generation:fv('f-generation'), pollenSource:fv('f-pollenSource'), reversal:fv('f-reversal')==='true', f2:fv('f-f2')==='true', notes:fv('f-notes') };
  }

  // Route plants/history/cures writes to DB.grows
  if (section === 'plants' || section === 'history' || section === 'cures') {
    if (_editIdx !== null) {
      DB.grows[_editIdx] = obj;
      toast('Updated.');
    } else {
      DB.grows.push(obj);
      toast('Added.');
    }
  } else {
    if (_editIdx !== null) {
      DB[section][_editIdx] = obj;
      toast('Updated.');
    } else {
      DB[section].push(obj);
      toast('Added.');
    }
  }
  save();
  closeModal();
  render();
}

function del(section, i) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  const arr = (section === 'plants' || section === 'history' || section === 'cures')
    ? DB.grows : DB[section];
  // Clear container references from seeds before deleting the container
  if (section === 'containers') {
    const containerId = DB.containers[i] && DB.containers[i].id;
    if (containerId) DB.seeds.forEach(s => { if (s.containerId === containerId) s.containerId = ''; });
  }
  // Clear journal entries linked to a grow being deleted
  if (section === 'plants' || section === 'history' || section === 'cures') {
    const uid = DB.grows[i] && DB.grows[i].uid;
    if (uid) DB.journal = DB.journal.filter(j => j.plantId !== uid);
  }
  arr.splice(i, 1);
  save(); closeModal(); render();
  toast('Deleted.');
}

function autoCalcHarvest() {
  const flipEl    = document.getElementById('f-flipDate');
  const tgtEl     = document.getElementById('f-targetFlower');
  const harvestEl = document.getElementById('f-harvestDate');
  if (!flipEl || !tgtEl || !harvestEl) return;
  // Only auto-fill if harvest is blank or was previously auto-filled
  const flip = flipEl.value;
  const tgt  = parseInt(tgtEl.value) || 63;
  if (flip && !harvestEl.dataset.manual) {
    const d = new Date(flip);
    d.setDate(d.getDate() + tgt);
    harvestEl.value = d.toISOString().slice(0, 10);
  }
}

// ── AUTO TRANSITIONS ──────────────────────────────────────────────────────
// Seedling → Veg happens automatically after 14 days (first true leaves).
// Veg → Flower is always manual because timing is grower-controlled.
const SEEDLING_TO_VEG_DAYS = 14;

function autoTransitionSeedlings() {
  let changed = false;
  DB.grows.forEach(g => {
    if (g.stage !== 'seedling') return;
    const start = g.seedlingDate || g.germStart || g.cloneIn;
    if (!start) return;
    if (daysBetween(start, today()) >= SEEDLING_TO_VEG_DAYS) {
      g.stage = 'veg';
      g.vegDate = g.vegDate || today();
      changed = true;
    }
  });
  if (changed) save();
}

// ── STAGE TRANSITIONS ─────────────────────────────────────────────────────
function advanceStage(i) {
  const g = DB.grows[i];
  if (!g) return;

  if (g.stage === 'seedling') {
    g.stage = 'veg';
    g.vegDate = g.vegDate || today();
    save(); render();
    toast(`${esc(g.strain)} moved to Veg.`);
    return;
  }

  if (g.stage === 'veg') {
    showModal(`
      <div class="modal-header"><div class="modal-title">Flip to Flower — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="form-grid">
        <div class="form-field"><div class="form-label">Flip Date</div><input class="form-input" id="adv-flipDate" type="date" value="${today()}" /></div>
        <div class="form-field"><div class="form-label">Target Flower Days</div><input class="form-input" id="adv-targetFlower" type="number" value="${g.targetFlower||63}" /></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmAdvance(${i},'flower')">Flip to Flower →</button>
      </div>`);
    return;
  }

  if (g.stage === 'flower') {
    showModal(`
      <div class="modal-header"><div class="modal-title">Log Harvest — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <p class="modal-hint-dim">Record the harvest. The plant will move to Drying.</p>
      <div class="form-grid">
        <div class="form-field"><div class="form-label">Harvest Date</div><input class="form-input" id="adv-harvestDate" type="date" value="${today()}" /></div>
        <div class="form-field"><div class="form-label">Wet Weight (g)</div><input class="form-input" id="adv-wetWeight" type="number" step="0.1" min="0" placeholder="420" value="${g.wetWeight||''}" /></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmAdvance(${i},'drying')">Log Harvest → Drying</button>
      </div>`);
    return;
  }

  if (g.stage === 'drying') {
    showModal(`
      <div class="modal-header"><div class="modal-title">Move to Jars — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <p class="modal-hint-dim">Stems snapping? Buds feel right? Move to jars and start the cure.</p>
      <div class="form-grid">
        <div class="form-field"><div class="form-label">Jar Date</div><input class="form-input" id="adv-jarDate" type="date" value="${today()}" /></div>
        <div class="form-field"><div class="form-label">Dry Weight (g)</div><input class="form-input" id="adv-dryWeight" type="number" step="0.1" min="0" placeholder="84" value="${g.dryWeight||''}" /></div>
        <div class="form-field"><div class="form-label">Trim Weight (g)</div><input class="form-input" id="adv-trimWeight" type="number" step="0.1" min="0" placeholder="12" value="${g.trimWeight||''}" /></div>
        <div class="form-field"><div class="form-label">Number of Jars</div><input class="form-input" id="adv-jarCount" type="number" min="0" placeholder="3" value="${g.jarCount||''}" /></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmAdvance(${i},'curing')">Move to Jars → Curing</button>
      </div>`);
    return;
  }
}

function confirmAdvance(i, toStage) {
  const g = DB.grows[i];
  if (!g) return;
  const gf = id => { const v = fv(id); return v ? parseFloat(v) : null; };

  if (toStage === 'flower') {
    g.flipDate = fv('adv-flipDate') || today();
    g.targetFlower = parseInt(fv('adv-targetFlower')) || 63;
    g.stage = 'flower';
  }
  if (toStage === 'drying') {
    g.harvestDate = fv('adv-harvestDate') || today();
    g.dryStart = g.harvestDate;
    if (gf('adv-wetWeight')) g.wetWeight = gf('adv-wetWeight');
    g.stage = 'drying';
  }
  if (toStage === 'curing') {
    g.jarDate = fv('adv-jarDate') || today();
    if (gf('adv-dryWeight'))  g.dryWeight  = gf('adv-dryWeight');
    if (gf('adv-trimWeight')) g.trimWeight = gf('adv-trimWeight');
    if (fv('adv-jarCount'))   g.jarCount   = parseInt(fv('adv-jarCount')) || null;
    g.stage = 'curing';
  }

  save(); closeModal(); render();
  toast(`${esc(g.strain)} moved to ${STAGE_LABELS[toStage]}.`);
}

function completeCure(i) {
  const g = DB.grows[i];
  if (!g) return;
  showModal(`
    <div class="modal-header"><div class="modal-title">Complete Cure — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p class="modal-hint-dim">Mark this cure complete and move it to History. Add a smoke report while it's fresh.</p>
    <div class="form-grid">
      <div class="form-field"><div class="form-label">Completed Date</div><input class="form-input" id="cc-date" type="date" value="${today()}" /></div>
      <div class="form-field">
        <div class="form-label">Rating</div>
        <select class="form-input" id="cc-rating">
          <option value="">—</option>
          ${['⭐ 1 – Poor','⭐⭐ 2 – Below Avg','⭐⭐⭐ 3 – Average','⭐⭐⭐⭐ 4 – Good','⭐⭐⭐⭐⭐ 5 – Exceptional'].map(r=>`<option value="${r}" ${g.rating===r?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>
      <div class="form-field full"><div class="form-label">Smoke Report</div><textarea class="form-textarea" id="cc-smoke" rows="4" placeholder="Aroma, flavor, effect, notes…">${esc(g.smokeReport||'')}</textarea></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmCompleteCure(${i})">Complete → History</button>
    </div>`);
}

function confirmCompleteCure(i) {
  const g = DB.grows[i];
  if (!g) return;
  g.completedDate = fv('cc-date') || today();
  if (fv('cc-rating'))  g.rating = fv('cc-rating');
  if (fv('cc-smoke'))   g.smokeReport = fv('cc-smoke');
  g.stage = 'complete';
  save(); closeModal(); render();
  toast(`${esc(g.strain)} cure complete — moved to History.`);
}

// ── OPTION BUTTON helper for cull/fate chooser modals ──
function optionBtn(btnCls, onclickStr, icon, title, desc) {

    <span class="opt-icon">${icon}</span>

}
// Entry point — show cull type picker
function cullPlant(i) {

}
