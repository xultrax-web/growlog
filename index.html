    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
      ${optionBtn('btn-ghost', 'mutantKeepModal('+i+",'mutant')", '🧬', 'Keep — Interesting Mutant', 'Unusual trait worth watching. Stays on Plants page, flagged as mutant.')}
      ${optionBtn('btn-ghost', 'mutantKeepModal('+i+",'runt')", '📉', 'Keep — Runt (worth seeing out)', 'Small or slow but still running. Stays on Plants page, flagged as runt.')}
      ${optionBtn('btn-warn', 'mutantCullModal('+i+",'culled_mutant')", '🧬✂️', 'Cull — Mutant (not worth keeping)', 'Bad mutation, non-viable, or wasting space. Logged to History.')}
      ${optionBtn('btn-warn', 'mutantCullModal('+i+",'culled_runt')", '📉✂️', 'Cull — Runt (not worth running)', 'Too far behind, not viable. Logged to History.')}
    </div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="cullPlant(${i})">← Back</button></div>`);
}

// Keep a mutant/runt — flags the plant but keeps it alive in normal lifecycle
function mutantKeepModal(i, type) {
  const g = DB.grows[i];
  const label = type === 'mutant' ? 'Keep Mutant' : 'Keep Runt';
  const fate  = type === 'mutant' ? 'kept_mutant' : 'kept_runt';
  showModal(`
    <div class="modal-header"><div class="modal-title">${label} — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p class="modal-hint">Plant stays active. A badge will appear on its card to mark it. Continues through normal lifecycle to harvest.</p>
    <div class="form-field"><label class="form-label">Notes</label><textarea class="form-input" id="mr-notes" rows="3" placeholder="${type==='mutant'?'Describe the mutation — trifoliate, single-blade, whorled phyllotaxy, etc...':'Describe the issue — extreme stretch, slow rooting, stunted veg, etc...'}"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cullMutantRuntModal(${i})">← Back</button>
      <button class="btn btn-primary" onclick="confirmKeepMutantRunt(${i},'${fate}')">Keep — Flag Plant</button>
    </div>`);
}

function confirmKeepMutantRunt(i, fate) {
  const g = DB.grows[i];
  if (!g) return;
  const el = document.getElementById('mr-notes');
  const notes = el ? el.value.trim() : '';
  g.fate = fate;
  if (notes) g.cullNotes = notes;
  save(); closeModal(); render();
  const label = fate === 'kept_mutant' ? 'mutant' : 'runt';
  toast(`${esc(g.strain)} flagged as ${esc(label)}. Still running — badge shown on plant card.`);
}

// Cull a mutant or runt — moves to History
function mutantCullModal(i, fate) {
  const g = DB.grows[i];
  const label = fate === 'culled_mutant' ? 'Cull Mutant' : 'Cull Runt';
  showModal(`
    <div class="modal-header"><div class="modal-title">${label} — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-field"><label class="form-label">Date Culled</label><input class="form-input" id="mc-date" type="date" value="${today()}"></div>
    <div class="form-field"><label class="form-label">Notes</label><textarea class="form-input" id="mc-notes" rows="3" placeholder="${fate==='culled_mutant'?'Describe the mutation and why it was removed...':'Describe why the runt was not worth running...'}"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cullMutantRuntModal(${i})">← Back</button>
      <button class="btn btn-danger" onclick="confirmCull(${i},'${fate}')">Confirm Cull</button>
    </div>`);
}


// Finalize cull: write fate fields, move to complete, save
function confirmCull(i, fate) {
  const g = DB.grows[i];
  if (!g) return;
  g.fate = fate;
  if (fate === 'culled_male') {
    g.cullDate = fv('cm-date') || today();
    const sd = fv('cm-sexdays'); if (sd) g.sexConfirmedDays = parseInt(sd);
    const nearby = fv('cm-nearby');
    const notes = fv('cm-notes');
    g.cullNotes = [nearby ? 'Nearby: '+nearby : '', notes].filter(Boolean).join(' · ');
    g.sex = 'male';
  } else if (fate === 'culled_mutant' || fate === 'culled_runt') {
    g.cullDate = fv('mc-date') || today();
    g.cullNotes = fv('mc-notes');
  } else {
    g.cullDate = fv('co-date') || today();
    g.cullNotes = fv('co-notes');
  }
  g.stage = 'complete';
  save(); closeModal(); render();
  const msg = fate === 'culled_male'   ? `${g.strain} culled ♂ — logged to History.`
             : fate === 'died'         ? `${g.strain} logged as died — recorded in History.`
             : fate === 'culled_mutant'? `${g.strain} culled (mutant) — recorded in History.`
             : fate === 'culled_runt'  ? `${g.strain} culled (runt) — recorded in History.`
             : `${g.strain} culled — recorded in History.`;
  toast(msg);
}

// Finalize keep male: set stage to breeding_hold
function confirmKeepMale(i) {
  const g = DB.grows[i];
  if (!g) return;
  const sd = fv('km-sexdays'); if (sd) g.sexConfirmedDays = parseInt(sd);
  const notes = fv('km-notes'); if (notes) g.cullNotes = notes;
  g.sex = 'male';
  g.fate = 'culled_male_keeper';
  g.stage = 'breeding_hold';
  save(); closeModal(); render();
  toast(`${esc(g.strain)} moved to Breeding Hold. Shown on Plants page.`);
}

// Cull a breeding_hold male (after pollen collected / no longer needed)
function cullBreedingMale(i) {
  const g = DB.grows[i];
  if (!g) return;
  showModal(`
    <div class="modal-header"><div class="modal-title">Retire Breeding Male — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-field"><label class="form-label">Date Retired</label><input class="form-input" id="cbm-date" type="date" value="${today()}"></div>
    <div class="form-field"><label class="form-label">Notes</label><textarea class="form-input" id="cbm-notes" rows="2" placeholder="Pollen collected, crosses made, etc..."></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmRetireBreeder(${i})">Retire & Archive</button>
    </div>`);
}

function confirmRetireBreeder(i) {
  const g = DB.grows[i];
  if (!g) return;
  const d = fv('cbm-date'); if (d) g.cullDate = d;
  const n = fv('cbm-notes'); if (n) g.cullNotes = (g.cullNotes ? g.cullNotes + ' · ' : '') + n;
  g.stage = 'complete';
  save(); closeModal(); render();
  toast(`${esc(g.strain)} breeding male archived to History.`);
}

function plantFromSeed(i) {
  const s = DB.seeds[i];
  closeModal();
  nav('plants');
  _editSection = 'plants'; _editIdx = null;
  showModal(buildForm('plants', {
    strain: s.strain,
    breeder: s.breeder || '',
    targetFlower: 63,
    notes: `Seed vault: ${s.breeder||'—'}, ${s.year||'—'}. Container: ${s.containerId ? containerName(s.containerId) : (s.bin||'—')}.`
  }));
}

// Log a dud / failed germination against a seed pack
function logDudSeed(i) {
  const s = DB.seeds[i];
  showModal(`
    <div class="modal-header"><div class="modal-title">Log Failed Germ — ${esc(s.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p class="modal-hint">Records the failure against this pack. Current qty: <strong>${esc(s.qty||'?')}</strong></p>
    <div class="form-field"><label class="form-label">Date attempted</label><input class="form-input" id="dud-date" type="date" value="${today()}"></div>
    <div class="form-field"><label class="form-label">How many seeds failed this attempt</label><input class="form-input" id="dud-count" type="number" min="1" max="20" value="1" placeholder="1"></div>
    <div class="form-field"><label class="form-label">Notes</label><textarea class="form-input" id="dud-notes" rows="2" placeholder="Germ method, conditions, what happened..."></textarea></div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:11px;color:var(--text-mid)">
      ⚠️ This will decrement the quantity on this seed pack by the number of seeds failed.
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="openView('seeds',${i})">← Back</button>
      <button class="btn btn-danger" onclick="confirmLogDud(${i})">Log Dud</button>
    </div>`);
}

function confirmLogDud(i) {
  const s = DB.seeds[i];
  if (!s) return;
  const count = parseInt(fv('dud-count')) || 1;
  const notes = fv('dud-notes');
  const date  = fv('dud-date') || today();
  // Append to dudLog
  if (!s.dudLog) s.dudLog = [];
  s.dudLog.push({ date, count, notes });
  // Decrement qty
  const current = parseFloat(s.qty);
  if (!isNaN(current)) s.qty = String(Math.max(0, current - count));
  save(); closeModal(); render();
  toast(`${count} failed germ${count>1?'s':''} logged for ${esc(s.strain)}. Qty updated.`);
}

function addSeedFromBreed(i) {
  const b = DB.breeding[i];
  closeModal();
  _editSection = 'seeds'; _editIdx = null;
  showModal(buildForm('seeds', {
    strain: b.crossName || `${b.mother} × ${b.father}`,
    type: 'My Seeds',
    qty: b.seedsProduced || '',
    breeder: 'Home Bred',
    year: b.date ? b.date.slice(0,4) : '',
    notes: `${b.generation||''} ${b.notes||''}`.trim()
  }));
  nav('seeds');
}

function prefillPlant(plantId) {
  const el = document.getElementById('f-plantId');
  if (el) el.value = plantId;
}

function showModal(html) {
  document.getElementById('modal-inner').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    // If DB is still empty, return to dashboard (which renders the welcome screen)
    const isEmpty = !DB.grows.length && !DB.seeds.length && !DB.breeding.length;
    if (isEmpty && page !== 'dashboard') {
      page = 'dashboard';
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById('nav-dashboard').classList.add('active');
      render();
    }
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `growlog-backup-${today()}.json`;
  a.click();
  localStorage.setItem('growlog_last_export', Date.now().toString());
  toast('Backup exported.');
}

function triggerImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed.grows !== undefined || parsed.plants !== undefined || parsed.seeds !== undefined) {
          Object.assign(DB, { ...blankData(), ...parsed });
          await save(); render(); toast('Backup imported successfully.');
        } else { toast('Invalid backup file.', 'error'); }
      } catch(e) { toast('Could not read file.','error'); }
    };
    reader.readAsText(f);
  };
  input.click();
}

function triggerCSV() {
  showModal(`
    <div class="modal-header"><div class="modal-title">Import from CSV</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p class="modal-hint">Import a CSV exported from a spreadsheet. Select what type of data it contains and map your columns below.</p>
    <div class="form-grid">
      <div class="form-field full"><div class="form-label">Import Into</div>
        <select class="form-select" id="csv-target">
          <option value="seeds">Seed Vault</option>
          <option value="plants">Plants</option>
          <option value="history">Grow History</option>
        </select>
      </div>
      <div class="form-field full"><div class="form-label">CSV File</div><input type="file" accept=".csv" class="form-input" id="csv-file" style="padding:7px 12px" /></div>
      <div class="form-field full"><div class="form-label">Column Mapping (comma-separated header names in your file)</div>
        <div id="csv-map-seeds">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
            <div><div class="form-label" style="margin-bottom:4px">Strain Name column</div><input class="form-input" id="cm-strain" value="strain" /></div>
            <div><div class="form-label" style="margin-bottom:4px">Type column</div><input class="form-input" id="cm-type" value="type" /></div>
            <div><div class="form-label" style="margin-bottom:4px">Qty column</div><input class="form-input" id="cm-qty" value="qty" /></div>
            <div><div class="form-label" style="margin-bottom:4px">Breeder column</div><input class="form-input" id="cm-breeder" value="breeder" /></div>
            <div><div class="form-label" style="margin-bottom:4px">Year column</div><input class="form-input" id="cm-year" value="year" /></div>
            <div><div class="form-label" style="margin-bottom:4px">Bin column (legacy)</div><input class="form-input" id="cm-bin" value="bin" /></div>
            <div class="form-field" style="grid-column:1/-1"><div class="form-label" style="margin-bottom:4px">Notes column</div><input class="form-input" id="cm-notes" value="notes" /></div>
          </div>
        </div>
      </div>
    </div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="runCSVImport()">Import CSV</button></div>`);
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const values = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { values.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    values.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (values[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

function runCSVImport() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) { toast('Select a CSV file first.','error'); return; }
  const target = document.getElementById('csv-target').value;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    let added = 0;
    rows.forEach(row => {
      if (target === 'seeds') {
        const strain = row[fv('cm-strain')||'strain'] || row.strain || row.name;
        if (!strain) return;
        DB.seeds.push({
          strain, type: row[fv('cm-type')||'type']||row.type||'Regular Hybrid',
          qty: row[fv('cm-qty')||'qty']||row.qty||'',
          breeder: row[fv('cm-breeder')||'breeder']||row.breeder||'',
          year: row[fv('cm-year')||'year']||row.year||'',
          bin: row[fv('cm-bin')||'bin']||row.bin||'',
          containerId: '',
          notes: row[fv('cm-notes')||'notes']||row.notes||''
        });
        added++;
      } else if (target === 'plants') {
        const strain = row.plant||row.strain||row.name;
        if (!strain) return;
        const cloneIn = row.clonein||row.clone_in||'';
        const flipDate = row.flipdate||row.flip_date||'';
        let stage = 'seedling';
        if (flipDate) stage = 'flower';
        else if (cloneIn) stage = 'veg';
        DB.grows.push({ uid: nextUid(), strain, id:row.id||'', sex:row.sex||'',
          source: cloneIn ? 'clone' : 'seed',
          germStart:row.germstart||row.germ_start||'', cloneIn, flipDate,
          harvestDate:row.harvestdate||row.harvest_date||'',
          targetFlower:parseInt(row.targetflower)||63, notes:row.notes||'', stage });
        added++;
      } else if (target === 'history') {
        const strain = row.plant||row.strain||row.name;
        if (!strain) return;
        DB.grows.push({ uid: nextUid(), strain, id:row.id||'', sex:row.sex||'',
          flipDate:row.flipdate||row.flip_date||'',
          harvestDate:row.harvestdate||row.harvest_date||'',
          wetWeight:parseFloat(row.wetweight||row.wet_weight)||null,
          dryWeight:parseFloat(row.dryweight||row.dry_weight)||null,
          notes:row.notes||'', stage: 'complete',
          completedDate: row.harvestdate||row.harvest_date||today() });
        added++;
      }
    });
    save(); closeModal(); render();
    toast(`Imported ${added} records.`);
  };
  reader.readAsText(file);
}

_startup();
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
});

// ── SERVICE WORKER — offline support & installability ──────────────────────
// Unregister any previously installed service workers so stale caches don't block updates.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
</script>
</body>
</html>
