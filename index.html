<title>GrowLog — Personal Grow Tracker</title>
<meta name="description" content="Local-first grow tracker. No account. No servers. Your data stays on your device.">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- No external font requests — system fonts only -->
<style>
:root {
  --bg: #0c0f0d;
  --surface: #141918;
  --surface2: #1c2220;
  --surface3: #232b28;
  --border: #283028;
  --border2: #334033;
  --accent: #4ade80;
  --accent2: #86efac;
  --accent-dim: #14532d;
  --accent-glow: rgba(74,222,128,0.15);
  --warn: #d97706;
  --warn-dim: rgba(217,119,6,0.12);
  --danger: #f87171;
  --danger-dim: rgba(248,113,113,0.12);
  --purple: #c4b5fd;
  --purple-dim: rgba(196,181,253,0.12);
  --blue: #93c5fd;
  --blue-dim: rgba(147,197,253,0.12);
  --pink: #f9a8d4;
  --pink-dim: rgba(249,168,212,0.12);
  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.12);
  --teal: #5eead4;
  --teal-dim: rgba(94,234,212,0.12);
  --text: #dde8e2;
  --text-dim: #5a7066;
  --text-mid: #8fa89a;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
  --serif: Georgia, 'Book Antiqua', Palatino, serif;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

body.light-mode {
  --bg: #f4f7f5;
  --surface: #ffffff;
  --surface2: #eef2f0;
  --surface3: #e4ebe8;
  --border: #d0dbd6;
  --border2: #b8ccc6;
  --accent: #16a34a;
  --accent2: #15803d;
  --accent-dim: #dcfce7;
  --accent-glow: rgba(22,163,74,0.1);
  --warn: #d97706;
  --warn-dim: rgba(217,119,6,0.1);
  --danger: #dc2626;
  --danger-dim: rgba(220,38,38,0.1);
  --purple: #7c3aed;
  --purple-dim: rgba(124,58,237,0.1);
  --blue: #2563eb;
  --blue-dim: rgba(37,99,235,0.1);
  --pink: #db2777;
  --pink-dim: rgba(219,39,119,0.1);
  --orange: #ea580c;
  --orange-dim: rgba(234,88,12,0.1);
  --teal: #0d9488;
  --teal-dim: rgba(13,148,136,0.1);
  --text: #1a2e24;
  --text-dim: #6b8c7d;
  --text-mid: #3d6b57;
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, .icon { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }
body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; overflow-x: hidden; }

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 230px; min-width: 230px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
.main { flex: 1; overflow-y: auto; padding: 32px 36px; background: var(--bg); }

@media print {
  .sidebar { display: none !important; }
  .main { padding: 20px !important; overflow: visible !important; }
  .app { height: auto !important; overflow: visible !important; }
  body { background: #fff !important; color: #000 !important; font-size: 11px !important; }
  .plant-tile { break-inside: avoid; border: 1px solid #ccc !important; background: #fff !important; }
  .tile-grid { grid-template-columns: repeat(2,1fr) !important; }
  .btn, .toolbar, .board-alerts, .header-actions, .tile-drag-handle { display: none !important; }
  .page-title { color: #000 !important; font-size: 22px !important; }
  .tile-cell-value, .tile-name { color: #000 !important; }
  .tile-cell-label { color: #555 !important; }
  .stage-group-header { color: #000 !important; border-color: #ccc !important; }
  .prog-track { background: #ddd !important; }
}

@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; min-width: unset; height: auto; flex-direction: row; overflow-x: auto; overflow-y: hidden; border-right: none; border-bottom: 1px solid var(--border); }
  .sidebar-header { display: none; }
  .nav { display: flex; flex-direction: row; padding: 0; overflow-x: auto; }
  .section-label { display: none; }
  .nav-item { flex-direction: column; gap: 4px; padding: 12px 14px; font-size: 10px; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
  .nav-item.active { border-left: none; border-bottom-color: var(--accent); }
  .nav-badge { display: none; }
  .nav-item-more { display: flex; }
  .main { padding: 20px 16px; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .dashboard-grid { grid-template-columns: 1fr !important; }
  .form-grid { grid-template-columns: 1fr !important; }
  .form-field.full { grid-column: 1 !important; }
  .cards-grid { grid-template-columns: 1fr !important; }
  .modal { margin: 0; max-height: 100vh; border-radius: 0; }
}
.nav-item-more { display: none; }
.mobile-menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.mobile-menu-btn { display: flex; align-items: center; gap: 8px; padding: 12px 10px; border-radius: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); background: var(--surface2); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; text-align: left; }
.mobile-menu-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface3); }
.mobile-menu-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.mobile-menu-btn.danger { color: var(--danger); border-color: var(--danger-dim); }
.mobile-menu-btn.warn { color: var(--warn); border-color: var(--warn-dim); }

/* ── SIDEBAR ── */
.sidebar-header { padding: 24px 20px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { font-family: var(--serif); font-size: 24px; color: var(--accent); font-style: italic; line-height: 1; letter-spacing: -0.5px; }
.logo-sub { font-size: 9px; color: var(--text-dim); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 5px; }
.logo-version { display: inline-block; margin-top: 8px; font-size: 9px; color: var(--accent-dim); background: rgba(74,222,128,0.08); border: 1px solid var(--accent-dim); border-radius: 4px; padding: 2px 6px; letter-spacing: 0.1em; }
.nav { padding: 10px 0; flex: 1; }
.section-label { font-size: 10px; color: var(--text-mid); letter-spacing: 0.16em; text-transform: uppercase; padding: 18px 20px 6px; font-weight: 700; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; color: var(--text-dim); font-size: 11px; letter-spacing: 0.04em; transition: all 0.15s; border-left: 3px solid transparent; user-select: none; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }
.nav-item.nav-primary { color: var(--text); font-size: 12px; }
.nav-item.nav-primary:hover { color: var(--text); background: var(--surface2); }
.nav-icon { width: 14px; height: 14px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.nav-label { flex: 1; }
.nav-badge { background: var(--accent-dim); color: var(--accent); font-size: 9px; padding: 1px 6px; border-radius: 10px; font-weight: 700; min-width: 20px; text-align: center; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.sidebar-btn { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); background: none; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; width: 100%; text-align: left; }
.sidebar-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }
.sidebar-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

/* ── PAGE HEADER ── */
.page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.page-title { font-family: var(--serif); font-size: 30px; font-style: italic; color: var(--text); line-height: 1; }
.page-subtitle { font-size: 11px; color: var(--text-dim); flex: 1; }
.header-actions { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-wrap: wrap; }

/* ── STATS ── */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; transition: border-color 0.15s; }
.stat-card:hover { border-color: var(--border2); }
.stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
.stat-value { font-size: 28px; color: var(--accent); font-family: var(--serif); font-style: italic; line-height: 1; }
.stat-sub { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

/* ── TOOLBAR ── */
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px 8px 34px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-dim); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; pointer-events: none; }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 5px 12px; border-radius: 20px; font-family: var(--mono); font-size: 10px; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); background: var(--surface); transition: all 0.15s; letter-spacing: 0.04em; white-space: nowrap; }
.chip:hover { color: var(--text); border-color: var(--border2); }
.chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 6px; font-family: var(--mono); font-size: 11px; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.03em; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #0a0f0b; font-weight: 700; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-ghost { background: var(--surface2); color: var(--text-mid); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
.btn-danger:hover { background: rgba(248,113,113,0.2); }
.btn-warn { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(251,191,36,0.25); }
.btn-sm { padding: 5px 10px; font-size: 10px; }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; align-items: center; }

/* ── TABLE ── */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 11px 14px; text-align: left; font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; border-bottom: 1px solid var(--border); background: var(--surface2); font-weight: 400; white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(74,222,128,0.03); }
tbody td { padding: 10px 14px; font-size: 12px; color: var(--text-mid); vertical-align: middle; }
.td-main { color: var(--text); font-weight: 700; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-sub { color: var(--text-dim); font-size: 11px; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; white-space: nowrap; }
.badge-veg      { background: rgba(74,222,128,0.1);  color: var(--accent); }
.badge-seedling { background: rgba(94,234,212,0.1);  color: var(--teal); }
.badge-flower   { background: rgba(251,191,36,0.1);  color: var(--warn); }
.badge-harvest  { background: rgba(248,113,113,0.1); color: var(--danger); }
.badge-clone    { background: rgba(196,181,253,0.1); color: var(--purple); }
.badge-cure     { background: rgba(251,146,60,0.1);  color: var(--orange); }
.badge-heirloom { background: rgba(251,191,36,0.1);  color: var(--warn); }
.badge-hybrid   { background: rgba(74,222,128,0.1);  color: var(--accent); }
.badge-fem      { background: rgba(249,168,212,0.1); color: var(--pink); }
.badge-auto     { background: rgba(251,146,60,0.1);  color: var(--orange); }
.badge-my       { background: rgba(94,234,212,0.1);  color: var(--teal); }
.badge-wish     { background: rgba(147,197,253,0.1); color: var(--blue); }
.badge-male     { background: rgba(251,191,36,0.1);  color: var(--warn); }
.badge-pm       { background: rgba(148,163,184,0.1); color: #94a3b8; }
.badge-herm     { background: rgba(251,146,60,0.1);  color: var(--orange); }
.badge-dud      { background: rgba(248,113,113,0.1); color: var(--danger); }
.badge-warn     { background: var(--warn-dim);       color: var(--warn); }
.badge-danger   { background: var(--danger-dim);     color: var(--danger); }
.badge-drying   { background: rgba(251,146,60,0.1);  color: var(--orange); }
.badge-curing   { background: rgba(94,234,212,0.1);  color: var(--teal); }
.badge-complete { background: rgba(74,222,128,0.1);  color: var(--accent); }
.badge-breeding_hold { background: rgba(251,191,36,0.15); color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }

/* ── SECTION LABEL — shared utility ── */
.section-title { font-size: 9px; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; }

/* ── PROGRESS ── */
.prog-track { width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden; margin-bottom:2px; }

/* ── ALERT ROW — dashboard alerts ── */
.alert-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.alert-row:hover { border-color: var(--border2); }

/* ── ALERT ── */
.alert { border-radius: var(--radius); padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; font-size: 12px; }
.alert-harvest { background: var(--warn-dim); border: 1px solid rgba(251,191,36,0.2); color: var(--warn); }
.alert-items { display: flex; gap: 16px; flex-wrap: wrap; }
.alert-item { display: flex; flex-direction: column; gap: 2px; }
.alert-item-name { font-weight: 700; }
.alert-item-sub { font-size: 10px; opacity: 0.7; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.15s; }
.card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow); }
.card-notes { font-size: 11px; color: var(--text-dim); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top:8px; }

/* ── TIMELINE ── */
.timeline { padding: 4px 0; }
.timeline-item { display: flex; gap: 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.timeline-item:hover { background: rgba(74,222,128,0.03); }
.timeline-item:last-child { border-bottom: none; }
.tl-dot-col { width: 44px; display: flex; flex-direction: column; align-items: center; padding: 16px 0 0; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.tl-dot.green  { background: var(--accent); }
.tl-dot.yellow { background: var(--warn); }
.tl-dot.red    { background: var(--danger); }
.tl-dot.gray   { background: var(--border2); }
.tl-line { flex: 1; width: 2px; background: var(--border); margin-top: 5px; }
.tl-content { flex: 1; padding: 12px 16px 12px 0; }
.tl-name { font-size: 13px; color: var(--text); font-weight: 700; }
.tl-id { font-size: 11px; color: var(--text-dim); font-weight: 400; }
.tl-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.tl-tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px); }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; width: 100%; max-width: 620px; max-height: 88vh; overflow-y: auto; padding: 28px; box-shadow: var(--shadow); }
.modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.modal-title { font-family: var(--serif); font-size: 26px; font-style: italic; line-height: 1.1; }
.modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 20px; padding: 0; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
.modal-close:hover { color: var(--text); }
.modal-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 18px; }
.modal-section { margin-bottom: 20px; }
.modal-section-title { font-size: 9px; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.detail-field { display: flex; flex-direction: column; gap: 3px; }
.detail-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
.detail-value { font-size: 13px; color: var(--text); }
.detail-notes { background: var(--surface2); border-radius: 6px; padding: 12px 14px; font-size: 12px; color: var(--text-mid); line-height: 1.65; white-space: pre-wrap; }

/* ── FORMS ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field.full { grid-column: 1 / -1; }
.form-label { font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
.form-label .req { color: var(--accent); margin-left: 2px; }
.form-input, .form-select, .form-textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.15s; width: 100%; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: var(--surface3); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-dim); }
.form-select { cursor: pointer; }
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.form-select option { background: var(--surface2); }
.form-hint { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
.form-divider { grid-column: 1 / -1; border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* ── JOURNAL ── */

/* ── VAULT BOARD (legacy drawer CSS kept for seed detail drawer) ── */

.col-resize-handle {
  position: absolute; right: -10px; top: 0; bottom: 0; width: 20px;
  cursor: col-resize; z-index: 2; display: flex; align-items: center; justify-content: center;
}
.col-resize-handle::after { content: ''; display: block; width: 2px; height: 60%; background: var(--border2); border-radius: 1px; transition: background 0.15s, width 0.15s; }
.col-resize-handle:hover::after, .col-resize-handle.resizing::after { background: var(--accent); width: 3px; }

.vault-drawer { display: none; border-bottom: 1px solid var(--border); background: var(--surface); }
.seed-drawer .vault-drawer { display: block; }

/* ── WELCOME ── */
.welcome { max-width: 580px; margin: 32px auto; text-align: center; padding: 0 16px; }
.welcome-logo { font-family: var(--serif); font-size: 64px; color: var(--accent); font-style: italic; margin-bottom: 4px; line-height: 1; }
.welcome-tagline { color: var(--text-dim); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 28px; }
.welcome-desc { color: var(--text-mid); font-size: 13px; line-height: 1.85; margin-bottom: 32px; }
.feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 32px; text-align: left; }
.feature-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.feature-card:hover { border-color: var(--accent); background: var(--surface2); }
.feature-icon { font-size: 22px; margin-bottom: 8px; }
.feature-title { font-size: 12px; color: var(--text); font-weight: 700; margin-bottom: 4px; }
.feature-desc { font-size: 11px; color: var(--text-dim); line-height: 1.55; }
.welcome-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 18px; font-size: 12px; color: var(--accent); z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.25s; pointer-events: none; max-width: 300px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: var(--danger); color: var(--danger); }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.stats-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.stat-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.stat-panel-title { font-size: 9px; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.stat-panel-title span { font-size: 11px; color: var(--text-mid); letter-spacing: 0; text-transform: none; }
.stat-hero { font-family: var(--serif); font-size: 48px; font-style: italic; line-height: 1; color: var(--accent); }
.stat-hero-unit { font-size: 14px; color: var(--text-dim); font-family: var(--mono); font-style: normal; margin-left: 4px; }
.stat-hero-sub { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
.mini-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.mini-bar-label { font-size: 11px; color: var(--text-mid); min-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.mini-bar-val { font-size: 11px; color: var(--text-dim); min-width: 36px; text-align: right; white-space: nowrap; }
.insight-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
.insight-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.insight-text { font-size: 12px; color: var(--text-mid); line-height: 1.65; }
.insight-text strong { color: var(--text); }
.donut-wrap { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.donut-legend { display: flex; flex-direction: column; gap: 7px; }
.donut-legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-mid); }
.donut-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.timeline-spark { display: flex; align-items: flex-end; gap: 3px; height: 48px; }
.spark-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 6px; transition: height 0.3s; }
.spark-label { font-size: 9px; color: var(--text-dim); text-align: center; margin-top: 4px; }
.no-data-msg { text-align: center; padding: 32px 16px; color: var(--text-dim); font-size: 12px; }
@media (max-width: 768px) { .stats-grid, .stats-grid-3 { grid-template-columns: 1fr; } }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.text-accent { color: var(--accent); }
.text-dim { color: var(--text-dim); }
hr.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ── CONTAINERS ── */
.container-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.container-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; cursor: pointer; transition: all 0.15s; }
.container-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: var(--shadow); }
.container-card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.container-icon { font-size: 26px; flex-shrink: 0; line-height: 1.1; }
.container-id-badge { display: inline-block; font-size: 9px; color: var(--accent); background: var(--accent-glow); border: 1px solid var(--accent-dim); border-radius: 4px; padding: 1px 6px; letter-spacing: 0.08em; margin-bottom: 3px; }
.container-name { font-size: 14px; color: var(--text); font-weight: 700; line-height: 1.2; }
.container-meta { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.container-stats { display: flex; gap: 14px; margin: 10px 0; padding: 10px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.container-stat { display: flex; flex-direction: column; gap: 2px; }
.container-stat-val { font-family: var(--serif); font-size: 20px; font-style: italic; color: var(--accent); line-height: 1; }
.container-stat-lbl { font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
.container-pack-list { margin-top: 10px; }
.container-pack-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 11px; border-bottom: 1px solid var(--border); gap: 8px; }
.container-pack-row:last-child { border-bottom: none; }
.container-pack-strain { color: var(--text-mid); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.container-pack-qty { color: var(--text-dim); flex-shrink: 0; font-family: var(--mono); }
.container-empty { font-size: 11px; color: var(--text-dim); font-style: italic; padding: 8px 0; }

/* ── UTILITY ── */
.modal-hint     { font-size:12px; color:var(--text-mid); margin-bottom:16px; line-height:1.6; }
.modal-hint-dim { font-size:12px; color:var(--text-dim); margin-bottom:16px; }
.btn-option     { justify-content:flex-start !important; gap:10px; padding:12px 16px; text-align:left; }
.opt-title      { font-weight:700; font-size:12px; }
.opt-desc       { font-size:11px; color:var(--text-mid); margin-top:2px; }
.opt-icon       { font-size:18px; flex-shrink:0; }
.prog-label     { font-size:10px; color:var(--text-dim); margin-top:3px; }
.stat-sub       { margin-top:12px; font-size:11px; color:var(--text-dim); }
.alert-row      { display:flex; align-items:center; gap:10px; background:var(--surface); border-radius:8px; padding:10px 12px; }
.meta-dim       { font-size:9px; color:var(--text-dim); }
.cb-accent      { accent-color:var(--accent); }
.txt-dim-sm     { font-size:11px; color:var(--text-dim); }
.txt-dim-xs     { font-size:10px; color:var(--text-dim); }
.form-col-label { grid-column:1/-1; font-size:10px; color:var(--text-dim); letter-spacing:.12em; text-transform:uppercase; }
.tag-wrap       { display:flex; gap:3px; flex-wrap:wrap; }
</style>

<script>
const STORAGE_KEY = 'growlog_v2';
const CRYPTO_META_KEY = 'growlog_crypto_meta';

// ── PHOTO STORE — IndexedDB (no size limit, binary-safe) ──────────────────
const IDB_NAME    = 'growlog_photos';
const IDB_STORE   = 'photos';
const IDB_VERSION = 1;

function _openPhotoDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess  = e => resolve(e.target.result);
    req.onerror    = e => reject(e.target.error);
  });
}

async function photoSave(photoId, dataUrl) {
  try {
    const db = await _openPhotoDb();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(dataUrl, photoId);
      tx.oncomplete = () => resolve();
      tx.onerror    = e => reject(e.target.error);
    });
  } catch(e) { console.error('GrowLog photo save error:', e); }
}

async function photoGet(photoId) {
  try {
    const db = await _openPhotoDb();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(photoId);
      req.onsuccess = e => resolve(e.target.result || null);
      req.onerror   = e => reject(e.target.error);
    });
  } catch(e) { return null; }
}

async function photoDelete(photoId) {
  try {
    const db = await _openPhotoDb();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(photoId);
      tx.oncomplete = () => resolve();
    });
  } catch(e) { /* non-fatal */ }
}

async function photoGetAll() {
  try {
    const db = await _openPhotoDb();
    return new Promise((resolve, reject) => {
      const tx      = db.transaction(IDB_STORE, 'readonly');
      const store   = tx.objectStore(IDB_STORE);
      const results = {};
      const reqKeys = store.getAllKeys();
      reqKeys.onsuccess = ek => {
        const keys = ek.target.result;
        const reqVals = store.getAll();
        reqVals.onsuccess = ev => {
          ev.target.result.forEach((v, i) => results[keys[i]] = v);
          resolve(results);
        };
        reqVals.onerror = e => reject(e.target.error);
      };
      reqKeys.onerror = e => reject(e.target.error);
    });
  } catch(e) { return {}; }
}

async function photoClearAll() {
  try {
    const db = await _openPhotoDb();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete = () => resolve();
    });
  } catch(e) { /* non-fatal */ }
}

function _photoUid() {
  return 'P' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

const SEED_TYPE_ACCENT = {
  'Landrace, Heirloom & IBL': 'var(--warn)',
  'Regular Hybrid':           'var(--accent)',
  'Feminized':                'var(--pink)',
  'Autoflower':               'var(--orange)',
  'My Seeds':                 'var(--teal)',
  'Wish List':                'var(--blue)',
};
const SCHEMA_VERSION = 4;

// ── SEED FILTER HELPER ───────────────────────────────────────────────────────
function _setSeedFilter(key, val) {
  const sf = window._seedFilters || { type: 'All', breeder: 'All', container: 'All' };
  sf[key] = sf[key] === val ? 'All' : val;
  window._seedFilters = sf;

// ── ENCRYPTION ENGINE (Web Crypto API — no external dependencies) ──────────
// AES-GCM 256-bit, key derived via PBKDF2 (100k iterations, SHA-256)
// Encryption is optional. Plaintext users are unaffected.

let _cryptoKey = null; // in-memory only, never persisted

function _getCryptoMeta() {
  try {
    const m = localStorage.getItem(CRYPTO_META_KEY);
    return m ? JSON.parse(m) : null;
  } catch(e) { return null; }
}

function _isEncryptionEnabled() {
  return !!_getCryptoMeta();
}

async function _deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(passphrase), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function _encrypt(key, plaintext) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ciphertext = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv }, key, enc.encode(plaintext)
  );
  // Pack iv + ciphertext → base64
  const combined = new Uint8Array(iv.byteLength + ciphertext.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(ciphertext), iv.byteLength);
  return btoa(String.fromCharCode(...combined));
}

async function _decrypt(key, b64) {
  const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = combined.slice(0, 12);
  const ciphertext = combined.slice(12);
  const dec = new TextDecoder();
  const plaintext = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv }, key, ciphertext
  );
  return dec.decode(plaintext);
}

async function saveEncrypted(data) {
  if (!_cryptoKey) { 
    // fallback to plaintext if no key loaded
    localStorage.setItem(STORAGE_KEY, data);
    return;
  }
  try {
    const encrypted = await _encrypt(_cryptoKey, data);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ enc: true, data: encrypted }));
  } catch(e) {
    console.error('Encryption failed:', e);
    toast('⚠ Encryption error — data NOT saved!', 'error');
  }
}

async function loadEncrypted() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return null;
  let parsed;
  try { parsed = JSON.parse(raw); } catch(e) { return raw; } // legacy plaintext
  if (!parsed.enc) return raw; // plaintext JSON object
  if (!_cryptoKey) return null; // encrypted but no key
  try {
    return await _decrypt(_cryptoKey, parsed.data);
  } catch(e) {
    return null; // wrong passphrase
  }
}

async function enableEncryption(passphrase) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  _cryptoKey = await _deriveKey(passphrase, salt);
  // Store salt (NOT the key or passphrase)
  const saltB64 = btoa(String.fromCharCode(...salt));
  localStorage.setItem(CRYPTO_META_KEY, JSON.stringify({ salt: saltB64, v: 1 }));
  // Re-save existing data encrypted
  await saveEncrypted(JSON.stringify(DB));
  document.getElementById('lock-btn').style.display = '';
  const encBtn = document.getElementById('enc-btn');
  if (encBtn) encBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Disable Encryption';
  toast('🔒 Encryption enabled. Your data is now locked.');
}

async function unlockWithPassphrase(passphrase) {
  const meta = _getCryptoMeta();
  if (!meta) return false;
  const salt = Uint8Array.from(atob(meta.salt), c => c.charCodeAt(0));
  const key = await _deriveKey(passphrase, salt);
  // Test by attempting to decrypt
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { _cryptoKey = key; return true; }
  let parsed;
  try { parsed = JSON.parse(raw); } catch(e) { _cryptoKey = key; return true; }
  if (!parsed.enc) { _cryptoKey = key; return true; }
  try {
    await _decrypt(key, parsed.data);
    _cryptoKey = key;
    document.getElementById('lock-btn').style.display = '';
    return true;
  } catch(e) {
    return false; // wrong passphrase
  }
}

function lockApp() {
  _cryptoKey = null;
  document.getElementById('lock-btn').style.display = 'none';
  showLockScreen();
}

function disableEncryption() {
  // Decrypt and re-save as plaintext
  _cryptoKey = null;
  localStorage.removeItem(CRYPTO_META_KEY);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  document.getElementById('lock-btn').style.display = 'none';
  const encBtn = document.getElementById('enc-btn');
  if (encBtn) encBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> Enable Encryption';

}

async function _doUnlock() {
  const pass = document.getElementById('unlock-pass')?.value;
  if (!pass) return;
  const ok = await unlockWithPassphrase(pass);
  if (ok) {
    const raw = await loadEncrypted();
    if (raw) {
      try {
        const d = JSON.parse(raw);
        Object.assign(DB, migrate({ ...blankData(), ...d }));
      } catch(e) {}
    }
    render();
    toast('🔓 Unlocked.');
  } else {
    document.getElementById('unlock-err').textContent = 'Wrong passphrase. Try again.';
    document.getElementById('unlock-pass').value = '';
    document.getElementById('unlock-pass').focus();
  }
}

// ── STAGE DEFINITIONS ──────────────────────────────────────────────────────
// Valid stages in lifecycle order:
// 'seedling' | 'veg' | 'flower' | 'drying' | 'curing' | 'complete'
// Germination is handled in the Seed Library — grow records start at seedling.

const STAGES = ['seedling','veg','flower','drying','curing','complete'];
const STAGE_LABELS = {
  seedling:       'Seedling',
  veg:            'Veg',
  flower:         'Flower',
  drying:         'Drying',
  curing:         'Curing',
  complete:       'Complete',
  breeding_hold:  '♂ Breeding Hold',
};

// Fate labels for culled/dead plants
const FATE_LABELS = {
  culled_male:        '♂ Culled',
  culled_male_keeper: '♂ Kept for Breeding',
  culled_other:       'Culled',
  died:               'Died',
  culled_mutant:      'Mutant — Culled',
  culled_runt:        '<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg> Runt — Culled',
  kept_mutant:        'Mutant — Kept',
  kept_runt:          '<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg> Runt — Kept',
};

// Fates that remove the plant (goes to complete, excluded from yield stats)
const FATES_CULLED = new Set(['culled_male','culled_other','died','culled_mutant','culled_runt']);
// Fates that mark but keep the plant alive in normal lifecycle
const FATES_ACTIVE_FLAG = new Set(['culled_male_keeper','kept_mutant','kept_runt']);

// Which stages appear in which nav sections
const STAGES_PLANTS  = ['seedling','veg','flower','breeding_hold'];
const STAGES_CURING  = ['drying','curing'];
const STAGES_HISTORY = ['complete'];

function blankGrow() {
  return {
    // Identity
    uid:          null,   // unique string e.g. 'G001'
    strain:       '',
    id:           '',     // user-assigned label e.g. 'AG1-1'
    sex:          '',
    breeder:      '',
    source:       'seed', // 'seed' | 'clone'
    mother:       '',

    // Current stage
    stage:        'seedling',

    // Timeline
    germStart:    null,
    cloneIn:      null,
    seedlingDate: null,
    vegDate:      null,
    flipDate:     null,
    harvestDate:  null,
    dryStart:     null,
    jarDate:      null,
    completedDate:null,

    // Grow setup
    medium:       '',
    container:    '',
    targetFlower: 63,

    // Yield
    wetWeight:    null,
    dryWeight:    null,
    trimWeight:   null,

    // Cure
    jarCount:     null,
    jarLogs:      [],

    // Drying
    targetDryDays: 12,
    dryLogs:      [],

    // Final
    rating:       '',
    smokeReport:  '',
    notes:        '',

    // Fate (culled/died records)
    fate:           null,   // null | 'culled_male' | 'culled_male_keeper' | 'culled_other' | 'died'
    cullDate:       null,
    sexConfirmedDays: null, // days from flip/start until sex was confirmed
    cullNotes:      '',
  };
}

function blankData() {
  return {
    _v:           SCHEMA_VERSION,
    grows:        [],   // unified plant lifecycle records
    seeds:        [],   // seed vault — unplanted inventory
    breeding:     [],   // breeding runs
    journal:      [],   // grow log entries (linked to grows by uid)
    containers:   [],   // seed storage containers
    clone_batches: [],  // propagation batches — graduate to plant records
  };
}

// ── UID GENERATOR ──────────────────────────────────────────────────────────
function nextUid() {
  // Timestamp + random suffix — unique, sortable, no overflow
  return 'G' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase();
}

// ── MIGRATION ──────────────────────────────────────────────────────────────
function migrate(d) {
  // ── v1→v2: add containers ──
  if (!d.containers) d.containers = [];

  // ── v2→v3: add cures ──
  if (!d.cures) d.cures = [];

  // ── add clone_batches if missing ──
  if (!d.clone_batches) d.clone_batches = [];

  // ── v3→v4: unify plants + history + cures → grows ──
  if (!d.grows) {
    d.grows = [];
    let uidCounter = 1;
    const pad = n => 'G' + String(n).padStart(3,'0');

    // Migrate DB.history → grows (stage: 'complete')
    (d.history || []).forEach(h => {
      const uid = pad(uidCounter++);
      // Find matching cure by historyId or strain
      const cure = (d.cures || []).find(c =>
        c.historyId === (h.id || h.plant) || c.strain === h.plant
      );
      d.grows.push({
        ...blankGrow(),
        uid,
        strain:        h.plant       || '',
        id:            h.id          || '',
        sex:           h.sex         || '',
        stage:         'complete',
        flipDate:      h.flipDate    || null,
        harvestDate:   h.harvestDate || null,
        completedDate: h.harvestDate || null,
        wetWeight:     cure ? (cure.wetWeight  || h.wetWeight  || null) : (h.wetWeight  || null),
        dryWeight:     cure ? (cure.dryWeight  || h.dryWeight  || null) : (h.dryWeight  || null),
        trimWeight:    cure ? (cure.trimWeight || h.trimWeight || null) : (h.trimWeight || null),
        jarCount:      cure ? (cure.jarCount   || null) : null,
        jarLogs:       cure ? (cure.jarLogs    || [])   : [],
        smokeReport:   cure ? (cure.smokeReport|| h.smokeReport || '') : (h.smokeReport || ''),
        rating:        cure ? (cure.rating     || h.rating      || '') : (h.rating      || ''),
        notes:         h.notes || '',
        targetFlower:  h.daysInFlower || 63,
      });
    });

    // Migrate DB.plants → grows (stage inferred from fields)
    (d.plants || []).forEach(p => {
      const uid = pad(uidCounter++);
      // Infer stage from existing plant fields
      let stage = 'seedling';
      if (p.flipDate && p.harvestDate && new Date(p.harvestDate) <= new Date()) {
        stage = 'drying';
      } else if (p.flipDate) {
        stage = 'flower';
      } else if (p.germStart || p.cloneIn) {
        stage = 'veg';
      }
      // Check if there's an orphaned cure for this plant
      const cure = (d.cures || []).find(c =>
        c.strain === p.plant && !d.grows.find(g => g.strain === p.plant && g.stage === 'complete')
      );
      d.grows.push({
        ...blankGrow(),
        uid,
        strain:       p.plant       || '',
        id:           p.id          || '',
        sex:          p.sex         || '',
        breeder:      p.breeder     || '',
        source:       p.cloneIn ? 'clone' : 'seed',
        mother:       p.mother      || '',
        stage,
        germStart:    p.germStart   || null,
        cloneIn:      p.cloneIn     || null,
        flipDate:     p.flipDate    || null,
        harvestDate:  p.harvestDate || null,
        medium:       p.medium      || '',
        container:    p.container   || '',
        targetFlower: p.targetFlower|| 63,
        wetWeight:    cure ? (cure.wetWeight  || null) : null,
        dryWeight:    cure ? (cure.dryWeight  || null) : null,
        trimWeight:   cure ? (cure.trimWeight || null) : null,
        jarCount:     cure ? (cure.jarCount   || null) : null,
        jarLogs:      cure ? (cure.jarLogs    || [])   : [],
        smokeReport:  cure ? (cure.smokeReport|| '')   : '',
        rating:       cure ? (cure.rating     || '')   : '',
        notes:        p.notes || '',
      });
      // Re-link journal entries from plant id/name to new uid
      (d.journal || []).forEach(j => {
        if (j.plantId === (p.id || p.plant)) j.plantId = uid;
      });
    });

    // Migrate any cures that weren't matched to a plant or history record
    (d.cures || []).forEach(c => {
      const alreadyMigrated = d.grows.find(g =>
        g.strain === c.strain &&
        (g.jarLogs === c.jarLogs || (c.jarLogs && c.jarLogs.length && g.jarLogs.length))
      );
      if (!alreadyMigrated) {
        const uid = pad(uidCounter++);
        d.grows.push({
          ...blankGrow(),
          uid,
          strain:      c.strain      || '',
          stage:       'curing',
          harvestDate: c.harvestDate || null,
          jarDate:     c.harvestDate || null,
          wetWeight:   c.wetWeight   || null,
          dryWeight:   c.dryWeight   || null,
          trimWeight:  c.trimWeight  || null,
          jarCount:    c.jarCount    || null,
          jarLogs:     c.jarLogs     || [],
          smokeReport: c.smokeReport || '',
          rating:      c.rating      || '',
          notes:       c.notes       || '',
        });
      }
    });

    // Clean up old arrays — no longer needed
    delete d.plants;
    delete d.history;
    delete d.cures;
  }

  d._v = SCHEMA_VERSION;
  return d;
}

// Undo stack — keep last 20 states
const _undoStack = [];
async function save() {
  _cache = null;
  _undoStack.push(JSON.stringify(DB));
  if (_undoStack.length > 20) _undoStack.shift();
  try {
    const data = JSON.stringify(DB);
    if (_cryptoKey) {
      await saveEncrypted(data);
    } else {
      localStorage.setItem(STORAGE_KEY, data);
    }
  } catch(e) {
    console.error('Save error:', e);
    toast('⚠ Save failed — export a backup now!', 'error');
    return;
  }
  refreshBadges();
}

// ── Computed view cache — invalidated on every save() ──
let _cache = null;
function _gc() {
  if (!_cache) {
    const grows = DB.grows;
    _cache = {
      plants:  grows.filter(g => STAGES_PLANTS.includes(g.stage)),
      curing:  grows.filter(g => STAGES_CURING.includes(g.stage)),
      history: grows.filter(g => STAGES_HISTORY.includes(g.stage)),
    };
  }
  return _cache;
}

async function undo() {
  if (!_undoStack.length) { toast('Nothing to undo.'); return; }
  const prev = _undoStack.pop();
  _cache = null;
  Object.assign(DB, JSON.parse(prev));
  await save();
  render();
  toast('Undone.');
}

// Warn if no export in 7+ days
function checkBackupReminder() {
  const last = localStorage.getItem('growlog_last_export');
  if (!last) return;
  const days = Math.floor((Date.now() - parseInt(last)) / 86400000);
  if (days >= 7) toast(`Last backup was ${days} days ago — export one soon.`, 'warn');
}

  const encBtn = document.getElementById('enc-btn');
  if (encBtn) encBtn.innerHTML = _isEncryptionEnabled() ? '<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Disable Encryption' : '<svg width="14" height="14" viewBox="0 0 24 24" class="icon" style="vertical-align:middle;display:inline-block"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg> Enable Encryption';

  if (_isEncryptionEnabled()) {

const today = () => new Date().toISOString().slice(0,10);

function daysBetween(a, b) {
  if (!a || !b) return null;
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function daysUntil(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date(today())) / 86400000);
}

function daysOld(g) {
  const start = g.seedlingDate || g.germStart || g.cloneIn;
  return start ? daysBetween(start, today()) : null;
}

function flowerDays(g) {
  if (!g.flipDate) return null;
  const end = g.harvestDate && new Date(g.harvestDate) < new Date() ? g.harvestDate : today();
  return daysBetween(g.flipDate, end);
}

function dryDays(g) {
  if (!g.harvestDate) return null;
  const end = g.jarDate || today();
  return daysBetween(g.harvestDate, end);
}

function cureDays(g) {
  if (!g.jarDate) return null;
  const end = g.completedDate || today();
  return daysBetween(g.jarDate, end);
}

// Stage is now a first-class field — no inference needed
function stageBadge(stage) {
  return `<span class="badge badge-${stage}">${STAGE_LABELS[stage]||stage}</span>`;
}

function fateBadge(fate) {
  if (!fate) return '';
  const colors = { culled_male:'badge-danger', culled_male_keeper:'badge-warn', culled_other:'badge-danger', died:'badge-danger', culled_mutant:'badge-purple', culled_runt:'badge-danger', kept_mutant:'badge-purple', kept_runt:'badge-warn' };
  return `<span class="badge ${colors[fate]||'badge-danger'}">${FATE_LABELS[fate]||fate}</span>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}

function typeBadge(type) {
  const shortMap = {'Landrace, Heirloom & IBL':'heirloom','Regular Hybrid':'hybrid','Feminized':'fem','Autoflower':'auto','My Seeds':'my','Wish List':'wish'};

  return `<span class="badge badge-${shortMap[type]||'hybrid'}" style="background:${color}20;color:${color};border:1px solid ${color}40">${esc(type)}</span>`;

function issueTags(notes='') {
  const n = notes.toLowerCase();
  const tags = [];
  if (/\bpm\b/.test(n)) tags.push('<span class="badge badge-pm">PM</span>');
  if (/herm/.test(n)) tags.push('<span class="badge badge-herm">Herm</span>');
  if (/dud/.test(n)) tags.push('<span class="badge badge-dud">Dud</span>');
  if (/male/.test(n)) tags.push('<span class="badge badge-male">Male</span>');
  if (/pest|spider|mite|aphid|thrip/.test(n)) tags.push('<span class="badge badge-warn">Pest</span>');
  if (/deficien|yellow|cal-mag|nute burn/.test(n)) tags.push('<span class="badge badge-warn">Deficiency</span>');
  return tags.join('');
}

async function _loadRenderedPhotos() {

  for (const img of imgs) {
    const jIdx = parseInt(img.id.replace('jphoto-', ''));
    const j = DB.journal[jIdx];
    if (!j) continue;
    if (j.photo) { img.style.display = 'block'; continue; } // legacy inline photo

      if (dataUrl) { img.src = dataUrl; img.style.display = 'block'; }
    }
  }

// Per-stage sort order — stored in localStorage, keyed by plant UID
const PLANT_ORDER_KEY = 'growlog_plant_order';
function getPlantOrder() {
  try { return JSON.parse(localStorage.getItem(PLANT_ORDER_KEY)) || {}; } catch(e) { return {}; }
}
function savePlantOrder(order) {
  localStorage.setItem(PLANT_ORDER_KEY, JSON.stringify(order));
}
function sortByOrder(plants, stage) {
  const order = getPlantOrder()[stage] || [];
  if (!order.length) return plants;
  return [...plants].sort((a, b) => {
    const ai = order.indexOf(a.uid);
    const bi = order.indexOf(b.uid);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
}
let drawerTab = {}; // { [plantIndex]: 'info'|'log'|'actions' }
let drawerLogForm = {}; // { [plantIndex]: bool } — inline form open

function vpdRange(stage, flipDate) {
  // Sources: Hardin et al. (2012), Jorge Cervantes "Cannabis Encyclopedia",
  // Pulse Labs VPD guide, widely validated by commercial cultivation data
  if (stage === 'flower') {
    // Early flower (0–21d): treat like late veg transitioning up
    // Late flower (21d+): push higher to accelerate resin and prevent botrytis
    if (flipDate) {
      const fd = daysBetween(flipDate, today());
      if (fd < 21) return { lo: 1.0, hi: 1.5 }; // early flower
      return { lo: 1.2, hi: 1.8 }; // mid/late flower
    }
    return { lo: 1.0, hi: 1.8 }; // unknown flip date — wide range
  }
  if (stage === 'seedling') return { lo: 0.4, hi: 0.8 }; // seedlings need high humidity
  return { lo: 0.8, hi: 1.2 }; // veg
}

function plantSignal(g, _jIdx) {
  const issues = plantIssueList(g, _jIdx);
  if (issues.length) return 'red';
  const _jAll = _jIdx ? (_jIdx[g.uid]||[]) : DB.journal.filter(j => j.plantId === g.uid).sort((a,b)=>b.date.localeCompare(a.date));
  const lastEntry = _jAll[0];
  if (!lastEntry || daysBetween(lastEntry.date, today()) >= 5) return 'yellow';
  const vpd = parseFloat(lastEntry.vpd);
  if (vpd) {
    const { lo, hi } = vpdRange(g.stage, g.flipDate);
    if (vpd > hi || vpd < lo) return 'yellow';
  }
  return 'green';
}

function plantIssueList(g, _jIdx) {
  const _jAll = _jIdx ? (_jIdx[g.uid]||[]) : DB.journal.filter(j => j.plantId === g.uid).sort((a,b)=>b.date.localeCompare(a.date));
  const jEntries = _jAll.slice(0,3);
  const recent = jEntries.map(j=>(j.notes||'')+' '+(j.issues||[]).join(' ')).join(' ').toLowerCase();
  const tags = [];
  if (/\bpm\b|powdery mildew/.test(recent)) tags.push('PM');
  if (/herm/.test(recent)) tags.push('Herm');
  if (/pest|spider|mite|aphid|thrip|gnat/.test(recent)) tags.push('Pest');
  if (/deficien|cal.mag|nutrient burn|nute burn/.test(recent)) tags.push('Deficiency');
  if (/overwater|root rot/.test(recent)) tags.push('Root');
  return tags;
}

function boardVpdColor(vpd, stage, flipDate) {
  if (!vpd) return 'var(--text-dim)';
  const v = parseFloat(vpd);
  const { lo, hi } = vpdRange(stage, flipDate);
  if (v > hi + 0.1 || v < lo - 0.1) return 'var(--danger)';
  if (v > hi || v < lo) return 'var(--warn)';
  return 'var(--accent)';
}

// Stage target durations (days)
const STAGE_TARGETS_DEFAULTS = { seedling: 21, veg: 42, flower: 63, drying: 12 };
const STAGE_TARGETS_KEY = 'growlog_stage_targets';
function getStageTargets() {
  try { return Object.assign({}, STAGE_TARGETS_DEFAULTS, JSON.parse(localStorage.getItem(STAGE_TARGETS_KEY))||{}); } catch(e) { return {...STAGE_TARGETS_DEFAULTS}; }
}
// STAGE_TARGETS is a live object — always call getStageTargets() where you need current values
const STAGE_TARGETS = STAGE_TARGETS_DEFAULTS;

  // ── LOG TAB ──

  const logTab = () => {
    // Sparkline builder
    const sparkline = (vals, color, label, unit) => {
      const clean = vals.filter(v => v !== null && !isNaN(v));
      if (clean.length < 2) return '';
      const min = Math.min(...clean), max = Math.max(...clean);
      const range = max - min || 1;
      const W = 120, H = 28, pad = 3;
      const pts = clean.map((v, i) => {
        const x = pad + (i / (clean.length - 1)) * (W - pad * 2);
        const y = H - pad - ((v - min) / range) * (H - pad * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      const last = clean[clean.length - 1];
      return `<div style="display:flex;align-items:center;gap:6px;margin-right:12px">

          <circle cx="${(pad + (clean.length-1)/(clean.length-1) * (W-pad*2)).toFixed(1)}" cy="${(H - pad - ((last-min)/range)*(H-pad*2)).toFixed(1)}" r="2.5" fill="${color}"/>
        </svg>

          ${j.humidity?`<div class="journal-metric"><span class="journal-metric-label">RH</span><span class="journal-metric-value">${j.humidity}%</span></div>`:''}
          ${j.ppfd?`<div class="journal-metric"><span class="journal-metric-label">PPFD</span><span class="journal-metric-value">${j.ppfd} µmol</span></div>`:''}

          ${j.ec?`<div class="journal-metric"><span class="journal-metric-label">EC</span><span class="journal-metric-value">${j.ec} mS</span></div>`:''}

        </div>`:''}
      </div>`;

    const inlineForm = showForm ? `

          </div>

        <div class="ilf-section-label">Environment (optional)</div>

let _dragUid = null;
let _dragStage = null;

function tileDragStart(e, uid, stage) {
  _dragUid = uid; _dragStage = stage;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.getElementById('tile-' + uid); if(el) el.classList.add('tile-dragging'); }, 0);
}
function tileDragEnd(uid) {
  const el = document.getElementById('tile-' + uid);
  if (el) el.classList.remove('tile-dragging');
  document.querySelectorAll('.tile-drag-over,.tile-drag-over-below').forEach(t => { t.classList.remove('tile-drag-over','tile-drag-over-below'); });
  _dragUid = null; _dragStage = null;
}
function tileDragOver(e, uid, stage) {
  if (_dragStage !== stage) return;
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.tile-drag-over,.tile-drag-over-below').forEach(t => { t.classList.remove('tile-drag-over','tile-drag-over-below'); });
  const el = document.getElementById('tile-' + uid);
  if (!el || uid === _dragUid) return;
  const rect = el.getBoundingClientRect();
  el.classList.add(e.clientY < rect.top + rect.height / 2 ? 'tile-drag-over' : 'tile-drag-over-below');
}
function tileDrop(e, uid, stage) {
  e.preventDefault();
  if (!_dragUid || _dragStage !== stage || _dragUid === uid) return;
  document.querySelectorAll('.tile-drag-over,.tile-drag-over-below').forEach(t => { t.classList.remove('tile-drag-over','tile-drag-over-below'); });
  const stagePlants = DB.grows.filter(g => g.stage === stage);
  const order = getPlantOrder();
  const stageOrder = order[stage] || stagePlants.map(g => g.uid);
  stagePlants.forEach(g => { if (!stageOrder.includes(g.uid)) stageOrder.push(g.uid); });
  const el = document.getElementById('tile-' + uid);
  const rect = el ? el.getBoundingClientRect() : null;
  const insertBefore = rect && e.clientY < rect.top + rect.height / 2;
  const fromIdx = stageOrder.indexOf(_dragUid);
  const toIdx   = stageOrder.indexOf(uid);
  if (fromIdx === -1 || toIdx === -1) return;
  stageOrder.splice(fromIdx, 1);
  const newTo = stageOrder.indexOf(uid);
  stageOrder.splice(insertBefore ? newTo : newTo + 1, 0, _dragUid);
  order[stage] = stageOrder;
  savePlantOrder(order);
  render();
}

function calcVPD(i) {
  const tempF = parseFloat(document.getElementById('ilog-temp-'+i)?.value);
  const rh    = parseFloat(document.getElementById('ilog-humidity-'+i)?.value);
  const vpdEl = document.getElementById('ilog-vpd-'+i);
  const autoEl = document.getElementById('ilog-vpd-auto-'+i);
  if (!vpdEl) return;
  if (isNaN(tempF) || isNaN(rh) || rh < 0 || rh > 100) {
    if (autoEl) autoEl.textContent = '';
    return;
  }
  // Convert to Celsius, apply 2°F leaf-temp offset
  const leafC = (tempF - 2 - 32) * 5 / 9;
  const airC  = (tempF - 32) * 5 / 9;
  const svpLeaf = 0.6108 * Math.exp(17.27 * leafC / (leafC + 237.3));
  const svpAir  = 0.6108 * Math.exp(17.27 * airC  / (airC  + 237.3));
  const vpd = svpLeaf - (svpAir * rh / 100);
  const rounded = Math.max(0, vpd).toFixed(2);
  vpdEl.value = rounded;
  if (autoEl) autoEl.textContent = '← auto';
}

function previewPhoto(i) {
  const input = document.getElementById('ilog-photo-'+i);
  const preview = document.getElementById('ilog-photo-preview-'+i);
  if (!input || !input.files[0] || !preview) return;
  const file = input.files[0];
  // Compress to max 600px wide, JPEG 0.7
  const img = new Image();
  const reader = new FileReader();
  reader.onload = ev => {
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 600;
      const ratio = Math.min(max/img.width, max/img.height, 1);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      input.dataset.compressed = dataUrl;
      preview.innerHTML = `<img src="${dataUrl}" style="max-width:200px;max-height:150px;border-radius:6px;border:1px solid var(--border);display:block" />`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveInlineLog(e, i) {
  e.stopPropagation();
  const g = DB.grows[i];
  if (!g) return;
  const gf = id => { const v = fv(id); return v ? parseFloat(v) : null; };
  const checks = document.querySelectorAll(`#ilog-issues-${i} input:checked`);
  const issues = [...checks].map(c => c.value);
  const notes = fv(`ilog-notes-${i}`);
  const photoInput = document.getElementById(`ilog-photo-${i}`);
  const compressedPhoto = photoInput?.dataset?.compressed || null;

  // Store photo in IndexedDB, keep only the ID in the journal entry
  let photoId = undefined;
  if (compressedPhoto) {
    photoId = _photoUid();
    await photoSave(photoId, compressedPhoto);
  }

  const obj = {
    date: fv(`ilog-date-${i}`) || today(),
    plantId: g.uid,
    notes,
    vpd: gf(`ilog-vpd-${i}`),
    temp: gf(`ilog-temp-${i}`),
    humidity: gf(`ilog-humidity-${i}`),
    ppfd: gf(`ilog-ppfd-${i}`),
    ph: gf(`ilog-ph-${i}`),
    ec: gf(`ilog-ec-${i}`),
    lightHeight: gf(`ilog-lh-${i}`),
    issues,
    photoId  // undefined if no photo — not serialized
  };
  DB.journal.push(obj);
  await save();
  drawerLogForm[i] = false;
  render();
  const drawer = document.getElementById('drawer-' + i);
  if (drawer) { drawer.style.display = 'block'; drawer.style.maxHeight = '1200px'; }
  toast('Entry logged.');
}

    }).join('')}</div>` :
    `<div class="empty"><div class="empty-icon">${hf==='culled'?'✕':'<svg width="44" height="44" viewBox="0 0 24 24" style="stroke:#4ade80;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto"><path d="M3 3h18v4H3z"/><path d="M5 7v14h14V7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>'}</div><div class="empty-title">${hf==='culled'?'No culled or dead plants':'No history yet'}</div><div class="empty-hint">${hf==='culled'?'When you cull a plant or it dies, it appears here.':'Complete a cure from the Drying &amp; Curing or add a record manually.'}</div>${hf!=='culled'?'<button class="btn btn-primary" onclick="openAdd(\'history\')">+ Add Record</button>':''}</div>`}
  </div>`;
}

// ── CURE TRACKER ──
function curePhase(g) {
  if (!g.jarDate) return 'curing-early';
  const days = daysBetween(g.jarDate, today());
  if (days < 7)  return 'cure-early';
  if (days < 28) return 'cure-mid';
  return 'cure-long';
}

function curePhaseName(g) {
  const p = curePhase(g);
  return { 'cure-early':'Cure Week 1', 'cure-mid':'Cure Week 2–4', 'cure-long':'Long Cure' }[p] || 'Curing';
}

function curePhaseColor(g) {
  const p = curePhase(g);
  return { 'cure-early':'var(--warn)', 'cure-mid':'var(--accent)', 'cure-long':'var(--text-dim)' }[p] || 'var(--text-dim)';
}

// Drying progress bar — based on targetDryDays
function dryProgressBar(g) {
  const start = g.dryStart || g.harvestDate;
  if (!start) return '';
  const days = daysBetween(start, today());
  const target = g.targetDryDays || 12;
  const pct = Math.min(100, Math.round(days / target * 100));
  const lastLog = g.dryLogs && g.dryLogs.length ? g.dryLogs[g.dryLogs.length-1] : null;
  const snapped = g.dryLogs && g.dryLogs.some(l => l.snap);
  const color = snapped ? 'var(--accent)' : pct >= 100 ? 'var(--warn)' : 'var(--orange)';
  const midX = Math.round(50);
  return `<div style="padding-bottom:8px">
    <div style="position:relative;height:4px;background:var(--border);border-radius:2px;margin-bottom:6px">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;transition:width 0.3s"></div>
      <div style="position:absolute;left:50%;top:-4px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="width:1px;height:8px;background:var(--border2)"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim)">
      <span style="color:${color}">Day ${days} of ${target}</span>
      <span>${snapped ? '✓ Stems snapping — ready for jars' : pct >= 100 ? 'Target reached — check stems' : Math.max(0, target-days)+'d remaining'}</span>
    </div>
    ${lastLog ? `<div style="font-size:10px;color:var(--text-dim);margin-top:4px">Last check: ${fmtDate(lastLog.date)}${lastLog.temp?' · '+lastLog.temp+'°F':''}${lastLog.rh?' · '+lastLog.rh+'% RH':''}</div>` : ''}
  </div>`;
}

// Timeline: |-- Cure Wk1 7d --|-- Cure Wk2-5 35d --|-- Long Cure →
function cureProgressBar(g) {
  const days = g.jarDate ? daysBetween(g.jarDate, today()) : 0;
  const milestones = [
    { label: 'Wk 1',  days: 7,   color: 'var(--warn)' },
    { label: 'Wk 4',  days: 28,  color: 'var(--accent)' },
    { label: 'Wk 13', days: 91,  color: 'var(--text-dim)' },
  ];
  const total = 91;
  const pct = Math.min(100, Math.round(days / total * 100));
  const color = curePhaseColor(g);
  const markers = milestones.map(m => {
    const x = Math.round(m.days / total * 100);
    const passed = days >= m.days;
    return `<div style="position:absolute;left:${x}%;top:-4px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="width:1px;height:8px;background:${passed?color:'var(--border2)'}"></div>
      <div style="font-size:9px;color:${passed?color:'var(--text-dim)'};white-space:nowrap">${m.label}</div>
    </div>`;
  }).join('');
  return `<div style="padding-bottom:18px">
    <div style="position:relative;height:4px;background:var(--border);border-radius:2px;margin-bottom:4px">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;transition:width 0.3s"></div>
      ${markers}
    </div>
    <div style="font-size:10px;color:var(--text-dim);margin-top:18px">Day ${days} · ${pct}% of 13-week benchmark</div>
  </div>`;
}

function cures() {
  const allDryCure = _gc().curing.slice();
  let drying = allDryCure.filter(g => g.stage === 'drying')
    .sort((a,b) => (dryDays(a)||0) - (dryDays(b)||0));
  let curing = allDryCure.filter(g => g.stage === 'curing')
    .sort((a,b) => (cureDays(a)||0) - (cureDays(b)||0));

  if (search) {
    const q = search.toLowerCase();
    const match = g => (g.strain+' '+(g.id||'')+' '+(g.notes||'')).toLowerCase().includes(q);
    drying = drying.filter(match);
    curing = curing.filter(match);
  }

  const noData = !drying.length && !curing.length;

      <div class="empty-title">Nothing drying or curing</div>
      <div class="empty-hint">Harvest a plant from the Plants page to start the drying timer.</div>
      <button class="btn btn-primary" onclick="openAdd('cures')">+ Add Manually</button>

  const renderCureTile = (g) => {

    const progBar = isDrying ? dryProgressBar(g) : cureProgressBar(g);

          ${g.jarDate ? `<div class="drawer-row"><span class="drawer-label">Jarred</span><span class="drawer-value">${fmtDate(g.jarDate)}</span></div>` : ''}
          ${g.wetWeight ? `<div class="drawer-row"><span class="drawer-label">Wet</span><span class="drawer-value">${g.wetWeight}g</span></div>` : ''}

      <div class="stage-group-header" style="color:var(--orange)">Drying <span class="stage-group-count">${drying.length} plant${drying.length!==1?'s':''}</span></div>
      <div class="tile-grid">${drying.map(renderCureTile).join('')}</div>
    </div>` : ''}
  ${curing.length ? `
    <div style="margin-bottom:28px">
      <div class="stage-group-header" style="color:var(--accent)">Curing <span class="stage-group-count">${curing.length} jar${curing.length!==1?'s':''}</span></div>

}

function nextContainerId() {
  if (!DB.containers.length) return 'C1';
  const nums = DB.containers.map(c => parseInt((c.id||'C0').replace(/\D/g,''))||0);
  return 'C' + (Math.max(...nums) + 1);
}

function containerById(id) {
  return DB.containers.find(c => c.id === id);

  if (!id) return '—';

          ${c.location?`<div class="container-stat"><div class="container-stat-val" style="font-size:13px;color:var(--text-mid);margin-top:3px">${esc(c.location)}</div><div class="container-stat-lbl">Location</div></div>`:''}
        </div>
        <div class="container-pack-list">
          ${packs.length ? packs.slice(0,5).map(p => `
            <div class="container-pack-row">
              <span class="container-pack-strain">${esc(p.strain)}</span>
              <span class="container-pack-qty" style="color:${seedQtyColor(p.qty)}">${esc(p.qty||'?')}</span>
            </div>`).join('') + (packs.length - 5 > 0 ? `<div style="font-size:10px;color:var(--text-dim);padding-top:6px">+${packs.length-5} more packs</div>` : '')
          : `<div class="container-empty">Empty — no packs assigned</div>`}
        </div>
        ${c.notes?`<div style="font-size:11px;color:var(--text-dim);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5">${esc(c.notes)}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}
