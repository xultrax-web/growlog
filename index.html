      </div>
    </div>
  </div>`;
}


function openView(section, i) {
  const item = (section === 'plants' || section === 'history' || section === 'cures')
    ? DB.grows[i] : DB[section][i];
  if (!item) { toast('Record not found.', 'error'); return; }
  let html = '';

  if (section === 'plants') {
    const fd = flowerDays(item);
    const age = daysOld(item);
    const plantJournal = DB.journal.filter(j => j.plantId === item.uid).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
    html = `
      <div class="modal-header"><div class="modal-title">${esc(item.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-meta">${esc(item.id||'')} ${item.sex?'· '+esc(item.sex):''}</div>
      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${stageBadge(item.stage)}<span class="badge ${item.source==='clone'?'badge-clone':'badge-seedling'}">${item.source==='clone'?'Clone':'Seed'}</span>${item.notes?issueTags(item.notes):''}</div>
      <div class="modal-section">
        <div class="modal-section-title">Timeline</div>
        <div class="detail-grid">
          ${item.germStart?`<div class="detail-field"><div class="detail-label">Germination</div><div class="detail-value">${fmtDate(item.germStart)}</div></div>`:''}
          ${item.seedlingDate&&!item.germStart?`<div class="detail-field"><div class="detail-label">Seedling Date</div><div class="detail-value">${fmtDate(item.seedlingDate)}</div></div>`:''}
          ${item.cloneIn?`<div class="detail-field"><div class="detail-label">Cloned In</div><div class="detail-value">${fmtDate(item.cloneIn)}</div></div>`:''}
          ${item.mother?`<div class="detail-field"><div class="detail-label">Mother Plant</div><div class="detail-value">${esc(item.mother)}</div></div>`:''}
          ${item.flipDate?`<div class="detail-field"><div class="detail-label">Flip Date</div><div class="detail-value">${fmtDate(item.flipDate)}</div></div>`:''}
          ${fd!==null?`<div class="detail-field"><div class="detail-label">Days in Flower</div><div class="detail-value">${fd} / ${item.targetFlower||63} target</div></div>`:''}
          ${item.harvestDate?`<div class="detail-field"><div class="detail-label">Est. Harvest</div><div class="detail-value">${fmtDate(item.harvestDate)}${daysUntil(item.harvestDate)>=0?' ('+daysUntil(item.harvestDate)+'d)':''}</div></div>`:''}
          <div class="detail-field"><div class="detail-label">Age</div><div class="detail-value">${age!==null?age+' days':'—'}</div></div>
        </div>
      </div>
      ${item.breeder||item.medium||item.container ? `<div class="modal-section">
        <div class="modal-section-title">Setup</div>
        <div class="detail-grid">
          ${item.breeder?`<div class="detail-field"><div class="detail-label">Breeder / Source</div><div class="detail-value">${esc(item.breeder)}</div></div>`:''}
          ${item.medium?`<div class="detail-field"><div class="detail-label">Medium</div><div class="detail-value">${esc(item.medium)}</div></div>`:''}
          ${item.container?`<div class="detail-field"><div class="detail-label">Container</div><div class="detail-value">${esc(item.container)}</div></div>`:''}
        </div>
      </div>` : ''}
      ${item.notes?`<div class="modal-section"><div class="modal-section-title">Notes</div><div class="detail-notes">${esc(item.notes)}</div></div>`:''}
      ${FATES_ACTIVE_FLAG.has(item.fate||'')?`<div class="modal-section" style="border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:var(--surface2)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">${fateBadge(item.fate)}<span style="font-size:11px;color:var(--text-mid)">Flagged — continuing lifecycle normally</span></div>${item.cullNotes?`<div class="detail-notes" style="font-size:11px">${esc(item.cullNotes)}</div>`:''}</div>`:''}
      ${plantJournal.length?`<div class="modal-section"><div class="modal-section-title">Recent Journal</div>${plantJournal.map(j=>`<div class="journal-entry"><div class="journal-date">${fmtDate(j.date)}</div><div class="journal-text">${esc(j.notes)}</div></div>`).join('')}</div>`:''}
      <div class="btn-row">
        <button class="btn btn-danger" onclick="del('plants',${i})">Delete</button>
        <button class="btn btn-ghost" onclick="openEdit('plants',${i})">Edit</button>
        <button class="btn btn-warn" onclick="closeModal();nav('journal');openAdd('journal')">+ Log Entry</button>
        ${item.stage!=='seedling'?`<button class="btn btn-primary" onclick="closeModal();advanceStage(${i})">${item.stage==='flower'?'Log Harvest →':item.stage==='drying'?'Move to Jars →':'Flip to Flower →'}</button>`:''}
      </div>`;

  } else if (section === 'history') {
    const fd = item.flipDate && item.harvestDate ? daysBetween(item.flipDate, item.harvestDate) : null;
    const shrink = item.wetWeight && item.dryWeight ? ((item.dryWeight/item.wetWeight)*100).toFixed(1)+'%' : null;
    html = `
      <div class="modal-header"><div class="modal-title">${esc(item.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-meta">${esc(item.id||'')} ${item.sex?'· '+esc(item.sex):''}</div>
      <div style="margin-bottom:20px;display:flex;gap:6px;flex-wrap:wrap">${item.rating?`<span style="font-size:13px">${item.rating}</span>`:''}${item.notes?issueTags(item.notes):''}</div>
      <div class="detail-grid">
        ${item.flipDate?`<div class="detail-field"><div class="detail-label">Flip Date</div><div class="detail-value">${fmtDate(item.flipDate)}</div></div>`:''}
        ${item.harvestDate?`<div class="detail-field"><div class="detail-label">Harvest Date</div><div class="detail-value">${fmtDate(item.harvestDate)}</div></div>`:''}
        ${fd!==null?`<div class="detail-field"><div class="detail-label">Days in Flower</div><div class="detail-value">${fd}</div></div>`:''}
        ${item.wetWeight?`<div class="detail-field"><div class="detail-label">Wet Weight</div><div class="detail-value">${item.wetWeight}g</div></div>`:''}
        ${item.dryWeight?`<div class="detail-field"><div class="detail-label">Dry Weight</div><div class="detail-value">${item.dryWeight}g${shrink?' ('+shrink+' yield)':''}</div></div>`:''}
        ${item.trimWeight?`<div class="detail-field"><div class="detail-label">Trim</div><div class="detail-value">${item.trimWeight}g</div></div>`:''}
        ${item.jarDate?`<div class="detail-field"><div class="detail-label">Jar Date</div><div class="detail-value">${fmtDate(item.jarDate)}</div></div>`:''}
        ${item.completedDate?`<div class="detail-field"><div class="detail-label">Completed</div><div class="detail-value">${fmtDate(item.completedDate)}</div></div>`:''}
      </div>
      ${item.smokeReport?`<div class="modal-section"><div class="modal-section-title">Smoke Report</div><div class="detail-notes">${esc(item.smokeReport)}</div></div>`:''}
      ${item.notes?`<div class="modal-section"><div class="modal-section-title">Notes</div><div class="detail-notes">${esc(item.notes)}</div></div>`:''}
      <div class="btn-row"><button class="btn btn-danger" onclick="del('history',${i})">Delete</button><button class="btn btn-ghost" onclick="openEdit('history',${i})">Edit</button></div>`;

  } else if (section === 'containers') {
    const packs = containerPackList(item.id);
    const totalSeeds = packs.reduce((s,p) => s+(parseFloat(p.qty)||0), 0);
    const lowStock = packs.filter(p => { const q=parseFloat(p.qty); return !isNaN(q)&&q<=3; });
    html = `
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:32px">${containerIcon(item.type)}</span>
          <div>
            <div class="container-id-badge">${esc(item.id)}</div>
            <div class="modal-title">${esc(item.name)}</div>
          </div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-meta">${esc(item.type||'—')} · ${esc(item.location||'—')}</div>
      <div class="container-stats" style="margin:14px 0">
        <div class="container-stat"><div class="container-stat-val">${packs.length}</div><div class="container-stat-lbl">Packs</div></div>
        <div class="container-stat"><div class="container-stat-val" style="color:var(--purple)">~${Math.round(totalSeeds)}</div><div class="container-stat-lbl">Seeds</div></div>
        ${lowStock.length?`<div class="container-stat"><div class="container-stat-val" style="color:var(--warn)">${lowStock.length}</div><div class="container-stat-lbl">Low Stock</div></div>`:''}
      </div>
      ${item.notes?`<div class="detail-notes" style="margin-bottom:16px">${esc(item.notes)}</div>`:''}
      <div class="modal-section">
        <div class="modal-section-title">Contents — ${packs.length} pack${packs.length!==1?'s':''}</div>
        ${packs.length ? `<div class="table-wrap" style="margin-top:8px"><table>
          <thead><tr><th>Strain</th><th>Breeder</th><th>Type</th><th>Qty</th></tr></thead>
          <tbody>${packs.map(p => `<tr style="cursor:default">
            <td class="td-main">${esc(p.strain)}</td>
            <td class="td-sub">${esc(p.breeder||'—')}</td>
            <td>${typeBadge(p.type)}</td>
            <td style="color:${seedQtyColor(p.qty)};font-family:var(--mono)">${esc(p.qty||'?')}</td>
          </tr>`).join('')}</tbody>
        </table></div>` : `<div class="container-empty" style="padding:16px 0">No packs assigned yet. Assign packs from the Seed Library.</div>`}
      </div>
      <div class="btn-row">
        <button class="btn btn-danger" onclick="del('containers',${i})">Delete</button>
        <button class="btn btn-ghost" onclick="openEdit('containers',${i})">Edit</button>
        <button class="btn btn-primary" onclick="closeModal();nav('seeds')">Go to Seed Library →</button>
      </div>`;

  } else if (section === 'seeds') {
    const dudCount = (item.dudLog||[]).length;
    const dudLog = (item.dudLog||[]).slice().reverse().slice(0,3);
    html = `
      <div class="modal-header"><div class="modal-title">${esc(item.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div style="margin-bottom:18px">${typeBadge(item.type)}</div>
      <div class="detail-grid">
        <div class="detail-field"><div class="detail-label">Quantity</div><div class="detail-value" style="font-family:var(--serif);font-size:24px;font-style:italic;color:var(--accent)">${esc(item.qty||'?')}</div></div>
        <div class="detail-field"><div class="detail-label">Breeder</div><div class="detail-value">${esc(item.breeder||'—')}</div></div>
        <div class="detail-field"><div class="detail-label">Year</div><div class="detail-value">${esc(item.year||'—')}</div></div>
        <div class="detail-field"><div class="detail-label">Container</div><div class="detail-value">${item.containerId ? containerName(item.containerId) : (item.bin||'—')}</div></div>
        ${dudCount ? `<div class="detail-field"><div class="detail-label">Failed Germs</div><div class="detail-value" style="color:var(--danger)">${dudCount} logged</div></div>` : ''}
      </div>
      ${item.notes?`<hr class="divider"><div class="modal-section-title">Notes</div><div class="detail-notes">${esc(item.notes)}</div>`:''}
      ${dudLog.length ? `<div class="modal-section" style="margin-top:12px">
        <div class="modal-section-title" style="color:var(--danger)">Failed Germ Log</div>
        ${dudLog.map(d=>`<div class="journal-entry"><div class="journal-date">${fmtDate(d.date)}</div><div class="journal-text">${esc(d.notes||'Dud / no germ')}</div></div>`).join('')}
      </div>` : ''}
      <div class="btn-row">
        <button class="btn btn-danger" onclick="del('seeds',${i})">Delete</button>
        <button class="btn btn-ghost" onclick="openEdit('seeds',${i})">Edit</button>
        <button class="btn btn-warn btn-sm" onclick="logDudSeed(${i})">Log Dud / Failed Germ</button>
        <button class="btn btn-primary" onclick="plantFromSeed(${i})">Plant This Seed →</button>
      </div>`;

  } else if (section === 'breeding') {
    html = `
      <div class="modal-header"><div class="modal-title">${esc(item.crossName||'Untitled Cross')}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-meta">${item.date?fmtDate(item.date):''}</div>
      <div style="margin-bottom:20px">
        <div class="breed-cross" style="font-size:16px">
          <span>${esc(item.mother||'?')}</span><span class="times">×</span><span>${esc(item.father||'?')}</span>
        </div>
      </div>
      <div class="detail-grid">
        ${item.pollinationDay?`<div class="detail-field"><div class="detail-label">Pollination Day</div><div class="detail-value">Day ${esc(item.pollinationDay)} of flower</div></div>`:''}
        ${item.seedsProduced?`<div class="detail-field"><div class="detail-label">Seeds Produced</div><div class="detail-value">${esc(item.seedsProduced)}</div></div>`:''}
        ${item.generation?`<div class="detail-field"><div class="detail-label">Generation</div><div class="detail-value">${esc(item.generation)}</div></div>`:''}
        ${item.pollenSource?`<div class="detail-field"><div class="detail-label">Pollen Source</div><div class="detail-value">${esc(item.pollenSource)}</div></div>`:''}
        <div class="detail-field"><div class="detail-label">Reversal Project</div><div class="detail-value">${item.reversal?'Yes (STS/Colloidal Silver)':'No'}</div></div>
      </div>
      ${item.notes?`<hr class="divider"><div class="modal-section-title">Notes</div><div class="detail-notes">${esc(item.notes)}</div>`:''}
      <div class="btn-row">
        <button class="btn btn-danger" onclick="del('breeding',${i})">Delete</button>
        <button class="btn btn-ghost" onclick="openEdit('breeding',${i})">Edit</button>
        <button class="btn btn-primary" onclick="addSeedFromBreed(${i})">Add Seeds to Vault →</button>
      </div>`;

  } else if (section === 'journal') {
    const plant = DB.grows.find(g=>g.uid===item.plantId);
    html = `
      <div class="modal-header"><div class="modal-title">Journal Entry</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="modal-meta">${fmtDate(item.date)} ${plant?'· '+esc(plant.strain):item.plantId?'· '+esc(item.plantId):'· General'}</div>
      <div class="detail-notes" style="margin-bottom:16px">${esc(item.notes)}</div>
      ${item.vpd||item.temp||item.humidity||item.ppfd||item.ph||item.ec||item.lightHeight?`
      <div class="modal-section"><div class="modal-section-title">Metrics</div>
      <div class="detail-grid">
        ${item.vpd?`<div class="detail-field"><div class="detail-label">VPD</div><div class="detail-value">${item.vpd} kPa</div></div>`:''}
        ${item.temp?`<div class="detail-field"><div class="detail-label">Temperature</div><div class="detail-value">${item.temp}°F</div></div>`:''}
        ${item.humidity?`<div class="detail-field"><div class="detail-label">Humidity</div><div class="detail-value">${item.humidity}%</div></div>`:''}
        ${item.ppfd?`<div class="detail-field"><div class="detail-label">PPFD</div><div class="detail-value">${item.ppfd} μmol</div></div>`:''}
        ${item.ph?`<div class="detail-field"><div class="detail-label">pH</div><div class="detail-value">${item.ph}</div></div>`:''}
        ${item.ec?`<div class="detail-field"><div class="detail-label">EC</div><div class="detail-value">${item.ec}</div></div>`:''}
        ${item.lightHeight?`<div class="detail-field"><div class="detail-label">Light Height</div><div class="detail-value">${item.lightHeight}"</div></div>`:''}
      </div></div>`:''}
      ${item.issues&&item.issues.length?`<div class="tl-tags">${item.issues.map(x=>`<span class="badge badge-${x.toLowerCase()}">${esc(x)}</span>`).join('')}</div>`:''}
      <div class="btn-row"><button class="btn btn-danger" onclick="del('journal',${i})">Delete</button><button class="btn btn-ghost" onclick="openEdit('journal',${i})">Edit</button></div>`;
  }

  showModal(html);
}

let _editSection = null;
let _editIdx = null;

function openAdd(section) {
  _editSection = section;
  _editIdx = null;
  showModal(buildForm(section, null));
}

function openEdit(section, i) {
  _editSection = section;
  _editIdx = i;
  // plants, history, cures all live in DB.grows now
  const arr = (section === 'plants' || section === 'history' || section === 'cures')
    ? DB.grows : DB[section];
  showModal(buildForm(section, arr[i]));
}

function v(item, key, def='') { return item ? esc(item[key]||def) : def; }
function vb(item, key) { return item && item[key]; }

function plantSelectOptions(selected='') {
  const all = DB.grows.filter(g => g.uid);
  return `<option value="">— General / None —</option>` +
    all.map(g=>`<option value="${esc(g.uid)}" ${g.uid===selected?'selected':''}>${esc(g.strain)}${g.id?' ('+esc(g.id)+')':''}</option>`).join('');
}

function buildForm(section, item) {
  const isEdit = item !== null;
  const title = isEdit ? 'Edit' : 'Add';

  if (section === 'plants') return `
    <div class="modal-header"><div class="modal-title">${title} Plant</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-grid">

      <div class="form-field full"><div class="form-label">Strain Name<span class="req">*</span></div><input class="form-input" id="f-strain" placeholder="e.g. Girl Scout Cookies S1" value="${v(item,'strain')}" /></div>
      <div class="form-field"><div class="form-label">Plant ID</div><input class="form-input" id="f-id" placeholder="e.g. GSC1" value="${v(item,'id')}" /></div>
      <div class="form-field"><div class="form-label">Sex</div>
        <select class="form-select" id="f-sex">${['','Female','Male','Feminized','Feminized Auto','Female>Male (Reversal)','Unknown'].map(o=>`<option ${v(item,'sex')===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="form-field"><div class="form-label">Breeder / Source</div>
        <input class="form-input" id="f-breeder" list="breeder-list-p" placeholder="Type or select breeder…" value="${v(item,'breeder')}" autocomplete="off" />
        <datalist id="breeder-list-p">${BREEDERS.map(b=>`<option value="${b}">`).join('')}</datalist>
      </div>
      <div class="form-field"><div class="form-label">Medium</div>
        <select class="form-select" id="f-medium">${['','Coco/Perlite','Coco Solo','Living Soil','Amended Soil','ProMix','Peat/Perlite','DWC','RDWC','Ebb & Flow','Aeroponics','Rockwool','Other'].map(o=>`<option ${v(item,'medium')===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>
      <div class="form-field"><div class="form-label">Container</div>
        <select class="form-select" id="f-container">${['','Solo Cup','1 gal','2 gal','3 gal','5 gal','7 gal','10 gal','15 gal','20 gal','25 gal','Smart Pot 3','Smart Pot 5','Smart Pot 7','Smart Pot 10','Air Pot 3','Air Pot 5','Air Pot 7','EarthBox Jr','EarthBox Original','EarthBox Big','DWC Bucket','RDWC Site','Raised Bed','Ground','Other'].map(o=>`<option ${v(item,'container')===o?'selected':''}>${o}</option>`).join('')}</select>
      </div>

      <hr class="form-divider">
      <div class="form-field"><div class="form-label">Germ / Seedling Date</div><input class="form-input" id="f-germStart" type="date" value="${v(item,'germStart')||v(item,'seedlingDate')}" /></div>
      <div class="form-field"><div class="form-label">Clone In Date</div><input class="form-input" id="f-cloneIn" type="date" value="${v(item,'cloneIn')}" /></div>
      <div class="form-field"><div class="form-label">Mother Plant ID</div><input class="form-input" id="f-mother" placeholder="e.g. GSC1" value="${v(item,'mother')}" /></div>
      <div class="form-field"><div class="form-label">Flip to Flower Date</div>
        <input class="form-input" id="f-flipDate" type="date" value="${v(item,'flipDate')}" oninput="autoCalcHarvest()" />
      </div>
      <div class="form-field">
        <div class="form-label">Target Flower Days
          <span style="margin-left:6px;display:inline-flex;gap:4px">
            ${[49,56,63,70,77,84].map(d=>`<span onclick="document.getElementById('f-targetFlower').value=${d};autoCalcHarvest()" style="cursor:pointer;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--surface3);color:var(--text-dim);border:1px solid var(--border)" title="${d} days">${d}</span>`).join('')}
          </span>
        </div>
        <input class="form-input" id="f-targetFlower" type="number" placeholder="${getStageTargets().flower}" value="${v(item,'targetFlower','')}" oninput="autoCalcHarvest()" />
      </div>
      <div class="form-field">
        <div class="form-label">Est. Harvest Date <span class="meta-dim">(auto-calculated if blank)</span></div>
        <input class="form-input" id="f-harvestDate" type="date" value="${v(item,'harvestDate')}" oninput="this.dataset.manual='1'" />
      </div>

      <hr class="form-divider">
      <div class="form-field full"><div class="form-label">Notes</div><textarea class="form-textarea" id="f-notes" placeholder="Observations, issues, reminders, lineage notes…">${v(item,'notes')}</textarea></div>
    </div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveForm('plants')">Save Plant</button></div>`;

  if (section === 'journal') return `
    <div class="modal-header"><div class="modal-title">${title} Journal Entry</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-field"><div class="form-label">Date<span class="req">*</span></div><input class="form-input" id="f-date" type="date" value="${v(item,'date',today())}" /></div>
      <div class="form-field"><div class="form-label">Plant (optional)</div><select class="form-select" id="f-plantId">${plantSelectOptions(item?item.plantId:'')}</select></div>
      <hr class="form-divider">
      <div class="form-field full"><div class="form-label">Notes / Observations</div><textarea class="form-textarea" style="min-height:100px" id="f-notes" placeholder="What did you observe? What did you do? How does she look?">${v(item,'notes')}</textarea></div>
      <hr class="form-divider">
      <div class="form-label full" style="grid-column:1/-1;font-size:10px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;padding-top:4px">Environmental Metrics (optional)</div>
      <div class="form-field"><div class="form-label">VPD (kPa)</div><input class="form-input" id="f-vpd" type="number" step="0.01" min="0" placeholder="1.2" value="${v(item,'vpd')}" /></div>
      <div class="form-field"><div class="form-label">Temp (°F)</div><input class="form-input" id="f-temp" type="number" min="0" placeholder="76" value="${v(item,'temp')}" /></div>
      <div class="form-field"><div class="form-label">Humidity (%)</div><input class="form-input" id="f-humidity" type="number" min="0" max="100" placeholder="55" value="${v(item,'humidity')}" /></div>

function fv(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function ff(id) { const v = fv(id); return v ? parseFloat(v) : null; }

function saveForm(section) {
  let obj = {};

  if (section === 'plants') {
    const strainVal = fv('f-strain') || fv('f-plant');
    if (!strainVal) { toast('Strain name is required.','error'); return; }
    let harvestDate = fv('f-harvestDate');
    if (!harvestDate && fv('f-flipDate')) {
      const tgt = parseInt(fv('f-targetFlower')) || 63;
      const flip = new Date(fv('f-flipDate'));
      flip.setDate(flip.getDate() + tgt);
      harvestDate = flip.toISOString().slice(0,10);
    }
    // Infer stage from what's filled in
    let stage = 'seedling';
    if (fv('f-flipDate')) stage = 'flower';
    else if (fv('f-germStart') || fv('f-cloneIn')) stage = 'seedling';
    if (_editIdx !== null) stage = DB.grows[_editIdx].stage; // preserve on edit

    const existing = _editIdx !== null ? DB.grows[_editIdx] : {};
    obj = {
      ...existing,
      uid: existing.uid || nextUid(),
      strain: strainVal,
      id: fv('f-id'),
      sex: fv('f-sex'),
      breeder: fv('f-breeder'),
      source: fv('f-cloneIn') ? 'clone' : 'seed',
      medium: fv('f-medium'),
      container: fv('f-container'),
      germStart: fv('f-germStart'),
      cloneIn: fv('f-cloneIn'),
      seedlingDate: fv('f-germStart') || fv('f-cloneIn') || (existing.seedlingDate||null),
      mother: fv('f-mother'),
      flipDate: fv('f-flipDate'),
      harvestDate,
      targetFlower: parseInt(fv('f-targetFlower'))||63,
      notes: fv('f-notes'),
      stage
    };

  } else if (section === 'journal') {
    if (!fv('f-date')) { toast('Date is required.','error'); return; }
    const checks = document.querySelectorAll('#issue-checks input:checked');
    const issues = [...checks].map(c => c.value);
    obj = { date:fv('f-date'), plantId:fv('f-plantId'), notes:fv('f-notes'), vpd:ff('f-vpd'), temp:ff('f-temp'), humidity:ff('f-humidity'), ppfd:ff('f-ppfd'), ph:ff('f-ph'), ec:ff('f-ec'), lightHeight:ff('f-lightHeight'), issues };

  } else if (section === 'history') {
    if (!fv('f-strain') && !fv('f-plant')) { toast('Strain name is required.','error'); return; }
    const existing = _editIdx !== null ? DB.grows[_editIdx] : {};
    obj = {
      ...existing,
      uid: existing.uid || nextUid(),
      strain: fv('f-strain') || fv('f-plant'),
      id: fv('f-id'),
      sex: fv('f-sex'),
      flipDate: fv('f-flipDate'),
      harvestDate: fv('f-harvestDate'),
      wetWeight: ff('f-wetWeight'),
      dryWeight: ff('f-dryWeight'),
      trimWeight: ff('f-trimWeight'),
      smokeReport: fv('f-smokeReport'),
      rating: fv('f-rating'),
      notes: fv('f-notes'),
      stage: 'complete',
      completedDate: existing.completedDate || fv('f-harvestDate') || today()
    };

  } else if (section === 'cures') {
    if (!fv('f-strain')) { toast('Strain name is required.','error'); return; }
    const existing = _editIdx !== null ? DB.grows[_editIdx] : {};
    obj = {
      ...existing,
      uid: existing.uid || nextUid(),
      strain: fv('f-strain'),
      harvestDate: fv('f-harvestDate'),
      jarDate: fv('f-jarDate') || existing.jarDate,
      wetWeight: ff('f-wetWeight'),
      dryWeight: ff('f-dryWeight'),
      trimWeight: ff('f-trimWeight'),
      jarCount: parseInt(fv('f-jarCount'))||null,
      jarLogs: existing.jarLogs || [],
      smokeReport: fv('f-smokeReport'),
      rating: fv('f-rating'),
      notes: fv('f-notes'),
      stage: existing.stage || 'curing'
    };

  } else if (section === 'containers') {
    if (!fv('f-name')) { toast('Container name is required.','error'); return; }
    const id = (_editIdx !== null) ? DB.containers[_editIdx].id : nextContainerId();
    obj = { id: fv('f-contid') || fv('f-name') || ('C'+(DB.containers.length+1)), name:fv('f-name'), type:fv('f-ctype'), location:fv('f-clocation'), notes:fv('f-notes') };

  } else if (section === 'seeds') {
    if (!fv('f-strain')) { toast('Strain name is required.','error'); return; }
    obj = { strain:fv('f-strain'), type:fv('f-type'), qty:fv('f-qty'), breeder:fv('f-breeder'), year:fv('f-year'), containerId:fv('f-containerId'), notes:fv('f-notes') };

  } else if (section === 'breeding') {
    if (!fv('f-mother')||!fv('f-father')) { toast('Mother and father are required.','error'); return; }
    obj = { crossName:fv('f-crossName'), mother:fv('f-mother'), father:fv('f-father'), date:fv('f-date'), pollinationDay:fv('f-pollinationDay'), pollinationDate:fv('f-pollinationDate'), seedsProduced:fv('f-seedsProduced'), generation:fv('f-generation'), pollenSource:fv('f-pollenSource'), reversal:fv('f-reversal')==='true', notes:fv('f-notes') };
  }

  // Route plants/history/cures writes to DB.grows
  if (section === 'plants' || section === 'history' || section === 'cures') {
    if (_editIdx !== null) {
      DB.grows[_editIdx] = obj;
      toast('Updated.');
    } else {
      DB.grows.push(obj);
      toast('Added.');
    }
  } else {
    if (_editIdx !== null) {
      DB[section][_editIdx] = obj;
      toast('Updated.');
    } else {
      DB[section].push(obj);
      toast('Added.');
    }
  }
  save();
  closeModal();
  render();
}

function del(section, i) {
  const arr = (section === 'plants' || section === 'history' || section === 'cures')
    ? DB.grows : DB[section];
  const item = arr[i];
  const name = item ? (item.strain || item.name || item.crossName || item.mother || 'this entry') : 'this entry';
  showModal(`
    <div class="modal-header">
      <div class="modal-title">Delete — ${esc(name)}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p class="modal-hint" style="margin-bottom:20px">This cannot be undone. All data for this record will be permanently removed.</p>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="_confirmDel('${section}',${i})">Delete Permanently</button>
    </div>`);
}

function _confirmDel(section, i) {
  const arr = (section === 'plants' || section === 'history' || section === 'cures')
    ? DB.grows : DB[section];
  if (section === 'containers') {
    const containerId = DB.containers[i] && DB.containers[i].id;
    if (containerId) DB.seeds.forEach(s => { if (s.containerId === containerId) s.containerId = ''; });
  }
  if (section === 'plants' || section === 'history' || section === 'cures') {
    const uid = DB.grows[i] && DB.grows[i].uid;
    if (uid) DB.journal = DB.journal.filter(j => j.plantId !== uid);
  }
  arr.splice(i, 1);
  save(); closeModal(); render();
  toast('Deleted.');
}

function autoCalcHarvest() {
  const flipEl    = document.getElementById('f-flipDate');
  const tgtEl     = document.getElementById('f-targetFlower');
  const harvestEl = document.getElementById('f-harvestDate');
  if (!flipEl || !tgtEl || !harvestEl) return;
  // Only auto-fill if harvest is blank or was previously auto-filled
  const flip = flipEl.value;
  const tgt  = parseInt(tgtEl.value) || 63;
  if (flip && !harvestEl.dataset.manual) {
    const d = new Date(flip);
    d.setDate(d.getDate() + tgt);
    harvestEl.value = d.toISOString().slice(0, 10);
  }
}

// ── AUTO TRANSITIONS ──────────────────────────────────────────────────────
// Seedling → Veg happens automatically after 14 days (first true leaves).
// Veg → Flower is always manual because timing is grower-controlled.
const SEEDLING_TO_VEG_DAYS = 21; // matches STAGE_TARGETS_DEFAULTS.seedling

function autoTransitionSeedlings() {
  let changed = false;
  DB.grows.forEach(g => {
    if (g.stage !== 'seedling') return;
    const start = g.seedlingDate || g.germStart || g.cloneIn;
    if (!start) return;
    if (daysBetween(start, today()) >= SEEDLING_TO_VEG_DAYS) {
      g.stage = 'veg';
      g.vegDate = g.vegDate || today();
      changed = true;
    }
  });
  if (changed) save();
}

// ── STAGE TRANSITIONS ─────────────────────────────────────────────────────
function advanceStage(i) {
  const g = DB.grows[i];
  if (!g) return;

  if (g.stage === 'seedling') {
    g.stage = 'veg';
    g.vegDate = g.vegDate || today();
    save(); render();
    toast(`${esc(g.strain)} moved to Veg.`);
    return;
  }

  if (g.stage === 'veg') {
    showModal(`
      <div class="modal-header"><div class="modal-title">Flip to Flower — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <div class="form-grid">
        <div class="form-field"><div class="form-label">Flip Date</div><input class="form-input" id="adv-flipDate" type="date" value="${today()}" /></div>
        <div class="form-field"><div class="form-label">Target Flower Days</div><input class="form-input" id="adv-targetFlower" type="number" value="${g.targetFlower||63}" /></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmAdvance(${i},'flower')">Flip to Flower →</button>
      </div>`);
    return;
  }

  if (g.stage === 'flower') {
    showModal(`
      <div class="modal-header"><div class="modal-title">Log Harvest — ${esc(g.strain)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
      <p class="modal-hint-dim">Record the harvest. The plant will move to Drying.</p>

function confirmAdvance(i, toStage) {
  const g = DB.grows[i];
  if (!g) return;
  const gf = id => { const v = fv(id); return v ? parseFloat(v) : null; };

  if (toStage === 'flower') {
    g.flipDate = fv('adv-flipDate') || today();
    g.targetFlower = parseInt(fv('adv-targetFlower')) || 63;
    g.stage = 'flower';
  }
  if (toStage === 'drying') {
    g.harvestDate = fv('adv-harvestDate') || today();
    g.dryStart = g.harvestDate;
    if (gf('adv-wetWeight')) g.wetWeight = gf('adv-wetWeight');
    g.targetDryDays = parseInt(fv('adv-targetDryDays')) || 12;
    if (!g.dryLogs) g.dryLogs = [];
    g.stage = 'drying';
  }
  if (toStage === 'curing') {
    g.jarDate = fv('adv-jarDate') || today();
    if (gf('adv-dryWeight'))  g.dryWeight  = gf('adv-dryWeight');
    if (gf('adv-trimWeight')) g.trimWeight = gf('adv-trimWeight');
    if (fv('adv-jarCount'))   g.jarCount   = parseInt(fv('adv-jarCount')) || null;
    g.stage = 'curing';
  }

  save(); closeModal(); render();
  toast(`${esc(g.strain)} moved to ${STAGE_LABELS[toStage]}.`);
}

  const g = DB.grows[i];

  showModal(`

// Finalize cull: write fate fields, move to complete, save
function confirmCull(i, fate) {
  const g = DB.grows[i];
  if (!g) return;
  g.fate = fate;
  if (fate === 'culled_male') {
    g.cullDate = fv('cm-date') || today();
    const sd = fv('cm-sexdays'); if (sd) g.sexConfirmedDays = parseInt(sd);
    const nearby = fv('cm-nearby');
    const notes = fv('cm-notes');
    g.cullNotes = [nearby ? 'Nearby: '+nearby : '', notes].filter(Boolean).join(' · ');
    g.sex = 'male';
  } else if (fate === 'culled_mutant' || fate === 'culled_runt') {
    g.cullDate = fv('mc-date') || today();
    g.cullNotes = fv('mc-notes');
  } else {
    g.cullDate = fv('co-date') || today();
    g.cullNotes = fv('co-notes');
  }
  g.stage = 'complete';
  save(); closeModal(); render();
  const msg = fate === 'culled_male'   ? `${g.strain} culled ♂ — logged to History.`
             : fate === 'died'         ? `${g.strain} logged as died — recorded in History.`
             : fate === 'culled_mutant'? `${g.strain} culled (mutant) — recorded in History.`
             : fate === 'culled_runt'  ? `${g.strain} culled (runt) — recorded in History.`
             : `${g.strain} culled — recorded in History.`;
  toast(msg);
}

function confirmGraduateBatch(bi) {
  const b = (DB.clone_batches||[])[bi];
  if (!b) return;
  const rooted  = parseInt(fv('grad-rooted')) || 1;
  const rootDate = fv('grad-rootDate') || today();
  const medium  = fv('grad-medium');
  for (let n = 1; n <= rooted; n++) {
    const plant = blankGrow();
    plant.uid        = nextUid();
    plant.strain     = b.strain;
    plant.source     = 'clone';
    plant.mother     = b.motherPlant || '';
    plant.cloneIn    = b.cutDate;
    plant.seedlingDate = rootDate;
    plant.vegDate    = rootDate;
    plant.stage      = 'veg';
    plant.medium     = medium;
    plant.id         = rooted > 1 ? `${b.strain.slice(0,4).toUpperCase()}-C${n}` : `${b.strain.slice(0,4).toUpperCase()}-C1`;
    plant.notes      = `Cloned from ${b.motherPlant||b.strain}. Method: ${b.method||'Aerocloner'}. Rooted day ${daysBetween(b.cutDate, rootDate)}.`;
    DB.grows.push(plant);
  }
  DB.clone_batches.splice(bi, 1);
  save(); closeModal(); render();
  toast(`${rooted} clone${rooted!==1?'s':''} graduated to Plants.`);
}

let _pendingImport = null;

function triggerImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed.grows !== undefined || parsed.plants !== undefined || parsed.seeds !== undefined) {
          const hasData = DB.grows.length || DB.seeds.length || DB.breeding.length;
          if (hasData) {
            _pendingImport = parsed;
            showModal(`
              <div class="modal-header"><div class="modal-title">Import Backup</div><button class="modal-close" onclick="closeModal()">✕</button></div>
              <div style="margin-bottom:16px;padding:12px;background:var(--danger-dim);border:1px solid var(--danger);border-radius:6px;color:var(--danger);font-size:12px;line-height:1.6">
                <strong>⚠ This will overwrite your current data.</strong><br>
                All existing plants, seeds, and grow history will be replaced with the contents of this backup. This cannot be undone.
              </div>
              <div class="btn-row">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" onclick="closeModal();_confirmImport()">Overwrite &amp; Import</button>
              </div>`);
          } else {
            await _doImportData(parsed);
          }
        } else { toast('Invalid backup file.', 'error'); }
      } catch(e) { toast('Could not read file.','error'); }
    };
    reader.readAsText(f);
  };
  input.click();
}

async function _confirmImport() {
  if (!_pendingImport) return;
  const data = _pendingImport;
  _pendingImport = null;
  await _doImportData(data);
}

async function _doImportData(parsed) {
  // Restore photos to IndexedDB if backup includes them
  const photos = parsed._photos || {};
  await photoClearAll();
  for (const [id, dataUrl] of Object.entries(photos)) {
    await photoSave(id, dataUrl);
  }
  // Strip _photos from DB — it doesn't belong in localStorage
  const { _photos, ...dbData } = parsed;
  Object.assign(DB, { ...blankData(), ...dbData });
  await save(); render(); toast('Backup imported successfully.');
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const values = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { values.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    values.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (values[i]||'').replace(/^"|"$/g,''));
    return obj;
  });
}

function runCSVImport() {
  const file = document.getElementById('csv-file').files[0];
  if (!file) { toast('Select a CSV file first.','error'); return; }
  const target = document.getElementById('csv-target').value;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    let added = 0;
    rows.forEach(row => {
      if (target === 'seeds') {
        const strain = row[fv('cm-strain')||'strain'] || row.strain || row.name;
        if (!strain) return;
        DB.seeds.push({
          strain, type: row[fv('cm-type')||'type']||row.type||'Regular Hybrid',
          qty: row[fv('cm-qty')||'qty']||row.qty||'',
          breeder: row[fv('cm-breeder')||'breeder']||row.breeder||'',
          year: row[fv('cm-year')||'year']||row.year||'',
          bin: row[fv('cm-bin')||'bin']||row.bin||'',
          containerId: '',
          notes: row[fv('cm-notes')||'notes']||row.notes||''
        });
        added++;
      } else if (target === 'plants') {
        const strain = row.plant||row.strain||row.name;
        if (!strain) return;
        const cloneIn = row.clonein||row.clone_in||'';
        const flipDate = row.flipdate||row.flip_date||'';
        let stage = 'seedling';
        if (flipDate) stage = 'flower';
        else if (cloneIn) stage = 'veg';
        DB.grows.push({ uid: nextUid(), strain, id:row.id||'', sex:row.sex||'',
          source: cloneIn ? 'clone' : 'seed',
          germStart:row.germstart||row.germ_start||'', cloneIn, flipDate,
          harvestDate:row.harvestdate||row.harvest_date||'',
          targetFlower:parseInt(row.targetflower)||63, notes:row.notes||'', stage });
        added++;
      } else if (target === 'history') {
        const strain = row.plant||row.strain||row.name;
        if (!strain) return;
        DB.grows.push({ uid: nextUid(), strain, id:row.id||'', sex:row.sex||'',
          flipDate:row.flipdate||row.flip_date||'',
          harvestDate:row.harvestdate||row.harvest_date||'',
          wetWeight:parseFloat(row.wetweight||row.wet_weight)||null,
          dryWeight:parseFloat(row.dryweight||row.dry_weight)||null,
          notes:row.notes||'', stage: 'complete',
          completedDate: row.harvestdate||row.harvest_date||today() });
        added++;
      }
    });
    save(); closeModal(); render();
    toast(`Imported ${added} records.`);
  };
  reader.readAsText(file);
}

// Light/dark mode
const THEME_KEY = 'growlog_theme';
function toggleLightMode() {
  const isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = isLight
    ? `<svg viewBox="0 0 24 24" class="icon" style="width:13px;height:13px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>Dark Mode`
    : `<svg viewBox="0 0 24 24" class="icon" style="width:13px;height:13px"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>Light Mode`;
}
if (localStorage.getItem(THEME_KEY) === 'light') {
  document.body.classList.add('light-mode');
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('theme-btn');
    if (btn) btn.innerHTML = `<svg viewBox="0 0 24 24" class="icon" style="width:13px;height:13px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>Dark Mode`;
  });
}

function _migrateData() {
  let changed = false;
  DB.seeds.forEach(s => {
    if (s.type === 'Heirloom/IBL') { s.type = 'Landrace, Heirloom & IBL'; changed = true; }
  });
  if (changed) save();
}
_migrateData();

// PWA install prompt
let _pwaPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _pwaPrompt = e;
  // Show install button in sidebar footer
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'flex';
});
function installPWA() {
  if (!_pwaPrompt) return;
  _pwaPrompt.prompt();
  _pwaPrompt.userChoice.then(() => {
    _pwaPrompt = null;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'none';
  });
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  const typing = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
  const modalOpen = document.getElementById('modal')?.classList.contains('open');
  // ESC — close modal
  if (e.key === 'Escape' && modalOpen) { e.preventDefault(); closeModal(); return; }
  if (typing || modalOpen) return;
  // N — new plant
  if (e.key === 'n') { e.preventDefault(); nav('plants'); openAdd('plants'); }
  // J — new journal entry on open plant
  if (e.key === 'j') {
    e.preventDefault();
    if (boardExpanded !== null) {
      drawerTab[boardExpanded] = 'log';
      drawerLogForm[boardExpanded] = true;
      render();
    } else {
      nav('plants');
    }
  }
  // / — focus search
  if (e.key === '/') {
    e.preventDefault();
    const s = document.querySelector('.search-wrap input');
    if (s) { s.focus(); s.select(); }
  }
});
